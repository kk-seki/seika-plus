
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>石岡青果センター 在庫管理デモ</title>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--line:#e2e8f0;--muted:#64748b;--main:#16a34a;--red:#dc2626;--orange:#ea580c;--blue:#2563eb}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} button,input,select{font:inherit} .wrap{max-width:760px;margin:0 auto;padding:16px}.head{position:sticky;top:0;z-index:5;background:rgba(248,250,252,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.headin{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}.title{font-size:20px;font-weight:900}.sub,.small{font-size:12px;color:var(--muted)}.card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 1px 2px #00000008}.btn{border:0;border-radius:14px;padding:13px 16px;font-weight:800;background:#0f172a;color:white;cursor:pointer}.btn2{background:#e2e8f0;color:#0f172a}.btn3{background:var(--main)}.btnRed{background:#fee2e2;color:#991b1b}.menu{display:grid;gap:12px}.input{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px;background:white}.label{font-size:12px;font-weight:800;color:var(--muted);display:block;margin-bottom:4px}.row{display:flex;gap:8px;align-items:end}.row>*{flex:1}.notice{background:#eff6ff;color:#1e3a8a;border-radius:12px;padding:12px;margin:12px 0}.ok{background:#dcfce7;color:#166534;border-radius:12px;padding:12px;margin:12px 0}.err{background:#fee2e2;color:#991b1b;border-radius:12px;padding:12px;margin:12px 0}.itemHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.badge{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;white-space:nowrap}.shortage{background:#fee2e2;color:#991b1b}.excess{background:#ffedd5;color:#9a3412}.normal{background:#dcfce7;color:#166534}.unset{background:#f1f5f9;color:#475569}.line{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;border-top:1px solid #f1f5f9;padding:10px 0}.line:first-child{border-top:0}.kg{font-weight:900;white-space:nowrap;padding-bottom:12px}.total{border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-weight:900}.bottom{position:sticky;bottom:10px;width:100%;box-shadow:0 8px 24px #0002}.hide{display:none!important} pre{white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:12px;overflow:auto}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.tabs button{white-space:nowrap}.dangerText{color:#dc2626;font-weight:800}@media(max-width:560px){.line{grid-template-columns:1fr 1fr}.kg{grid-column:1/-1;padding-bottom:0}.row{flex-direction:column;align-items:stretch}.headin{align-items:flex-start}.title{font-size:18px}}
  </style>
</head>
<body>
  <div id="app"></div>
<script>
const ITEMS = [{"id": "item1", "name": "レタス", "pack": 8, "sort": 1}, {"id": "item2", "name": "サニー", "pack": 4, "sort": 2}, {"id": "item3", "name": "リーフ", "pack": 4, "sort": 3}, {"id": "item4", "name": "ロメイン", "pack": 5, "sort": 4}, {"id": "item5", "name": "水菜", "pack": 5, "sort": 5}, {"id": "item6", "name": "長葱", "pack": 10, "sort": 6}, {"id": "item7", "name": "小葱", "pack": 10, "sort": 7}, {"id": "item8", "name": "大葉", "pack": 3, "sort": 8}, {"id": "item9", "name": "青梗菜", "pack": 2, "sort": 9}, {"id": "item10", "name": "小松菜", "pack": 7, "sort": 10}, {"id": "item11", "name": "ほうれん草", "pack": 6, "sort": 11}, {"id": "item12", "name": "ゴーヤ", "pack": 3, "sort": 12}, {"id": "item13", "name": "茄子", "pack": 5, "sort": 13}, {"id": "item14", "name": "長茄子", "pack": 4, "sort": 14}, {"id": "item15", "name": "トマト", "pack": 4, "sort": 15}, {"id": "item16", "name": "ピーマン", "pack": 4, "sort": 16}, {"id": "item17", "name": "白菜", "pack": 15, "sort": 17}, {"id": "item18", "name": "ミニトマト", "pack": 3, "sort": 18}, {"id": "item19", "name": "紫キャベツ", "pack": 10, "sort": 19}];
const USERS = [平田','現場社員'];
const STORE = 'ishioka_inventory_demo_v1';
function init(){
  const saved = localStorage.getItem(STORE);
  if(saved) return JSON.parse(saved);
  const settings = Object.fromEntries(ITEMS.map((it,i)=>[it.id,{min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)}]));
  return {user:null, settings, records:[], notifications:[], items:ITEMS};
}
let db = init();
function save(){localStorage.setItem(STORE,JSON.stringify(db))}
function yen(n){return Math.round(Number(n||0)*100)/100}
function judge(total,s){if(!s)return 'unset'; if(total<s.min)return 'shortage'; if(total>s.max)return 'excess'; return 'normal'}
function label(st){return st==='shortage'?'不足':st==='excess'?'過剰':st==='normal'?'適正':'未設定'}
function pageShell(title, sub, body){document.getElementById('app').innerHTML=`<div class="head"><div class="headin"><div><div class="title">${title}</div><div class="sub">${sub||''}</div></div><div>${db.user?`<button class="btn btn2" onclick="home()">ホーム</button>`:''}</div></div></div><main class="wrap">${body}</main>`}
function login(){pageShell('石岡青果センター 在庫管理デモ','画面確認用の公開デモ',`<div class="card"><div class="notice">これはデモアプリです。入力データはこのブラウザ内に保存されます。LINEへの実送信は行いません。</div><label class="label">社員名</label><select id="user" class="input">${USERS.map(u=>`<option>${u}</option>`).join('')}</select><br><br><button class="btn btn3" style="width:100%" onclick="doLogin()">ログイン</button></div>`)}
function doLogin(){db.user=document.getElementById('user').value;save();home()}
function home(){if(!db.user)return login();pageShell('在庫管理デモ',`${db.user}さん`, `<div class="notice">全品目一覧でまとめて入力できます。複数の入れ数がある品目は「＋ 入れ数を追加」を押してください。</div><div class="menu"><button class="btn btn3" onclick="inventory()">在庫入力</button><button class="btn btn2" onclick="stocks()">在庫一覧</button><button class="btn btn2" onclick="settings()">適正在庫設定</button><button class="btn btn2" onclick="itemsPage()">品目設定</button><button class="btn btn2" onclick="notifications()">通知履歴</button><button class="btn btn2" onclick="resetDemo()">デモデータ初期化</button><button class="btn btnRed" onclick="db.user=null;save();login()">ログアウト</button></div>`)}
let formState=[];
function inventory(){formState = db.items.map(it=>({itemId:it.id, lines:[{pack:String(it.pack), cases:''}]})); renderInventory()}
function renderInventory(msg='',err=''){
 const cards=formState.map((r,idx)=>{const it=db.items.find(x=>x.id===r.itemId), s=db.settings[it.id]; const total=yen(r.lines.reduce((a,l)=> l.pack!==''&&l.cases!==''?a+Number(l.pack)*Number(l.cases):a,0)); const st= total?judge(total,s):'unset'; return `<section class="card"><div class="itemHead"><div><h2 style="margin:0 0 4px">${it.name}</h2><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}〜${s.max}kg</div></div><span class="badge ${total?st:'unset'}">${total?label(st):'未入力'}</span></div>${r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${l.pack}" placeholder="例 8" onchange="formState[${idx}].lines[${j}].pack=this.value;renderInventory()"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${l.cases}" placeholder="空欄可" onchange="formState[${idx}].lines[${j}].cases=this.value;renderInventory()"></div><div class="kg">小計 ${l.pack!==''&&l.cases!==''?yen(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px;margin-left:6px" onclick="formState[${idx}].lines.splice(${j},1);renderInventory()">削除</button>`:''}</div></div>`).join('')}<button class="btn btn2" onclick="formState[${idx}].lines.push({pack:'',cases:''});renderInventory()">＋ 入れ数を追加</button><div class="total"><span>合計</span><span>${total?total+'kg':'- kg'}</span></div></section>`}).join('');
 pageShell('在庫入力','追加行は空欄で追加',`${msg?`<div class="ok">${msg}</div>`:''}${err?`<div class="err">${err}</div>`:''}<div class="notice">ケース数が空欄の行は登録しません。0は在庫ゼロとして登録します。</div>${cards}<button class="btn btn3 bottom" onclick="submitInventory()">まとめて登録</button>`)
}
function submitInventory(){
 try{
  const results=[];
  for(const r of formState){const it=db.items.find(x=>x.id===r.itemId); const lines=[]; for(const l of r.lines){const hp=l.pack!==''; const hc=l.cases!==''; if(!hp&&hc) throw new Error(`${it.name}: ケース数だけ入力されています。入れ数も入力してください。`); if(hp&&hc){const p=Number(l.pack), c=Number(l.cases); if(!(p>0)) throw new Error(`${it.name}: 入れ数は0より大きくしてください。`); if(!(c>=0)) throw new Error(`${it.name}: ケース数は0以上にしてください。`); lines.push({pack:p,cases:c,subtotal:yen(p*c)})}}
    if(lines.length){const total=yen(lines.reduce((a,l)=>a+l.subtotal,0)); const s=db.settings[it.id]; const st=judge(total,s); results.push({id:crypto.randomUUID(),itemId:it.id,itemName:it.name,total,setting:{...s},status:st,lines,user:db.user,createdAt:new Date().toISOString()})}}
  db.records.push(...results);
  const alerts=results.filter(r=>r.status==='shortage'||r.status==='excess').map(r=>({id:crypto.randomUUID(),recordId:r.id,itemName:r.itemName,status:r.status,total:r.total,message:lineMessage(r),sentResult:'demo',sentAt:new Date().toISOString()}));
  db.notifications.push(...alerts); save(); renderInventory(`登録しました。入力品目：${results.length}件、LINE通知対象：${alerts.length}件`,'');
 }catch(e){renderInventory('',e.message)}
}
function lineMessage(r){const diff=r.status==='shortage'?r.setting.min-r.total:r.total-r.setting.max; return `${r.status==='shortage'?'【在庫不足アラート】':'【在庫過剰アラート】'}
品目：${r.itemName}
現在庫：${r.total}kg
適正在庫：${r.setting.min}〜${r.setting.max}kg
${r.status==='shortage'?'不足目安':'超過目安'}：${yen(diff)}kg
内訳：${r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、')}
入力者：${r.user}さん
確認をお願いします。`}
function stocks(){const latest={}; db.records.forEach(r=>latest[r.itemId]=r); const rows=db.items.map(it=>latest[it.id]).filter(Boolean); pageShell('在庫一覧','最新入力の一覧', rows.length?rows.map(r=>`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${r.itemName}</h2><div class="small">${new Date(r.createdAt).toLocaleString('ja-JP')} / ${r.user}さん</div></div><span class="badge ${r.status}">${label(r.status)}</span></div><div class="total"><span>現在庫</span><span>${r.total}kg</span></div><div class="small">内訳：${r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、')}</div></div>`).join(''):'<div class="card notice">まだ在庫データがありません。</div>')}
function settings(){pageShell('適正在庫設定','最低kg・上限kgをデモ保存できます',`<div class="notice">ここで変更した値は、このブラウザ内だけに保存されます。</div>${db.items.map(it=>{const s=db.settings[it.id]; return `<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg</div></div><div><label class="label">最低kg</label><input id="min_${it.id}" class="input" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" value="${s.max}"></div></div>`}).join('')}<button class="btn btn3 bottom" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value), max=Number(document.getElementById('max_'+it.id).value); if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください`);return} db.settings[it.id]={min,max}} save(); settings(); alert('保存しました')}
function itemsPage(){pageShell('品目設定','初期入れ数',db.items.map(it=>`<div class="card itemHead"><div><b>${it.sort}. ${it.name}</b><div class="small">使用中</div></div><b>${it.pack}kg</b></div>`).join(''))}
function notifications(){pageShell('通知履歴','デモではLINE実送信はしません',db.notifications.length?db.notifications.slice().reverse().map(n=>`<div class="card"><span class="badge ${n.status}">${label(n.status)}</span><h2>${n.itemName}</h2><div class="small">${new Date(n.sentAt).toLocaleString('ja-JP')} / ${n.sentResult}</div><pre>${n.message}</pre></div>`).join(''):'<div class="card notice">通知履歴はまだありません。</div>')}
function resetDemo(){if(confirm('このブラウザ内のデモデータを初期化しますか？')){localStorage.removeItem(STORE); db=init(); login()}}
login();
</script>
</body>
</html>
