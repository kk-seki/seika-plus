name: Unzip app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip uploaded zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -type f | while read f; do
            if file "$f" | grep -qi "zip"; then
              echo "$f"
              break
            fi
          done)

          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found"
            exit 0
          fi

          mkdir extracted
          unzip - "$oZIP_FILE" -d extracted

          if [ -f extracted/package.json ]; then
            cp -R extracted/. .
          else
            INNER=$(find extracted -maxdepth 2 -name package.json | head -n 1)
            if [ -n "$INNER" ]; then
              DIR=$(dirname "$INNER")
              cp -R "$DIR"/. .
            fi
          fi

          rm -rf extracted "$ZIP_FILE"

      - name: Commit unzipped files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Unzip app files" || exit 0
          git push
