function isDetailItem(it){return it&&String(it.name||'')==='胡瓜'}
function detailTemplate(itemId){db.itemDetails=db.itemDetails||{};db.itemDetails[itemId]=db.itemDetails[itemId]||[];return db.itemDetails[itemId].filter(x=>x.active!==false).sort((a,b)=>(a.sort||0)-(b.sort||0))}
function parseNums(v){return String(v||'').replace(/[０-９．]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).split('/').map(x=>Number(String(x).replace(/[^0-9.\-]/g,''))).filter(n=>!Number.isNaN(n))}
function packsFromSpec(spec){const nums=parseNums(spec);return nums.length?nums:[5]}
function detailSubtotal(l){const packs=packsFromSpec(l.spec),qs=parseNums(l.qty);if(!qs.length)return 0;return yen(qs.reduce((a,q,i)=>a+(packs[Math.min(i,packs.length-1)]||packs[0]||0)*q,0))}
function inventoryLineHasInput(l){return l&&l.detail?String(l.qty||'').trim()!==''&&parseNums(l.qty).length>0:l.pack!==''&&l.cases!==''}

function inventoryFilterLabel(v){return v==='missing'?'未入力だけ':v==='entered'?'入力済みだけ':'すべて'}

const COLD_ROOM_ORDER={room2:1,room3:2,other:9};
function textHasAny(t,words){t=String(t||'');return words.some(w=>t.includes(w))}

function coldRoomOptionsHtml(selected){selected=validColdRoom(selected)?selected:'room2';return `<option value="room2" ${selected==='room2'?'selected':''}>第2冷蔵庫</option><option value="room3" ${selected==='room3'?'selected':''}>第3冷蔵庫</option>`}

function coldRoomForSpecialItem(tableId,it){if(it&&validColdRoom(it.room))return it.room;const n=String((it&&it.name)||'');if(tableId==='kataoka')return'room2';if(textHasAny(n,['玉葱','男爵(フジ用)','長芋','ブロッコリー','トヨシロ(デリカフーズ用)']))return'room2';if(textHasAny(n,['洗い長芋','洗いじゃが芋','キャベツ','大根','人参','紫キャベツ','白菜','胡瓜','トヨシロ 10kg']))return'room3';return'room3'}

function ensureWasteRecords(){db.wasteRecords=db.wasteRecords||[]}
function wasteTodayRecords(){ensureWasteRecords();return db.wasteRecords.filter(r=>r.date===todayKey())}
function wasteDateInputValue(){return todayKey()}
function wasteAmount(r){return yen(Number(r.qty||0)*Number(r.unitPrice||0))}
function money(n){return Math.round(Number(n||0)).toLocaleString('ja-JP')}
function wasteTotals(rows){return{kg:yen(rows.reduce((a,r)=>a+Number(r.qty||0),0)),amount:yen(rows.reduce((a,r)=>a+wasteAmount(r),0))}}
function wasteEntryPage(msg=''){
 setScreen('wasteEntryPage',[msg]);ensureWasteRecords();
 if(!canWasteInput()){alert('廃棄入力は管理者・青果社員・事務員のみです');return wasteListPage()}
 const wastePriorityItems=['キャベツ','人参','葉付大根','カット大根','じゃが芋','玉葱'];
 const normalWasteItems=allSortedItems().filter(it=>it.active!==false).map(it=>it.name).filter(name=>!wastePriorityItems.includes(name));
 const itemOptions=wastePriorityItems.concat(normalWasteItems).map(name=>`<option value="${esc(name)}"></option>`).join('');
 pageShell('廃棄入力','現場で出た廃棄を日ごとに記録します。単価は廃棄一覧で事務員または管理者が入力します。',`${okHtml(msg)}<datalist id="wasteItemOptions">${itemOptions}</datalist><div class="card"><div class="row"><div><label class="label">日付</label><input id="wasteDate" class="input" type="date" value="${wasteDateInputValue()}"></div><div><label class="label">品名</label><input id="wasteName" class="input" list="wasteItemOptions" placeholder="例：レタス"></div></div><label class="label">数量(kg)</label><input id="wasteQty" class="input" inputmode="decimal" placeholder="例：12.5"><div class="row"><div><label class="label">産地</label><input id="wasteOrigin" class="input" placeholder="例：茨城"></div><div><label class="label">仕入先</label><input id="wasteSupplier" class="input" placeholder="例：〇〇市場"></div></div><label class="label">備考</label><textarea id="wasteMemo" class="textarea" placeholder="廃棄理由・状態など"></textarea><div class="grid" style="margin-top:12px"><button class="btn green" onclick="saveWasteRecord()">廃棄を保存</button><button class="btn btn2" onclick="wasteListPage()">廃棄一覧を見る</button></div></div><div class="card"><b>本日の廃棄</b>${wasteMiniListHtml(wasteTodayRecords())}</div>`)
}
function parseDecimalInput(v){return Number(String(v||'').replace(/[０-９．，、]/g,ch=>ch==='，'||ch==='、'?'.':String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/,/g,''))}
function readWasteForm(){return{date:document.getElementById('wasteDate').value||todayKey(),itemName:document.getElementById('wasteName').value.trim(),qty:parseDecimalInput(document.getElementById('wasteQty').value),origin:document.getElementById('wasteOrigin').value.trim(),supplier:document.getElementById('wasteSupplier').value.trim(),memo:document.getElementById('wasteMemo').value.trim()}}
function saveWasteRecord(){if(!canWasteInput()){alert('保存できません');return}const r=readWasteForm();if(!r.itemName){alert('品名を入力してください');return}if(!(r.qty>0)){alert('数量(kg)を入力してください');return}ensureWasteRecords();db.wasteRecords.push({id:newId(),date:r.date,itemName:r.itemName,qty:yen(r.qty),unitPrice:0,amount:0,origin:r.origin,supplier:r.supplier,memo:r.memo,user:db.user,userId:db.userId,createdAt:nowIso(),updatedAt:nowIso()});save();wasteEntryPage('廃棄を保存しました')}
function wasteMiniListHtml(rows){if(!rows.length)return '<div class="small" style="margin-top:8px">まだ記録がありません。</div>';const t=wasteTotals(rows);return `<div class="total"><span>本日合計</span><span>${fmt(t.kg)}kg / ${money(t.amount)}円</span></div><div class="weeklyWrap"><table class="table"><thead><tr><th>品名</th><th>数量</th><th>単価</th><th>金額</th><th>産地</th><th>仕入先</th></tr></thead><tbody>${rows.slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).map(r=>`<tr><td>${esc(r.itemName)}</td><td>${fmt(r.qty)}kg</td><td>${Number(r.unitPrice)>0?money(r.unitPrice)+'円/kg':'未入力'}</td><td>${Number(r.unitPrice)>0?money(wasteAmount(r))+'円':'-'}</td><td>${esc(r.origin||'-')}</td><td>${esc(r.supplier||'-')}</td></tr>`).join('')}</tbody></table></div>`}
function wasteRowsForPeriod(startDate,endDate){ensureWasteRecords();const s=startDate||todayKey(),e=endDate||s;const from=s<=e?s:e,to=s<=e?e:s;return db.wasteRecords.slice().filter(r=>String(r.date||'')>=from&&String(r.date||'')<=to).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))||new Date(b.createdAt||0)-new Date(a.createdAt||0))}
function wastePeriodLabel(startDate,endDate){const s=startDate||todayKey(),e=endDate||s;const from=s<=e?s:e,to=s<=e?e:s;return from===to?from:`${from}〜${to}`}
function wasteListPage(msg=''){

 const def=todayKey();

}
function wastePriceCell(r){if(!canWastePriceInput())return Number(r.unitPrice)>0?money(r.unitPrice):'未入力';return `<div class="mini" style="grid-template-columns:1fr auto;gap:6px"><input id="wastePrice_${r.id}" class="input" inputmode="decimal" value="${Number(r.unitPrice)>0?esc(r.unitPrice):''}" placeholder="円/kg"><button class="btn btn2" onclick="saveWasteUnitPrice('${r.id}')">保存</button></div>`}
function wasteListHtml(rows){if(!rows.length)return '<div class="notice">選択期間の廃棄記録はありません。</div>';return `<div class="card"><div class="weeklyWrap"><table class="table wasteTable"><thead><tr><th>日付</th><th>品名</th><th>数量(kg)</th><th>単価(円/kg)</th><th>金額</th><th>産地</th><th>仕入先</th><th>備考</th><th>入力者</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.date||'')}</td><td><b>${esc(r.itemName)}</b></td><td>${fmt(r.qty)}</td><td>${wastePriceCell(r)}</td><td>${Number(r.unitPrice)>0?money(wasteAmount(r))+'円':'-'}</td><td>${esc(r.origin||'-')}</td><td>${esc(r.supplier||'-')}</td><td>${esc(r.memo||'-')}</td><td>${esc(r.user||'-')}</td><td>${canWasteInput()?`<button class="btn red" onclick="deleteWasteRecord('${r.id}')">削除</button>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function filterWasteList(){ensureWasteRecords();const s=(document.getElementById('wasteStartDate')&&document.getElementById('wasteStartDate').value)||todayKey();const e=(document.getElementById('wasteEndDate')&&document.getElementById('wasteEndDate').value)||s;const rows=wasteRowsForPeriod(s,e);const total=wasteTotals(rows);document.getElementById('wasteTotalKgBox').textContent=fmt(total.kg)+'kg';document.getElementById('wasteTotalAmountBox').textContent=money(total.amount)+'円';document.getElementById('wasteListBox').innerHTML=wasteListHtml(rows)}
function saveWasteUnitPrice(id){if(!canWastePriceInput()){alert('単価入力は事務員または管理者のみです');return}const r=(db.wasteRecords||[]).find(x=>x.id===id);if(!r)return alert('廃棄記録が見つかりません');const price=parseDecimalInput(document.getElementById('wastePrice_'+id).value);if(Number.isNaN(price)||price<0)return alert('単価は0以上で入力してください');r.unitPrice=yen(price);r.amount=wasteAmount(r);r.priceUser=db.user;r.priceUserId=db.userId;r.priceUpdatedAt=nowIso();r.updatedAt=nowIso();save();filterWasteList()}
function deleteWasteRecord(id){if(!canWasteInput()){alert('削除できません');return}if(!confirm('この廃棄記録を削除しますか？'))return;ensureWasteRecords();db.wasteRecords=db.wasteRecords.filter(r=>r.id!==id);save();wasteListPage('廃棄記録を削除しました')}
function uniqText(values){return [...new Set(values.filter(Boolean).map(v=>String(v).trim()).filter(Boolean))].join('、')}
function wasteExcelGroupRows(rows,keyFn,labelFn){const m={};rows.forEach(r=>{const k=keyFn(r);if(!m[k])m[k]={key:k,label:labelFn(r),kg:0,amount:0,count:0,items:[],origins:[],suppliers:[],memos:[]};m[k].kg+=Number(r.qty||0);m[k].amount+=wasteAmount(r);m[k].count+=1;m[k].items.push(r.itemName||'');m[k].origins.push(r.origin||'');m[k].suppliers.push(r.supplier||'');m[k].memos.push(r.memo||'')});return Object.values(m)}
function buildWasteExcelHtml(startDate,endDate,rows){const t=wasteTotals(rows),created=dt(nowIso()),period=wastePeriodLabel(startDate,endDate);const styles=`<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827}h1{font-size:22px}.section{margin-top:22px;font-size:17px;font-weight:bold}table{border-collapse:collapse}th,td{border:1px solid #bfbfbf;padding:7px 9px;vertical-align:middle;white-space:nowrap}th{background:#d9eaf7;font-weight:bold}.summary th{background:#e2f0d9}.detail th{background:#d9eaf7}.daily th{background:#ddebf7}.item th{background:#fce4d6}.dayitem th{background:#e4dfec}.amount{background:#fff2cc;font-weight:bold}.num{text-align:right}</style>`;const summary=`<h1>廃棄一覧 ${esc(period)}</h1><table class="summary"><tr><th>項目</th><th>内容</th></tr><tr><td>対象期間</td><td>${esc(period)}</td></tr><tr><td>作成日時</td><td>${esc(created)}</td></tr><tr><td>合計kg</td><td class="num">${fmt(t.kg)}kg</td></tr><tr><td>廃棄金額</td><td class="num">${money(t.amount)}円</td></tr><tr><td>件数</td><td class="num">${rows.length}</td></tr></table>`;
const daily=wasteExcelGroupRows(rows,r=>r.date||'',r=>r.date||'').sort((a,b)=>String(a.key).localeCompare(String(b.key)));const dailyTable=`<div class="section">日別集計</div><table class="daily"><tr><th>日付</th><th>件数</th><th>数量合計(kg)</th><th>廃棄金額合計</th><th>品目</th></tr>${daily.map(x=>`<tr><td>${esc(x.label)}</td><td class="num">${x.count}</td><td class="num">${fmt(x.kg)}</td><td class="amount">${money(x.amount)}</td><td>${esc(uniqText(x.items))}</td></tr>`).join('')}</table>`;
const item=wasteExcelGroupRows(rows,r=>r.itemName||'',r=>r.itemName||'').sort((a,b)=>String(a.key).localeCompare(String(b.key),'ja'));const itemTable=`<div class="section">品目別集計</div><table class="item"><tr><th>品名</th><th>件数</th><th>数量合計(kg)</th><th>廃棄金額合計</th><th>産地</th><th>仕入先</th></tr>${item.map(x=>`<tr><td>${esc(x.label)}</td><td class="num">${x.count}</td><td class="num">${fmt(x.kg)}</td><td class="amount">${money(x.amount)}</td><td>${esc(uniqText(x.origins))}</td><td>${esc(uniqText(x.suppliers))}</td></tr>`).join('')}</table>`;
const dayItem=wasteExcelGroupRows(rows,r=>(r.date||'')+'__'+(r.itemName||''),r=>(r.date||'')+'__'+(r.itemName||'')).sort((a,b)=>String(a.key).localeCompare(String(b.key),'ja'));const dayItemTable=`<div class="section">日付別・品目別詳細</div><table class="dayitem"><tr><th>日付</th><th>品名</th><th>件数</th><th>数量合計(kg)</th><th>廃棄金額合計</th><th>産地</th><th>仕入先</th><th>備考</th></tr>${dayItem.map(x=>{const parts=String(x.key).split('__');return`<tr><td>${esc(parts[0]||'')}</td><td>${esc(parts.slice(1).join('__')||'')}</td><td class="num">${x.count}</td><td class="num">${fmt(x.kg)}</td><td class="amount">${money(x.amount)}</td><td>${esc(uniqText(x.origins))}</td><td>${esc(uniqText(x.suppliers))}</td><td>${esc(uniqText(x.memos))}</td></tr>`}).join('')}</table>`;
const detail=`<div class="section">明細一覧</div><table class="detail"><tr><th>日付</th><th>品名</th><th>数量(kg)</th><th>単価(円/kg)</th><th>金額</th><th>産地</th><th>仕入先</th><th>備考</th><th>入力者</th><th>入力日時</th><th>単価入力者</th><th>単価更新日時</th></tr>${rows.map(r=>`<tr><td>${esc(r.date||'')}</td><td>${esc(r.itemName)}</td><td class="num">${fmt(r.qty)}</td><td class="num">${Number(r.unitPrice)>0?money(r.unitPrice):''}</td><td class="amount">${Number(r.unitPrice)>0?money(wasteAmount(r)):''}</td><td>${esc(r.origin||'')}</td><td>${esc(r.supplier||'')}</td><td>${esc(r.memo||'')}</td><td>${esc(r.user||'')}</td><td>${r.createdAt?esc(dt(r.createdAt)):''}</td><td>${esc(r.priceUser||'')}</td><td>${r.priceUpdatedAt?esc(dt(r.priceUpdatedAt)):''}</td></tr>`).join('')}</table>`;return `<!doctype html><html><head><meta charset="utf-8">${styles}</head><body>${summary}${dailyTable}${itemTable}${dayItemTable}${detail}</body></html>`}
function downloadWasteExcel(){if(!canWasteExport()){alert('Excel出力できません');return}ensureWasteRecords();const s=(document.getElementById('wasteStartDate')&&document.getElementById('wasteStartDate').value)||todayKey();const e=(document.getElementById('wasteEndDate')&&document.getElementById('wasteEndDate').value)||s;const rows=wasteRowsForPeriod(s,e).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))||new Date(a.createdAt||0)-new Date(b.createdAt||0));if(!rows.length){alert('選択期間の廃棄記録はありません');return}const period=wastePeriodLabel(s,e).replace(/[〜]/g,'_');downloadTextFile(`廃棄一覧_${period}.xls`,buildWasteExcelHtml(s,e,rows),'application/vnd.ms-excel;charset=utf-8');const exportedAt=nowIso(),ids=new Set(rows.map(r=>r.id));db.wasteRecords=(db.wasteRecords||[]).map(r=>ids.has(r.id)?{...r,excelExportedAt:exportedAt,excelExportedBy:db.user,updatedAt:exportedAt}:r);save()}

function inventory(msg='',room=inventoryRoom){
inventoryRoom=room||inventoryRoom;
setScreen('inventory',[msg,inventoryRoom]);
if(!canEdit()){alert('この権限では在庫入力できません');return}
const today=todayLatestMap();
formState=allSortedItems().filter(it=>it.active!==false).map(it=>{const r=today[it.id];if(isDetailItem(it)){const lines=r&&r.lines&&r.lines.length?r.lines.map(l=>({detail:true,id:l.id||newId(),spec:String(l.spec||''),origin:String(l.origin||''),qty:String(l.qty??'')})):detailTemplate(it.id).map(d=>({detail:true,id:d.id,spec:d.spec,origin:d.origin,qty:''}));return{itemId:it.id,fromToday:!!r,lines}}return{itemId:it.id,fromToday:!!r,lines:r&&r.lines&&r.lines.length?r.lines.map(l=>({pack:String(l.pack??it.pack),cases:String(l.cases??'')})):[{pack:String(it.pack),cases:''}]}});

}
function renderInventory(msg='',err=''){
lastMessage=msg||err||'';
const roomRows=formState.filter(r=>{const it=db.items.find(x=>x.id===r.itemId);return it&&coldRoomForNormalItem(it)===inventoryRoom});
const counts={all:roomRows.length,missing:roomRows.filter(r=>!inventoryStateHasInput(r)).length,entered:roomRows.filter(r=>inventoryStateHasInput(r)||r.fromToday).length};
const visible=roomRows.filter(r=>inventoryFilter==='missing'?!inventoryStateHasInput(r):inventoryFilter==='entered'?(inventoryStateHasInput(r)||r.fromToday):true);
const filterHtml=`<div class="card"><div class="small">表示切替</div><div class="filterBtns"><button class="filterBtn all ${inventoryFilter==='all'?'on':''}" onclick="setInventoryFilter('all')">すべて<br>${counts.all}品</button><button class="filterBtn missing ${inventoryFilter==='missing'?'on':''}" onclick="setInventoryFilter('missing')">未入力だけ<br>${counts.missing}品</button><button class="filterBtn entered ${inventoryFilter==='entered'?'on':''}" onclick="setInventoryFilter('entered')">入力済みだけ<br>${counts.entered}品</button></div><div class="small">ケース数に「0」を入力すると、在庫なし（0kg）として保存されます。空欄は未入力扱いです。品目の上下ボタンで並び替えできます。まとめて登録すると、その並び順が全員共通で保存されます。</div></div>`;
const renderNormalCard=(r)=>{const realIdx=formState.indexOf(r),it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id],hasInput=inventoryStateHasInput(r),isDetail=isDetailItem(it),total=yen(r.lines.reduce((a,l)=>inventoryLineHasInput(l)?a+(l.detail?detailSubtotal(l):Number(l.pack)*Number(l.cases)):a,0)),st=hasInput?judge(total,s):'unset';const detailRows=()=>r.lines.map((l,j)=>`<div class="line"><div><label class="label">規格</label><input class="input" value="${esc(l.spec||'')}" placeholder="例：5k/L" onchange="formState[${realIdx}].lines[${j}].spec=this.value;renderInventory(lastMessage)"></div><div><label class="label">産地・備考</label><input class="input" value="${esc(l.origin||'')}" placeholder="例：福島 / 中山A" onchange="formState[${realIdx}].lines[${j}].origin=this.value;renderInventory(lastMessage)"></div><div><label class="label">数量</label><input class="input" inputmode="decimal" value="${esc(l.qty||'')}" placeholder="例：94 または 6/1" onchange="formState[${realIdx}].lines[${j}].qty=this.value;renderInventory(lastMessage)"></div><div class="kg">小計 ${inventoryLineHasInput(l)?fmt(detailSubtotal(l))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${realIdx}].lines.splice(${j},1);renderInventory(lastMessage)">削除</button>`:''}</div></div>`).join('');const normalRows=()=>r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" onchange="formState[${realIdx}].lines[${j}].pack=this.value;renderInventory(lastMessage)"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄=未入力 / 0=在庫なし" onchange="formState[${realIdx}].lines[${j}].cases=this.value;renderInventory(lastMessage)"></div><div class="kg">小計 ${inventoryLineHasInput(l)?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${realIdx}].lines.splice(${j},1);renderInventory(lastMessage)">削除</button>`:''}</div></div>`).join('');return`<section class="card ${r.fromToday||hasInput?'entered':''}"><div class="itemHead"><div><h2 style="margin:0 0 4px">${realIdx+1}. ${it.name}</h2><div class="small">${roomLabel(coldRoomForNormalItem(it))} / ${isDetail?'規格別入力（規格・産地はこの画面で修正可）':'適正在庫 '+s.min+'kg〜'+s.max+'kg / 初期入れ数 '+it.pack+'kg'}<br>仕入れ担当者：${buyerText(it)}${previousInputHtml(it.id)}${r.fromToday?'<br>本日入力済み（Supabaseデータ反映）':''}</div><div class="small" style="margin-top:8px"><button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},-1)" ${realIdx===0?'disabled':''}>上へ</button> <button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},1)" ${realIdx===formState.length-1?'disabled':''}>下へ</button></div></div><span class="badge ${hasInput?st:'unset'}">${hasInput&&total===0?'在庫なし':r.fromToday?'本日入力済み':hasInput?label(st):'未入力'}</span></div>${isDetail?`<div class="notice">胡瓜は規格別に数量を入力します。規格・産地は現場で変更できます。数量は「6/1」のようなスラッシュ入力も可能です。</div>${detailRows()}<button class="btn btn2" onclick="formState[${realIdx}].lines.push({detail:true,id:newId(),spec:'',origin:'',qty:''});renderInventory(lastMessage)">＋ 規格を追加</button>`:`${normalRows()}<button class="btn btn2" onclick="formState[${realIdx}].lines.push({pack:'',cases:''});renderInventory(lastMessage)">＋ 入れ数を追加</button>`}<div class="total"><span>合計</span><span>${hasInput?fmt(total)+'kg':'- kg'}</span></div></section>`};
const cards=visible.length?roomSectionHtml(inventoryRoom,'optimal',visible.length)+visible.map(renderNormalCard).join(''):'';
const specialCards=renderSpecialCardsForInventoryRoom(inventoryRoom);
pageShell('在庫入力','当日入力済みデータは他端末にも表示されます。翌日は未入力表示に戻ります。',`${inventoryTabsHtml(inventoryRoom)}${okHtml(msg)}${err?`<div class="err">${esc(err)}</div>`:''}${filterHtml}${cards||`<div class="card notice">${roomLabel(inventoryRoom)}の「${inventoryFilterLabel(inventoryFilter)}」に該当する通常在庫はありません。</div>`}${specialCards}<button id="saveInventoryBtn" class="btn green bottom" onclick="submitInventory()" ${!isInventorySaving?'':'disabled'}>${isInventorySaving?'保存中...':'まとめて登録'}</button>`)
}
function moveInventoryItem(idx,dir){const j=idx+dir;if(idx<0||j<0||j>=formState.length)return;const tmp=formState[idx];formState[idx]=formState[j];formState[j]=tmp;renderInventory(lastMessage||'')}
function saveInventorySortOrderFromFormState(){const seen=new Set();let n=1;for(const r of formState){const it=db.items.find(x=>x.id===r.itemId);if(it&&!seen.has(it.id)){it.sort=n++;seen.add(it.id)}}for(const it of allSortedItems()){if(!seen.has(it.id)){it.sort=n++;seen.add(it.id)}}}
function saveInventoryDetailMasterFromFormState(){db.itemDetails=db.itemDetails||{};for(const r of formState){const it=db.items.find(x=>x.id===r.itemId);if(!isDetailItem(it))continue;db.itemDetails[it.id]=r.lines.filter(l=>String(l.spec||'').trim()||String(l.origin||'').trim()).map((l,i)=>({id:l.id||newId(),spec:String(l.spec||'').trim(),origin:String(l.origin||'').trim(),sort:i+1,active:true}))}}
async function submitInventory(){
if(isInventorySaving)return;

function applyMove(itemId,type){if(isMoveSaving)return;const btn=document.getElementById('moveSaveBtn');if(btn){btn.disabled=true;btn.textContent='保存中...'}try{isMoveSaving=true;const it=db.items.find(x=>x.id===itemId),pack=Number(document.getElementById('mvPack').value),cases=Number(document.getElementById('mvCases').value),memo=document.getElementById('mvMemo').value.trim();if(!(pack>0))throw new Error('入れ数kgは0より大きくしてください');if(!(cases>=0))throw new Error('ケース数は0以上にしてください');const before=latestTotal(itemId),qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId],st=judge(after,s),rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};if(duplicateExists(rec)&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isMoveSaving=false;moveForm(itemId,type);return}db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();const msg=`${type}を保存しました。確認時刻：${currentTimeLabel()}`;isMoveSaving=false;if((st==='shortage'||st==='excess')&&canWorkerReport())lineCopyPage(msg);else stocks()}catch(e){isMoveSaving=false;alert(e.message);moveForm(itemId,type)}}

function weeklyDisplayRows(room){const rows=[];allSortedItems().filter(it=>it.active!==false).forEach(it=>rows.push({kind:'normal',group:'optimal',room:coldRoomForNormalItem(it),id:it.id,name:it.name,item:it,sort:Number(it.sort||0)}));specialItems('exchange').forEach(it=>rows.push({kind:'special',group:'nonoptimal',tableId:'exchange',room:coldRoomForSpecialItem('exchange',it),id:it.id,name:it.name,item:it,sort:Number(it.sort||0)}));specialItems('kataoka').forEach(it=>rows.push({kind:'special',group:'kataoka',tableId:'kataoka',room:coldRoomForSpecialItem('kataoka',it),id:it.id,name:it.name,item:it,sort:Number(it.sort||0)}));const groupOrder={optimal:1,nonoptimal:2,kataoka:3};return rows.filter(r=>!room||r.room===room).sort((a,b)=>groupOrder[a.group]-groupOrder[b.group]||a.sort-b.sort||String(a.name).localeCompare(String(b.name),'ja'))}
function detailLineKey(l){return `${String(l.spec||'').trim()}|${String(l.origin||'').trim()}`}
function detailLineName(base,l){return `${base} ${String(l.spec||'').trim()}${l.origin?' '+String(l.origin).trim():''}`.trim()}
function weeklyTableRowsForDisplay(baseRows,dayKeys,normalMap,specialMap){const out=[];for(const row of baseRows){if(row.kind==='normal'){const recs=dayKeys.map(dk=>normalMap[row.id+'_'+dk]).filter(Boolean);const hasDetail=recs.some(r=>r.lines&&r.lines.some(l=>l.detail));if(hasDetail){const m=new Map();recs.forEach(r=>(r.lines||[]).filter(l=>l.detail&&String(l.qty||'').trim()!=='').forEach(l=>{const k=detailLineKey(l);if(!m.has(k))m.set(k,{...row,kind:'normal_detail',detailKey:k,name:detailLineName(row.name,l),sort:row.sort})}));[...m.values()].forEach(x=>out.push(x));continue}}out.push(row)}return out.filter(row=>dayKeys.some(dk=>row.kind==='normal'?normalMap[row.id+'_'+dk]:row.kind==='normal_detail'?(()=>{const r=normalMap[row.id+'_'+dk];return r&&(r.lines||[]).some(l=>l.detail&&detailLineKey(l)===row.detailKey&&String(l.qty||'').trim()!=='')})():specialMap[row.tableId+'_'+row.id+'_'+dk]))}
function weeklyTableHtml(k,recs,spRecs,open=false,room=weeklyRoom){const s=new Date(k+'T00:00:00'),days=[...Array(7)].map((_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d});const dayKeys=days.map(d=>ymdKey(d));const normalMap={},specialMap={};recs.forEach(r=>{const dk=ymdKey(new Date(r.createdAt));if(!dayKeys.includes(dk))return;const key=r.itemId+'_'+dk;if(!normalMap[key]||new Date(r.createdAt)>new Date(normalMap[key].createdAt))normalMap[key]=r});spRecs.forEach(r=>{const dk=ymdKey(new Date(r.createdAt));if(!dayKeys.includes(dk))return;const key=r.tableId+'_'+r.itemId+'_'+dk;if(!specialMap[key]||new Date(r.createdAt)>new Date(specialMap[key].createdAt))specialMap[key]=r});const displayRows=weeklyTableRowsForDisplay(weeklyDisplayRows(room),dayKeys,normalMap,specialMap);const count=displayRows.length;const body=displayRows.map(row=>{const header='';const cells=dayKeys.map(dk=>{if(row.kind==='normal_detail'){const r=normalMap[row.id+'_'+dk],l=r?(r.lines||[]).find(x=>x.detail&&detailLineKey(x)===row.detailKey&&String(x.qty||'').trim()!==''):null;return`<td class="${dk===todayKey()?'today ':''}${l?'normal':'unset'}">${l?`${esc(l.qty)}<br><span class="small">${fmt(Number(l.subtotal||detailSubtotal(l)))}kg</span>`:'-'}</td>`}if(row.kind==='normal'){const r=normalMap[row.id+'_'+dk],st=r?judge(Number(r.total||0),db.settings[row.id]):'unset';return`<td class="${dk===todayKey()?'today ':''}${r?st:'unset'}">${r?`<span class="stockVal">${fmt(r.total)}kg</span><br><span class="badge ${st}">${label(st)}</span>`:'-'}</td>`}else{const r=specialMap[row.tableId+'_'+row.id+'_'+dk];return`<td class="${dk===todayKey()?'today ':''}${r?'normal':'unset'}">${r?`<span class="stockVal">${fmt(r.qty)}${esc(r.unit||row.item.unit||'')}</span>`:'-'}</td>`}}).join('');return header+`<tr><td>${esc(row.name)}</td>${cells}</tr>`}).join('');return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${ymd(s)}〜${ymd(days[6])}</h2><div class="small">${roomLabel(room)} / 表示 ${count}品 / 数字が入っている品目のみ表示 / 通常在庫は不足=赤、過多=オレンジ、適正=緑</div></div><button class="btn btn2" onclick="toggleWeek('${k}')">開閉</button></div><div id="week_${k}" class="weeklyWrap" style="display:${open?'block':'none'}"><table class="weeklyTable"><thead><tr><th>品目名</th>${days.map(d=>`<th class="${ymdKey(d)===todayKey()?'today':''}">${d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})}<br>${'日月火水木金土'[d.getDay()]}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div></div>`}

function addOptimalStockChangeLog(it,before,after,memo=''){
 if(!it||!before||!after)return;
 const changed=Number(before.min)!==Number(after.min)||Number(before.max)!==Number(after.max);
 if(!changed)return;
 db.optimalStockChangeLogs=db.optimalStockChangeLogs||[];
 db.optimalStockChangeLogs.push({id:newId(),itemId:it.id,itemName:it.name,oldMin:Number(before.min),oldMax:Number(before.max),newMin:Number(after.min),newMax:Number(after.max),changedBy:db.user,changedById:db.userId,role:db.role,memo,changedAt:nowIso()});
}

function duplicateGroups(){const groups={};(db.records||[]).forEach(r=>{if(!r.createdAt)return;const d=new Date(r.createdAt),hour=d.toISOString().slice(0,13);const key=[ymdKey(d),r.itemId,r.kind,Number(r.total||0),r.user||'',hour].join('|');groups[key]=groups[key]||[];groups[key].push(r)});return Object.values(groups).filter(g=>g.length>1).map(g=>g.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt))).sort((a,b)=>new Date(b[0].createdAt)-new Date(a[0].createdAt))}

function settings(){setScreen('settings');if(!canSetSettings()){alert('設定できません');return}const itemsForSettings=allSortedItems().sort((a,b)=>{if(db.role==='buyer'){const aa=isMyBuyerItem(a.id)?0:1,bb=isMyBuyerItem(b.id)?0:1;if(aa!==bb)return aa-bb}return(a.sort||0)-(b.sort||0)});pageShell('適正在庫設定','下限kg〜上限kgの幅を設定できます。仕入れ担当者は自分の担当品目が上に表示されます。',`<div class="settingsList">${itemsForSettings.map(it=>{const s=db.settings[it.id];return`<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg / ${it.active===false?'停止中':'有効'}<br>仕入れ担当者：${buyerText(it)}${isMyBuyerItem(it.id)?'<br>あなたの担当品目です':''}<br>${optimalStockLastText(it.id)}</div></div><div><label class="label">下限kg</label><input id="min_${it.id}" class="input" inputmode="decimal" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" inputmode="decimal" value="${s.max}"></div></div>`}).join('')}</div><button class="btn green bottom settingsSaveBtn" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value),max=Number(document.getElementById('max_'+it.id).value);if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください。`);return}const before={...(db.settings[it.id]||{})};const after={min,max};db.settings[it.id]=after;addOptimalStockChangeLog(it,before,after,'適正在庫設定画面から変更')}save();alert('保存しました');settings()}
function buyerAssignFormHtml(itemId){const assigned=new Set(itemId?assignedBuyerIds(itemId):[]);return `<div class="memo"><label class="label">仕入れ担当者</label><div class="small">参照：${BUYER_SOURCE_NOTE}</div>${buyerUsers().map(u=>`<label class="switch"><input class="buyerCheck" type="checkbox" value="${u.id}" ${assigned.has(u.id)?'checked':''}> ${esc(u.name)}</label>`).join('')||'<span class="small">仕入れ担当者が登録されていません</span>'}</div>`}
function itemsPage(msg=''){setScreen('itemsPage',[msg]);if(!canManageItems()){alert('品目設定は管理者・青果社員のみです');return home()}const normalRows=allSortedItems().map(it=>{const s=db.settings[it.id]||{min:'-',max:'-'};return`<div class="card"><div class="itemHead"><div><b>${it.sort}. ${esc(it.name)}</b><div class="small">通常在庫 / ${roomLabel(coldRoomForNormalItem(it))} / 初期入れ数 ${it.pack}kg / 適正 ${s.min}kg〜${s.max}kg<br>仕入れ担当者：${buyerText(it)}</div></div><span class="badge ${it.active===false?'unset':'normal'}">${it.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="itemFormPage('${it.id}')">編集</button><button class="btn ${it.active===false?'green':'red'}" onclick="toggleItemActive('${it.id}')">${it.active===false?'有効化':'停止'}</button><button class="btn danger" onclick="deleteItem('${it.id}')">削除</button><button class="btn btn2" onclick="moveItemSort('${it.id}',-1)">上へ</button></div></div>`}).join('');const specialSection=(tableId)=>{const info=specialTableInfo(tableId),rows=allSpecialItems(tableId).map(it=>`<div class="card"><div class="itemHead"><div><b>${it.sort}. ${esc(it.name)}</b><div class="small">${esc(info.title)} / 適正在庫設定外 / ${roomLabel(coldRoomForSpecialItem(tableId,it))} / 単位：${esc(it.unit||'ケース')}</div></div><span class="badge ${it.active===false?'unset':'normal'}">${it.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="specialItemFormPage('${tableId}','${it.id}')">編集</button><button class="btn ${it.active===false?'green':'red'}" onclick="toggleSpecialItemActive('${tableId}','${it.id}')">${it.active===false?'有効化':'停止'}</button><button class="btn danger" onclick="deleteSpecialItem('${tableId}','${it.id}')">削除</button><button class="btn btn2" onclick="moveSpecialItemSort('${tableId}','${it.id}',-1)">上へ</button></div></div>`).join('');return`<div class="card notice"><b>${esc(info.title)}：適正在庫設定外</b><div class="small">ここで追加・編集した品目は、適正在庫判定や発注候補には入りません。</div><button class="btn green" style="width:100%;margin-top:10px" onclick="specialItemFormPage('${tableId}','')">＋ ${esc(info.title)}の品目を追加</button></div>${rows||'<div class="card notice">品目がありません。</div>'}`};pageShell('品目設定','管理者・青果社員が、通常在庫と適正在庫設定外の品目を追加・編集・削除できます。',`${okHtml(msg)}<div class="card notice">削除すると入力画面・在庫表には表示されません。過去の入力記録自体は残します。</div><div class="card notice"><b>通常在庫：適正在庫対象</b><div class="small">適正在庫設定・発注候補に使用します。</div><button class="btn green" style="width:100%;margin-top:10px" onclick="itemFormPage('')">＋ 通常在庫の品目を追加</button></div>${normalRows}${specialSection('exchange')}${specialSection('kataoka')}`)}
function itemFormPage(itemId){setScreen('itemFormPage',[itemId]);if(!canManageItems())return home();const it=itemId?db.items.find(x=>x.id===itemId&&x.deleted!==true):null;const s=it?db.settings[it.id]:null;pageShell(it?'通常在庫 品目編集':'通常在庫 品目追加','管理者・青果社員が操作できます。通常在庫は適正在庫設定・発注候補に使用します。',`<div class="card"><label class="label">品目名</label><input id="itemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：きゅうり"><br><br><label class="label">初期入れ数kg</label><input id="itemPack" class="input" inputmode="decimal" value="${it?it.pack:''}" placeholder="例：5"><br><br><label class="label">保管冷蔵庫</label><select id="itemRoom" class="input">${coldRoomOptionsHtml(it?coldRoomForNormalItem(it):'room3')}</select><br><br><div class="notice">通常在庫は適正在庫対象です。適正在庫と関係ない品目は、品目設定の「その他」または「その他（片岡）」に追加してください。下限・上限を空欄にすると、初期入れ数から自動作成します。</div><div class="row"><div><label class="label">適正在庫 下限kg</label><input id="itemMin" class="input" inputmode="decimal" value="${s?s.min:''}" placeholder="自動"></div><div><label class="label">適正在庫 上限kg</label><input id="itemMax" class="input" inputmode="decimal" value="${s?s.max:''}" placeholder="自動"></div></div><br><label class="switch"><input id="itemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label>${buyerAssignFormHtml(itemId)}<br><br><button class="btn green" style="width:100%" onclick="saveItem('${itemId||''}')">保存</button></div>`)}
function saveItem(itemId){if(!canManageItems())return;const name=document.getElementById('itemName').value.trim(),pack=Number(document.getElementById('itemPack').value),room=document.getElementById('itemRoom').value,active=document.getElementById('itemActive').checked;let checked=[...document.querySelectorAll('.buyerCheck:checked')].map(x=>x.value);if(!name)return alert('品目名を入力してください');if(!(pack>0))return alert('初期入れ数kgは0より大きくしてください');if(!validColdRoom(room))return alert('保管冷蔵庫を選択してください');let minVal=document.getElementById('itemMin').value.trim(),maxVal=document.getElementById('itemMax').value.trim();let min=minVal===''?Math.max(10,pack*5):Number(minVal),max=maxVal===''?Math.max(20,pack*12):Number(maxVal);min=yen(min);max=yen(max);if(!(min>=0)||!(max>=0)||min>max)return alert('適正在庫の下限・上限を確認してください');if(!itemId&&checked.length===0)checked=autoBuyerIdsForName(name);let id=itemId;if(itemId){const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return alert('品目が見つかりません');const oldSetting={...(db.settings[itemId]||{})};it.name=name;it.pack=pack;it.room=room;it.active=active;db.settings[itemId]={min,max};addOptimalStockChangeLog({id:itemId,name},oldSetting,db.settings[itemId],'品目編集画面から変更')}else{id=newId();const sort=(db.items.reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1);db.items.push({id,name,pack,room,sort,active,deleted:false});db.settings[id]={min,max};db.purchaseMemos[id]=''}db.buyerAssignments=db.buyerAssignments||{};for(const u of buyerUsers()){db.buyerAssignments[u.id]=db.buyerAssignments[u.id]||[];db.buyerAssignments[u.id]=db.buyerAssignments[u.id].filter(x=>x!==id);if(checked.includes(u.id))db.buyerAssignments[u.id].push(id)}save();itemsPage('保存しました')}
function toggleItemActive(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;it.active=it.active===false;save();itemsPage(it.active===false?'停止しました':'有効化しました')}
function deleteItem(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;if(!confirm(`${it.name}を削除します。\n入力画面・在庫表には表示されなくなります。\n過去の入力記録は残します。\n本当に削除しますか？`))return;it.deleted=true;it.active=false;db.buyerAssignments=db.buyerAssignments||{};for(const uid of Object.keys(db.buyerAssignments)){db.buyerAssignments[uid]=(db.buyerAssignments[uid]||[]).filter(x=>x!==itemId)}save();itemsPage('品目を削除しました')}
function moveItemSort(itemId,dir){if(!canManageItems())return;const items=allSortedItems();const idx=items.findIndex(x=>x.id===itemId),j=idx+dir;if(idx<0||j<0||j>=items.length)return;const a=items[idx],b=items[j],tmp=a.sort;a.sort=b.sort;b.sort=tmp;save();itemsPage()}
function specialItemFormPage(tableId,itemId){setScreen('specialItemFormPage',[tableId,itemId]);if(!canManageItems())return home();const info=specialTableInfo(tableId),it=itemId?allSpecialItems(tableId).find(x=>x.id===itemId):null;pageShell(it?`${info.title} 品目編集`:`${info.title} 品目追加`,'適正在庫設定外の品目です。適正在庫判定・発注候補には入りません。',`<div class="card"><label class="label">品目名</label><input id="spItemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：胡瓜 5kg入れ"><br><br><label class="label">単位</label><input id="spItemUnit" class="input" value="${esc(it?it.unit||'ケース':'ケース')}" placeholder="例：ケース、基、kg"><br><br><label class="label">保管冷蔵庫</label><select id="spItemRoom" class="input">${coldRoomOptionsHtml(it?coldRoomForSpecialItem(tableId,it):(tableId==='kataoka'?'room2':'room3'))}</select><br><br><label class="switch"><input id="spItemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label><br><br><button class="btn green" style="width:100%" onclick="saveSpecialItem('${tableId}','${itemId||''}')">保存</button></div>`)}
function saveSpecialItem(tableId,itemId){if(!canManageItems())return;const name=document.getElementById('spItemName').value.trim(),unit=(document.getElementById('spItemUnit').value.trim()||'ケース'),room=document.getElementById('spItemRoom').value,active=document.getElementById('spItemActive').checked;if(!name)return alert('品目名を入力してください');if(!validColdRoom(room))return alert('保管冷蔵庫を選択してください');db.specialItems=db.specialItems||{};db.specialItems[tableId]=db.specialItems[tableId]||[];if(itemId){const it=db.specialItems[tableId].find(x=>x.id===itemId&&x.deleted!==true);if(!it)return alert('品目が見つかりません');it.name=name;it.unit=unit;it.room=room;it.active=active}else{const sort=db.specialItems[tableId].reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1;db.specialItems[tableId].push({id:newId(),name,unit,room,sort,active,deleted:false})}save();itemsPage('保存しました')}
function toggleSpecialItemActive(tableId,itemId){if(!canManageItems())return;const it=(db.specialItems?.[tableId]||[]).find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;it.active=it.active===false;save();itemsPage(it.active===false?'停止しました':'有効化しました')}
function deleteSpecialItem(tableId,itemId){if(!canManageItems())return;const it=(db.specialItems?.[tableId]||[]).find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;if(!confirm(`${it.name}を削除します。\n入力画面・在庫表には表示されなくなります。\n過去の入力記録は残します。\n本当に削除しますか？`))return;it.deleted=true;it.active=false;save();itemsPage('品目を削除しました')}
function moveSpecialItemSort(tableId,itemId,dir){if(!canManageItems())return;const items=allSpecialItems(tableId);const idx=items.findIndex(x=>x.id===itemId),j=idx+dir;if(idx<0||j<0||j>=items.length)return;const a=items[idx],b=items[j],tmp=a.sort;a.sort=b.sort;b.sort=tmp;save();itemsPage()}
function resetData(){alert('既存データ保護のため、データ初期化は停止しています。')}

function monthStartKey(d){const x=new Date(d);return new Date(x.getFullYear(),x.getMonth(),1).toLocaleDateString('sv-SE')}
function addMonthsToKey(key,months){const d=new Date(key+'T00:00:00');d.setMonth(d.getMonth()+months);return monthStartKey(d)}
function previousMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-1)}
function deletableLatestMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-4)}
function monthLabel(key){const [y,m]=key.split('-');return `${y}年${Number(m)}月分`}
function recordMonthKey(r){return monthStartKey(new Date(r.createdAt))}
function isMonthlyExcelRecord(r){return r&&(r.kind==='一括入力'||r.kind==='当日分修正')}
function recordsForMonth(key){return (db.records||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key&&isMonthlyExcelRecord(r))}
function movementsForMonth(key){return (db.movements||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key)}
function notificationsForMonth(key){return (db.notifications||[]).filter(r=>r.sentAt&&recordMonthKey({createdAt:r.sentAt})===key)}
function monthlyKeysWithRecords(){return [...new Set((db.records||[]).filter(r=>r.createdAt&&isMonthlyExcelRecord(r)).map(recordMonthKey))].sort().reverse()}
function monthlyArchive(key){db.monthlyArchives=db.monthlyArchives||{};db.monthlyArchives[key]=db.monthlyArchives[key]||{targetMonth:key,status:'pending'};return db.monthlyArchives[key]}
function monthlyExportTasks(){const prev=previousMonthKey();return monthlyKeysWithRecords().filter(k=>k<=prev).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>!x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyDeleteTasks(){const limit=deletableLatestMonthKey();return monthlyKeysWithRecords().filter(k=>k<=limit).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyHomeNoticeHtml(){const tasks=monthlyExportTasks();if(!tasks.length)return'';const t=tasks[0];return`<div class="card warn flash"><b>月次在庫Excel作成</b><div class="small">${monthLabel(t.key)}の在庫Excelを作成できます。管理画面からExcel作成を実行してください。</div><button class="btn orange" style="width:100%;margin-top:10px" onclick="monthlyArchivePage()">月次Excel・履歴管理を開く</button></div>`}
function escapeCsv(v){const s=String(v??'');return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function downloadTextFile(filename,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500)}
function buildMonthlyExcelHtml(key,rows){
 const itemsBase=allSortedItems().slice();
 const itemMap=Object.fromEntries(itemsBase.map(it=>[it.id,it]));
 rows.forEach(r=>{if(r.itemId&&!itemMap[r.itemId]){const it={id:r.itemId,name:r.itemName||r.itemId,pack:'',sort:9999,active:true};itemsBase.push(it);itemMap[it.id]=it}});
 const items=itemsBase.filter(it=>it.active!==false||rows.some(r=>r.itemId===it.id)).sort((a,b)=>(a.sort||9999)-(b.sort||9999));
 const [yy,mm]=key.split('-').map(Number),monthStart=new Date(yy,mm-1,1),monthEnd=new Date(yy,mm,0);
 const jpDate=d=>d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
 const md=d=>d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
 const hm=d=>d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
 const wname=d=>'日月火水木金土'[d.getDay()];
 const weekStart=d=>{const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x};
 const latest={};
 rows.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).forEach(r=>{const d=new Date(r.createdAt),dk=ymdKey(d);latest[r.itemId+'_'+dk]=r});
 const weeks=[];for(let s=weekStart(monthStart);s<=monthEnd;s.setDate(s.getDate()+7)){const x=new Date(s);weeks.push(x)}
 const styles=`<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827}h1{font-size:22px}table{border-collapse:collapse;margin:0 0 22px 0}th,td{border:1px solid #bfbfbf;padding:7px 9px;vertical-align:middle;white-space:nowrap}th{background:#d9eaf7;font-weight:bold}.summary th{background:#e2f0d9}.weekTitle{background:#1f4e79;color:white;font-size:18px;font-weight:bold;text-align:left}.item{background:#f8fafc;font-weight:bold}.normal{background:#d9ead3}.shortage{background:#f4cccc}.excess{background:#fce4d6}.unset{background:#f2f2f2;color:#666}.small{font-size:11px;color:#555}.note{color:#555}</style>`;
 const summary=`<h1>在庫履歴 ${monthLabel(key)} 週区切り横長表</h1><table class="summary"><tr><th>項目</th><th>内容</th></tr><tr><td>対象月</td><td>${monthLabel(key)}</td></tr><tr><td>作成日時</td><td>${dt(nowIso())}</td></tr><tr><td>履歴件数</td><td>${rows.length}</td></tr><tr><td>形式</td><td>週区切り・横長形式（品目を縦、日付を横）</td></tr><tr><td>注意</td><td>このファイルを保存後、アプリ内で「Excel保存確認」にチェックしてください。</td></tr></table>`;
 const weekly=weeks.map((ws,wi)=>{const days=[...Array(7)].map((_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d});const dayKeys=days.map(d=>ymdKey(d));const shown=days.filter(d=>d>=monthStart&&d<=monthEnd);const title=`第${wi+1}週　${jpDate(shown[0]||days[0])}〜${jpDate(shown[shown.length-1]||days[6])}`;return `<table><tr><td class="weekTitle" colspan="8">${title}</td></tr><tr><th>品目</th>${days.map(d=>`<th>${md(d)}<br>${wname(d)}</th>`).join('')}</tr>${items.map(it=>`<tr><td class="item">${esc(it.name)}</td>${dayKeys.map((dk,i)=>{const d=days[i];if(d<monthStart||d>monthEnd)return `<td class="unset">対象外</td>`;const r=latest[it.id+'_'+dk];if(!r)return `<td class="unset">-</td>`;const st=r.status||judge(Number(r.total||0),db.settings[it.id]);return `<td class="${st}"><b>${fmt(r.total)}kg</b><br>${label(st)}<br><span class="small">${hm(new Date(r.createdAt))} ${esc(r.user||'')}</span></td>`}).join('')}</tr>`).join('')}</table>`}).join('');
 const detail=[];rows.forEach(r=>{(r.lines&&r.lines.length?r.lines:[{}]).forEach(l=>detail.push({日付:jpDate(new Date(r.createdAt)),時刻:hm(new Date(r.createdAt)),品目:r.itemName||'',区分:r.kind||'',合計kg:r.total??'',判定:label(r.status),入れ数kg:l.pack??'',ケース数:l.cases??'',小計kg:l.subtotal??'',入力者:r.user||''}))});
 const cols=['日付','時刻','品目','区分','合計kg','判定','入れ数kg','ケース数','小計kg','入力者'];
 const detailTable=`<h2>詳細履歴一覧</h2><div class="note">このExcelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴は含めません。</div><table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>${detail.map(row=>`<tr>${cols.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</table>`;
 return `<html><head><meta charset="utf-8">${styles}</head><body>${summary}${weekly}${detailTable}</body></html>`
}
function downloadMonthlyExcel(key){if(!canAdmin())return alert('管理者のみ実行できます');const rows=recordsForMonth(key);if(!rows.length)return alert('対象月の在庫入力データがありません');const filename=`在庫履歴_${key.slice(0,7)}.xls`;downloadTextFile(filename,buildMonthlyExcelHtml(key,rows),'application/vnd.ms-excel;charset=utf-8');const a=monthlyArchive(key);a.status=a.status==='deleted'?'deleted':'excel_created';a.excelFilename=filename;a.excelRowCount=rows.length;a.excelCreatedAt=nowIso();a.excelCreatedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}のExcelを作成しました。PCに保存できたら「Excel保存確認」にチェックしてください。`)}
function toggleMonthlySavedCheck(key,checked){const a=monthlyArchive(key);a.savedCheck=checked;save();monthlyArchivePage()}
function confirmMonthlyExcelSaved(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelCreatedAt)return alert('先にExcelを作成してください');if(!a.savedCheck)return alert('Excel保存確認にチェックしてください');a.status='excel_saved';a.excelSavedAt=nowIso();a.excelSavedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}をExcel保存確認済みとして記録しました。`)}
function monthlyArchivePage(msg=''){setScreen('monthlyArchivePage',[msg]);if(!canAdmin()){alert('管理者のみ表示できます');return home()}const exports=monthlyExportTasks(),deletes=monthlyDeleteTasks(),archives=db.monthlyArchives||{};const history=Object.keys(archives).sort().reverse().slice(0,24);pageShell('月次Excel・履歴管理','Excel保存確認後、3ヶ月経過した月だけ削除できます。',`${okHtml(msg)}<div class="notice">Excelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴はExcelに含めません。削除は「Excel作成済み」かつ「Excel保存確認済み」かつ「3ヶ月経過後」の records のみ可能です。入庫・出庫・調整などの修正履歴 movements と通知履歴 notifications は、この画面では削除せず、「90日超 修正履歴整理」画面で管理者確認後に削除します。</div>${exports.length?`<section class="card"><h2 style="margin-top:0">Excel保存が必要な月</h2>${exports.map(t=>monthlyExportCard(t)).join('')}</section>`:'<div class="card ok">Excel保存が必要な月はありません。</div>'}${deletes.length?`<section class="card"><h2 style="margin-top:0">履歴削除候補</h2>${deletes.map(t=>monthlyDeleteCard(t)).join('')}</section>`:'<div class="card notice">削除できる古い履歴はありません。</div>'}${history.length?`<section class="card"><h2 style="margin-top:0">月次処理履歴</h2><table class="table"><tr><th>対象月</th><th>状態</th><th>件数</th><th>日時</th></tr>${history.map(k=>{const a=archives[k];return`<tr><td>${monthLabel(k)}</td><td>${monthlyStatusLabel(a.status)}</td><td>${a.excelRowCount??recordsForMonth(k).length}</td><td>${a.deletedAt?dt(a.deletedAt):a.excelSavedAt?dt(a.excelSavedAt):a.excelCreatedAt?dt(a.excelCreatedAt):'-'}</td></tr>`}).join('')}</table></section>`:''}`)}
function monthlyStatusLabel(st){return st==='deleted'?'削除済み':st==='excel_saved'?'Excel保存確認済み':st==='excel_created'?'Excel作成済み':'未処理'}
function monthlyExportCard(t){const a=t.archive;return`<div class="box" style="margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">対象件数：${t.rowCount.toLocaleString()}件 ${a.excelCreatedAt?`/ Excel作成：${dt(a.excelCreatedAt)}`:''}</div></div><span class="badge ${a.excelSavedAt?'normal':a.excelCreatedAt?'excess':'unset'}">${monthlyStatusLabel(a.status)}</span></div><button class="btn blue" style="width:100%;margin-top:10px" onclick="downloadMonthlyExcel('${t.key}')">Excelを作成してダウンロード</button>${a.excelCreatedAt?`<label class="switch" style="margin-top:10px"><input type="checkbox" ${a.savedCheck?'checked':''} onchange="toggleMonthlySavedCheck('${t.key}',this.checked)"> ExcelファイルをPCに保存したことを確認しました</label><button class="btn green" style="width:100%;margin-top:10px" onclick="confirmMonthlyExcelSaved('${t.key}')" ${a.savedCheck?'':'disabled'}>Excel保存済みとして記録</button>`:''}</div>`}
function monthlyDeleteCard(t){const a=t.archive;return`<div class="box" style="background:#fff8f8;border:1px solid #fecaca;margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">現在残っている件数：${t.rowCount.toLocaleString()}件<br>Excel保存確認日：${a.excelSavedAt?dt(a.excelSavedAt):'-'}</div></div><span class="badge shortage">削除候補</span></div><button class="btn danger" style="width:100%;margin-top:10px" onclick="monthlyDeleteConfirmPage('${t.key}')">履歴削除</button></div>`}
function monthlyDeleteConfirmPage(key){setScreen('monthlyDeleteConfirmPage',[key]);if(!canAdmin())return home();const a=monthlyArchive(key),rows=recordsForMonth(key);if(!a.excelSavedAt||key>deletableLatestMonthKey()||a.status==='deleted'){alert('この月は削除できません');return monthlyArchivePage()}pageShell('履歴削除の確認',`${monthLabel(key)} / ${rows.length}件`, `<div class="card err"><h2 style="margin-top:0">${monthLabel(key)}の在庫変更履歴を削除します。</h2><p>この操作は取り消せません。<br>対象月のExcelファイルが保存済みであることを確認してください。</p><p><b>本当に削除しますか？</b></p><div class="row"><button class="btn btn2" onclick="monthlyArchivePage()">キャンセル</button><button class="btn danger" onclick="deleteMonthlyHistory('${key}')">削除する</button></div></div>`)}
function deleteMonthlyHistory(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelSavedAt) return alert('Excel保存確認が済んでいないため削除できません');if(key>deletableLatestMonthKey()) return alert('この月はまだ削除できません。3ヶ月分の保持期間が終わってから削除できます。');if(a.status==='deleted') return alert('この月は既に削除済みです');const beforeRecords=db.records.length;db.records=db.records.filter(r=>!r.createdAt||recordMonthKey(r)!==key);a.status='deleted';a.deletedAt=nowIso();a.deletedBy=db.user;a.deletedCount=beforeRecords-db.records.length;a.deletedMovementsCount=0;a.deletedNotificationsCount=0;a.deleteNote='月次Excel保存後削除ではrecordsのみ削除。movements/notificationsは90日超整理画面で削除。';save();monthlyArchivePage(`${monthLabel(key)}の在庫入力データを削除しました。削除件数：${a.deletedCount}件`)}

async function copyTextFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t);alert('コピーしました')}catch(e){prompt('コピーしてください',t)}}function shareLineFrom(id){location.href=`https://line.me/R/share?text=${encodeURIComponent(document.getElementById(id).value)}`}async function shareLineWorksFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t)}catch(e){}if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{alert('本文をコピーしました。LINE WORKSを開いて貼り付けてください。')}}function shareTextFrom(id){shareLineFrom(id)}
async function boot(){document.getElementById('app').innerHTML='<main class="wrap"><div class="card notice">Supabase最新データを読み込み中です...</div></main>';applyDisplaySettings(DEFAULT_DISPLAY_SETTINGS);try{await loadCloud()}catch(e){console.error(e);cloudReady=false}if(db.userId){const u=findUser(db.userId);if(u){applyDisplaySettings(u.displaySettings)}}login()}
boot();

</script></body></html>
