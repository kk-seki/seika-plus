</style></head><body><div id="app"></div><script>

const ITEMS=[['item1','レタス',8],['item2','サニー',4],['item3','リーフ',4],['item4','ロメイン',5],['item5','水菜',5],['item6','長葱',10],['item7','小葱',10],['item8','大葉',3],['item9','青梗菜',2],['item10','小松菜',7],['item11','ほうれん草',6],['item12','ゴーヤ',3],['item13','茄子',5],['item14','長茄子',4],['item15','トマト',4],['item16','ピーマン',4],['item17','白菜',15],['item18','ミニトマト',3],['item19','紫キャベツ',10]].map((x,i)=>({id:x[0],name:x[1],pack:x[2],sort:i+1,active:true}));

const DEFAULT_BUYER_ASSIGNMENTS={seki_hiroshi:[],araki:[],saito_dai:['item6','item9','item13','item15','item16','item18','item19'],yoshida:['item1','item2','item3','item4','item17'],sakamoto:['item5','item7','item8','item10','item11']};

const LEGACY_STATE_ID='ishioka_inventory_'+'de'+'mo_v6_linecopy_weekly';
const STATE_ID=STORE;
const ROLE={admin:'管理者',worker:'青果社員',buyer:'仕入れ担当者',viewer:'その他（閲覧のみ）'};
const GROUP={admin:'管理者',worker:'青果社員',buyer:'仕入れ担当者',viewer:'その他（閲覧のみ）'};
let db=init(),formState=[],cloudReady=false,saveTimer=null,lastSyncAt=null,isInventorySaving=false,isMoveSaving=false,currentScreen='login',currentArgs=[],lastMessage='';
const DAY_MS=86400000,RETENTION_DAYS=90;
function newId(){return window.crypto&&crypto.randomUUID?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(16).slice(2)}
function defaultState(){const settings=Object.fromEntries(ITEMS.map(it=>[it.id,{min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)}]));return{user:null,userId:null,role:null,settings,records:[],movements:[],notifications:[],items:ITEMS,purchaseMemos:{},pins:{},users:DEFAULT_USERS,buyerAssignments:(typeof structuredClone==='function'?structuredClone(DEFAULT_BUYER_ASSIGNMENTS):JSON.parse(JSON.stringify(DEFAULT_BUYER_ASSIGNMENTS)))}}
function normalize(d){const base=defaultState();d=d||{};d={...base,...d};d.records=(d.records||[]).sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));d.movements=d.movements||[];d.notifications=d.notifications||[];d.items=d.items&&d.items.length?d.items:ITEMS;d.items=d.items.map((it,i)=>({...it,pack:Number(it.pack||0),sort:Number(it.sort||i+1),active:it.active!==false}));d.settings=d.settings||base.settings;d.purchaseMemos=d.purchaseMemos||{};d.pins=d.pins||{};d.users=(d.users&&d.users.length?d.users:DEFAULT_USERS).map(u=>({...u,active:u.active!==false,group:u.group||GROUP[u.role]||'その他'}));d.buyerAssignments=d.buyerAssignments||{};for(const u of d.users){if(u.role==='buyer'&&!d.buyerAssignments[u.id])d.buyerAssignments[u.id]=[]}for(const du of DEFAULT_USERS){if(!d.users.find(u=>u.id===du.id))d.users.push(du)}for(const it of d.items){if(!d.settings[it.id])d.settings[it.id]={min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)};if(d.purchaseMemos[it.id]===undefined)d.purchaseMemos[it.id]=''}return d}
function init(){try{const saved=localStorage.getItem(STORE)||localStorage.getItem(LEGACY_STATE_ID);if(saved)return normalize(JSON.parse(saved))}catch(e){}return defaultState()}
function activeUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.active!==false)}function findUser(id){return (db.users||DEFAULT_USERS).find(u=>u.id===id)}function buyerUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.role==='buyer'&&u.active!==false)}function activeItems(){return (db.items||[]).filter(it=>it.active!==false)}function allSortedItems(){return (db.items||[]).slice().sort((a,b)=>(a.sort||0)-(b.sort||0))}
function assignedBuyerIds(itemId){const ba=db.buyerAssignments||{};return Object.keys(ba).filter(uid=>(ba[uid]||[]).includes(itemId))}function buyerNamesForItem(itemId){return assignedBuyerIds(itemId).map(uid=>findUser(uid)).filter(Boolean).map(u=>u.name)}function autoBuyerIdsForName(name){const uid=ITEM_BUYER_MASTER[String(name||'').trim()];return uid?[uid]:[]}
function buyerText(it){const names=buyerNamesForItem(it.id);return names.length?names.map(esc).join('、'):'未設定'}function buyerHtml(it){const names=buyerNamesForItem(it.id);return `<div class="memo"><span class="small">仕入れ担当者：${names.length?names.map(esc).join('、'):'未設定'}</span></div>`}function memoText(it){const memo=(db.purchaseMemos&&db.purchaseMemos[it.id])||'';return memo?esc(memo).replace(/\n/g,' / '):'未入力'}
function isMyBuyerItem(itemId){return db.role==='buyer'&&((db.buyerAssignments||{})[db.userId]||[]).includes(itemId)}
function cloudPayload(){return{settings:db.settings,records:db.records,movements:db.movements,notifications:db.notifications,items:db.items,purchaseMemos:db.purchaseMemos,pins:db.pins,users:db.users,buyerAssignments:db.buyerAssignments}}
function markSync(){lastSyncAt=new Date();localStorage.setItem(STORE+'_lastSyncAt',lastSyncAt.toISOString())}
function syncText(){const s=lastSyncAt||(()=>{try{const v=localStorage.getItem(STORE+'_lastSyncAt');return v?new Date(v):null}catch(e){return null}})();return s?`最終同期：${s.toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}`:'最終同期：未同期'}
async function fetchState(id){const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${encodeURIComponent(id)}&select=data`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});if(!res.ok)throw new Error(await res.text());return await res.json()}
async function loadCloud(){let rows=await fetchState(STATE_ID);if(!(rows&&rows[0]&&rows[0].data)){rows=await fetchState(LEGACY_STATE_ID).catch(()=>[])}if(rows&&rows[0]&&rows[0].data){const u=db.user,uid=db.userId,r=db.role;db=normalize({...rows[0].data,user:u,userId:uid,role:r});localStorage.setItem(STORE,JSON.stringify(db));markSync()}cloudReady=true}
async function saveCloudNow(){if(!cloudReady)return;const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state`,{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id:STATE_ID,data:cloudPayload(),updated_at:new Date().toISOString()})});if(!res.ok)throw new Error(await res.text());markSync();updateSyncDisplay()}
function save(){localStorage.setItem(STORE,JSON.stringify(db));clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveCloudNow().catch(e=>{console.error(e);alert('保存に失敗しました。通信状態またはSupabase設定を確認してください。')}),300)}
async function refreshData(){try{const u=db.user,uid=db.userId,r=db.role;await loadCloud();db.user=u;db.userId=uid;db.role=r;localStorage.setItem(STORE,JSON.stringify(db));alert('最新データを再読み込みしました。');renderCurrent()}catch(e){console.error(e);alert('データの再読み込みに失敗しました。通信状況を確認してください。')}}
function renderCurrent(){const fn=window[currentScreen];if(typeof fn==='function')fn(...currentArgs);else home()}
function yen(n){return Math.round(Number(n||0)*100)/100}function fmt(n){return yen(n).toLocaleString('ja-JP')}function nowIso(){return new Date().toISOString()}function dt(iso){return new Date(iso).toLocaleString('ja-JP')}function ymd(d){return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}function ymdKey(d){return new Date(d).toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function judge(total,s){if(!s)return'unset';if(total<s.min)return'shortage';if(total>s.max)return'excess';return'normal'}function label(st){return st==='shortage'?'不足':st==='excess'?'過多':st==='normal'?'適正':'未設定'}
function canEdit(){return db.role==='admin'||db.role==='worker'}function canAdmin(){return db.role==='admin'}function canBuyerView(){return db.role==='admin'||db.role==='buyer'}function canWorkerReport(){return db.role==='admin'||db.role==='worker'}function canSetSettings(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canManageItems(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canPin(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canViewMemo(){return db.role==='admin'||db.role==='buyer'||db.role==='worker'}function canEditMemo(){return db.role==='admin'||db.role==='buyer'}
function latestMap(records=db.records){const latest={};records.slice().sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0)).forEach(r=>latest[r.itemId]=r);return latest}function latestRecord(itemId){return latestMap()[itemId]||null}function latestTotal(itemId){const r=latestRecord(itemId);return r?Number(r.total||0):0}
function todayKey(){return ymdKey(new Date())}function isToday(iso){return ymdKey(new Date(iso))===todayKey()}function withinDays(iso,days=RETENTION_DAYS){return new Date(iso).getTime()>=Date.now()-days*DAY_MS}function records90(){return db.records.filter(r=>r.createdAt&&withinDays(r.createdAt))}function movements90(){return db.movements.filter(r=>r.createdAt&&withinDays(r.createdAt))}function notifications90(){return db.notifications.filter(r=>r.sentAt&&withinDays(r.sentAt))}
function todayLatestMap(){return latestMap(db.records.filter(r=>r.createdAt&&isToday(r.createdAt)))}
function duplicateExists(rec){const d=ymdKey(new Date(rec.createdAt));return db.records.some(r=>r.id!==rec.id&&ymdKey(new Date(r.createdAt))===d&&r.itemId===rec.itemId&&r.kind===rec.kind&&Number(r.total||0)===Number(rec.total||0))}
function isPinned(itemId){const uid=db.userId||db.user||'';return(db.pins[uid]||[]).includes(itemId)}
function sortedItems(){const uid=db.userId||db.user||'';const pinSet=new Set(db.pins[uid]||[]);return activeItems().slice().sort((a,b)=>{const aa=isMyBuyerItem(a.id)?0:1,bb=isMyBuyerItem(b.id)?0:1;if(aa!==bb)return aa-bb;const ap=pinSet.has(a.id)?0:1,bp=pinSet.has(b.id)?0:1;if(ap!==bp)return ap-bp;return(a.sort||0)-(b.sort||0)})}
function updateSyncDisplay(){const el=document.getElementById('syncInfo');if(el)el.textContent=syncText()}
function setScreen(name,args=[]){currentScreen=name;currentArgs=args}
function pageShell(title,sub,body,opts={}){const showBack=db.user&&!opts.noBack&&title!=='在庫管理';document.getElementById('app').innerHTML=`<div class="head"><div class="headin"><div><div class="title">${title}</div><div class="sub">${sub||''}</div><div class="sync" id="syncInfo">${syncText()}</div></div><div class="topBtns">${db.user?`${showBack?`<button class="headAction primary" onclick="goBack()">戻る</button>`:''}<button class="headAction primary" onclick="home()">ホーム</button><button class="headAction" onclick="refreshData()">再読込</button><button class="headAction" onclick="accountMenu()">メニュー</button>`:''}</div></div></div><main class="wrap">${body}</main>`}
function goBack(){home()}
function login(){setScreen('login');const grouped={};activeUsers().forEach(u=>{grouped[u.group]=grouped[u.group]||[];grouped[u.group].push(u)});const options=Object.keys(grouped).map(g=>`<optgroup label="${g}">${grouped[g].map(u=>`<option value="${u.id}">${u.name} / ${ROLE[u.role]}</option>`).join('')}</optgroup>`).join('');pageShell('石岡青果センター 在庫管理',cloudReady?'Supabase保存':'ブラウザ保存',`<div class="card"><div class="notice">入力データは共有保存され、別端末でも確認できます。</div><label class="label">名前を選択</label><select id="loginUser" class="input"><option value="" selected disabled>選択してください</option>${options}</select><br><br><label class="label">パスワード</label><input id="loginPass" class="input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()"><br><br><button class="btn green" style="width:100%" onclick="doLogin()">ログイン</button></div>`,{noBack:true})}
function doLogin(){const uid=document.getElementById('loginUser').value,pass=document.getElementById('loginPass').value;if(!uid){alert('名前を選択してください');return}const u=findUser(uid);if(!u||u.active===false||pass!==u.password){alert('パスワードが違います');return}db.user=u.name;db.userId=u.id;db.role=u.role;localStorage.setItem(STORE,JSON.stringify(db));home()}
function home(){setScreen('home');if(!db.user)return login();const todayEntered=Object.keys(todayLatestMap()).filter(id=>activeItems().some(it=>it.id===id)).length,shortageCount=activeItems().filter(it=>judge(latestTotal(it.id),db.settings[it.id])==='shortage').length,excessCount=activeItems().filter(it=>judge(latestTotal(it.id),db.settings[it.id])==='excess').length,lastInput=db.records.length?db.records.slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))[0]:null,lastInputText=lastInput?new Date(lastInput.createdAt).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'未入力';pageShell('在庫管理',`${esc(db.user)} / ${ROLE[db.role]} / ${cloudReady?'Supabase保存':'ブラウザ保存'}`,`<div class="notice">最新データを確認したい時は、右上の再読み込みを押してください。</div><div class="card grid">${canBuyerView()?`<div class="box"><span class="small">発注候補</span><b>${shortageCount}品</b></div>`:''}${canWorkerReport()?`<div class="box"><span class="small">過多品目</span><b>${excessCount}品</b></div>`:''}<div class="box"><span class="small">最終入力</span><b>${lastInputText}</b></div><div class="box"><span class="small">本日入力済み</span><b>${todayEntered}/${activeItems().length}品</b></div></div><div class="menu"><button class="btn green" onclick="inventory()" ${canEdit()?'':'disabled'}>在庫入力</button><button class="btn blue" onclick="stocks()">在庫修正</button>${canWorkerReport()?`<button class="btn blue" onclick="lineCopyPage()">在庫報告コピー</button>`:''}${canBuyerView()?`<button class="btn orange" onclick="orderCandidatePage()">発注候補</button>`:''}<button class="btn btn2" onclick="marketMemoPage()">市場動向・産地状況メモ</button><button class="btn btn2" onclick="weeklyData()">在庫表</button><button class="btn btn2" onclick="moveHistory()">修正履歴</button><button class="btn btn2" onclick="notifications()">通知履歴</button><button class="btn btn2" onclick="settings()" ${canSetSettings()?'':'disabled'}>適正在庫設定</button><button class="btn btn2" onclick="itemsPage()" ${canManageItems()?'':'disabled'}>品目設定</button></div>${!canEdit()?'<div class="warn">この権限では在庫の変更はできません。</div>':''}`,{noBack:true})}
function accountMenu(){setScreen('accountMenu');pageShell('メニュー',`${esc(db.user)} / ${ROLE[db.role]}`,`<div class="menu"><button class="btn btn2" onclick="changePasswordPage()">パスワード変更</button>${canAdmin()?`<button class="btn btn2" onclick="userAdminPage()">ユーザー登録・管理</button>`:''}<button class="btn red" onclick="logout()">ログアウト</button></div>`)}
function logout(){db.user=null;db.userId=null;db.role=null;localStorage.setItem(STORE,JSON.stringify(db));login()}
function changePasswordPage(){setScreen('changePasswordPage');pageShell('パスワード変更','ログイン中のユーザーのパスワードを変更します',`<div class="card"><label class="label">現在のパスワード</label><input id="oldPass" class="input" type="password"><br><br><label class="label">新しいパスワード</label><input id="newPass" class="input" type="password" placeholder="4文字以上"><br><br><label class="label">新しいパスワード（確認）</label><input id="newPass2" class="input" type="password"><br><br><button class="btn green" style="width:100%" onclick="changePassword()">変更する</button></div>`)}
function changePassword(){const u=findUser(db.userId),old=document.getElementById('oldPass').value,np=document.getElementById('newPass').value,np2=document.getElementById('newPass2').value;if(!u)return alert('ユーザーが見つかりません');if(old!==u.password)return alert('現在のパスワードが違います');if(np.length<4)return alert('新しいパスワードは4文字以上にしてください');if(np!==np2)return alert('確認用パスワードが一致しません');u.password=np;save();alert('パスワードを変更しました');accountMenu()}
function userAdminPage(){setScreen('userAdminPage');if(!canAdmin())return home();const rows=(db.users||[]).map(u=>`<div class="card"><div class="itemHead"><div><b>${esc(u.name)}</b><div class="small">${ROLE[u.role]} / ID: ${esc(u.id)} / ${u.active===false?'停止中':'有効'}</div></div><span class="badge ${u.active===false?'unset':'normal'}">${u.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="editUserPage('${u.id}')">編集</button><button class="btn ${u.active===false?'green':'red'}" onclick="toggleUserActive('${u.id}')" ${u.id===db.userId?'disabled':''}>${u.active===false?'有効化':'停止'}</button><button class="btn btn2" onclick="resetUserPassword('${u.id}')">初期PWに戻す</button></div></div>`).join('');pageShell('ユーザー登録・管理','管理者のみ表示されます',`<button class="btn green" style="width:100%" onclick="newUserPage()">＋ 新規ユーザー登録</button>${rows}`)}
function newUserPage(){setScreen('newUserPage');if(!canAdmin())return home();pageShell('新規ユーザー登録','管理者のみ',userFormHtml(null))}function editUserPage(uid){setScreen('editUserPage',[uid]);if(!canAdmin())return home();const u=findUser(uid);if(!u)return alert('ユーザーが見つかりません');pageShell('ユーザー編集','管理者のみ',userFormHtml(u))}
function userFormHtml(u){return`<div class="card"><label class="label">名前</label><input id="uName" class="input" value="${esc(u?u.name:'')}"><br><br><label class="label">権限</label><select id="uRole" class="input" onchange="document.getElementById('uGroup').value=GROUP[this.value]||''"><option value="worker" ${u&&u.role==='worker'?'selected':''}>青果社員</option><option value="buyer" ${u&&u.role==='buyer'?'selected':''}>仕入れ担当者</option><option value="viewer" ${u&&u.role==='viewer'?'selected':''}>その他（閲覧のみ）</option><option value="admin" ${u&&u.role==='admin'?'selected':''}>管理者</option></select><br><br><label class="label">グループ表示名</label><input id="uGroup" class="input" value="${esc(u?u.group:'青果社員')}"><br><br><label class="label">ログインID</label><input id="uId" class="input" value="${esc(u?u.id:'')}" ${u?'disabled':''} placeholder="英数字推奨"><br><br><label class="label">パスワード</label><input id="uPass" class="input" type="text" value="${esc(u?u.password:'seki1111')}"><br><br><label class="switch"><input id="uActive" type="checkbox" ${!u||u.active!==false?'checked':''}> 有効</label><br><br><button class="btn green" style="width:100%" onclick="saveUser('${u?u.id:''}')">保存</button></div>`}
function saveUser(editId){if(!canAdmin())return;const name=document.getElementById('uName').value.trim(),role=document.getElementById('uRole').value,group=document.getElementById('uGroup').value.trim()||GROUP[role],uid=(editId||document.getElementById('uId').value.trim()),pass=document.getElementById('uPass').value,active=document.getElementById('uActive').checked;if(!name)return alert('名前を入力してください');if(!uid)return alert('ログインIDを入力してください');if(!/^[A-Za-z0-9_-]+$/.test(uid))return alert('ログインIDは半角英数字・_・-で入力してください');if(pass.length<4)return alert('パスワードは4文字以上にしてください');if(!editId&&findUser(uid))return alert('このログインIDは既に使われています');if(editId){const u=findUser(editId);u.name=name;u.role=role;u.group=group;u.password=pass;u.active=active;if(editId===db.userId){db.user=name;db.role=role}}else{db.users.push({id:uid,name,role,group,password:pass,active})}save();alert('保存しました');userAdminPage()}
function toggleUserActive(uid){if(!canAdmin()||uid===db.userId)return;const u=findUser(uid);if(!u)return;u.active=u.active===false;save();userAdminPage()}function resetUserPassword(uid){if(!canAdmin())return;const u=findUser(uid);if(!u)return;if(confirm(`${u.name}のパスワードを初期値に戻しますか？`)){u.password=u.role==='viewer'?'0000':'seki1111';save();alert('戻しました');userAdminPage()}}
function inventory(){setScreen('inventory');if(!canEdit()){alert('この権限では在庫入力できません');return}const today=todayLatestMap();formState=allSortedItems().filter(it=>it.active!==false).map(it=>{const r=today[it.id];return{itemId:it.id,fromToday:!!r,lines:r&&r.lines&&r.lines.length?r.lines.map(l=>({pack:String(l.pack??it.pack),cases:String(l.cases??'')})):[{pack:String(it.pack),cases:''}]}});renderInventory()}
function renderInventory(msg='',err=''){lastMessage=msg||err||'';const cards=formState.map((r,idx)=>{const it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id],hasInput=r.lines.some(l=>l.pack!==''&&l.cases!==''),total=yen(r.lines.reduce((a,l)=>l.pack!==''&&l.cases!==''?a+Number(l.pack)*Number(l.cases):a,0)),st=hasInput?judge(total,s):'unset';return`<section class="card ${r.fromToday||hasInput?'entered':''}"><div class="itemHead"><div><h2 style="margin:0 0 4px">${it.name}</h2><div class="small">適正在庫 ${s.min}kg〜${s.max}kg / 初期入れ数 ${it.pack}kg<br>仕入れ担当者：${buyerText(it)}${r.fromToday?'<br>本日入力済み（Supabaseデータ反映）':''}</div></div><span class="badge ${hasInput?st:'unset'}">${r.fromToday?'本日入力済み':hasInput?label(st):'未入力'}</span></div>${r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" onchange="formState[${idx}].lines[${j}].pack=this.value;renderInventory()"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄可" onchange="formState[${idx}].lines[${j}].cases=this.value;renderInventory()"></div><div class="kg">小計 ${l.pack!==''&&l.cases!==''?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${idx}].lines.splice(${j},1);renderInventory()">削除</button>`:''}</div></div>`).join('')}<button class="btn btn2" onclick="formState[${idx}].lines.push({pack:'',cases:''});renderInventory()">＋ 入れ数を追加</button><div class="total"><span>合計</span><span>${hasInput?fmt(total)+'kg':'- kg'}</span></div></section>`}).join('');pageShell('在庫入力','当日入力済みデータは他端末にも表示されます。翌日は未入力表示に戻ります。',`${msg?`<div class="ok">${msg}</div>`:''}${err?`<div class="err">${err}</div>`:''}${cards||'<div class="card notice">有効な品目がありません。</div>'}<button id="saveInventoryBtn" class="btn green bottom" onclick="submitInventory()" ${cards&&!isInventorySaving?'':'disabled'}>${isInventorySaving?'保存中...':'まとめて登録'}</button>`)}
async function submitInventory(){if(isInventorySaving)return;try{isInventorySaving=true;renderInventory();const results=[];for(const r of formState){const it=db.items.find(x=>x.id===r.itemId),lines=[];for(const l of r.lines){if(l.pack===''&&l.cases!=='')throw new Error(`${it.name}: 入れ数も入力してください。`);if(l.pack!==''&&l.cases!==''){const p=Number(l.pack),c=Number(l.cases);if(!(p>0))throw new Error(`${it.name}: 入れ数は0より大きくしてください。`);if(!(c>=0))throw new Error(`${it.name}: ケース数は0以上にしてください。`);lines.push({pack:p,cases:c,subtotal:yen(p*c)})}}if(lines.length){const todayPrev=todayLatestMap()[it.id]||null,before=todayPrev?Number(todayPrev.total||0):null,total=yen(lines.reduce((a,l)=>a+l.subtotal,0)),s=db.settings[it.id],st=judge(total,s),rec={id:newId(),kind:todayPrev?'当日分修正':'一括入力',itemId:it.id,itemName:it.name,total,setting:{...s},status:st,lines,user:db.user,role:db.role,createdAt:nowIso()};results.push({rec,before,todayPrev})}}if(!results.length)throw new Error('入力された品目がありません。');if(results.some(x=>duplicateExists(x.rec))&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isInventorySaving=false;renderInventory();return}for(const x of results){const rec=x.rec;db.records.push(rec);if(x.todayPrev&&Number(x.before)!==Number(rec.total)){db.movements.push({id:newId(),recordId:rec.id,itemId:rec.itemId,itemName:rec.itemName,type:'当日分修正',beforeTotal:x.before,afterTotal:rec.total,diffKg:yen(rec.total-x.before),pack:null,cases:null,memo:'当日入力分の修正',user:db.user,role:db.role,createdAt:rec.createdAt})}}const alerts=results.map(x=>x.rec).filter(r=>r.status==='shortage'||r.status==='excess').map(r=>makeNotification(r));db.notifications.push(...alerts);save();if(alerts.length&&canWorkerReport())lineCopyPage(`登録しました。入力品目：${results.length}件。`);else if(alerts.length&&canBuyerView())orderCandidatePage(`登録しました。入力品目：${results.length}件。`);else inventory();alert(`登録しました。入力品目：${results.length}件。`)}catch(e){renderInventory('',e.message)}finally{isInventorySaving=false;}}
function makeNotification(r){return{id:newId(),recordId:r.id,itemId:r.itemId,itemName:r.itemName,status:r.status,total:r.total,message:lineMessage(r),sentResult:'コピー用に作成',sentAt:nowIso(),user:db.user}}function lineMessage(r){const diff=r.status==='shortage'?r.setting.min-r.total:r.total-r.setting.max;return`${r.status==='shortage'?'【在庫不足】':'【在庫過多】'} ${r.itemName} ${fmt(r.total)}kg（適正 ${r.setting.min}kg〜${r.setting.max}kg / ${r.status==='shortage'?'不足':'超過'} ${fmt(diff)}kg）`}
function makeLineCopyText(){const latest=latestMap(),excess=[],shortage=[];activeItems().forEach(it=>{const r=latest[it.id];if(!r)return;const st=judge(Number(r.total||0),db.settings[it.id]);if(st==='excess')excess.push(`・${it.name}：${fmt(r.total)}kg`);if(st==='shortage')shortage.push(`・${it.name}：${fmt(r.total)}kg`)});return`【在庫報告】\n\n■ 過多品目\n${excess.length?excess.join('\n'):'なし'}\n\n■ 不足品目\n${shortage.length?shortage.join('\n'):'なし'}`}
function lineCopyPage(msg=''){setScreen('lineCopyPage',[msg]);if(!canWorkerReport()){alert('管理者・青果社員のみ表示できます');home();return}pageShell('在庫報告コピー','管理者・青果社員のみ利用できます',`${msg?`<div class="ok">${msg}</div>`:''}<div class="card"><textarea id="lineCopyText" class="textarea">${esc(makeLineCopyText())}</textarea><div class="row" style="margin-top:10px"><button class="btn blue" onclick="copyTextFrom('lineCopyText')">コピー</button><button class="btn btn2" onclick="shareTextFrom('lineCopyText')">LINE共有を開く</button></div></div>`)}
function orderCandidates(){const latest=latestMap();return sortedItems().map(it=>{const r=latest[it.id],total=r?Number(r.total||0):0,s=db.settings[it.id],shortage=yen(Math.max(0,s.min-total));return{it,r,total,s,shortage}}).filter(x=>x.shortage>0)}
function orderCandidatesForBuyer(uid){return orderCandidates().filter(x=>assignedBuyerIds(x.it.id).includes(uid))}
function makeOrderCopyTextForRows(title,rows){return`【発注候補】\n${rows.length?rows.map(x=>`${x.it.name}：${fmt(x.shortage)}kg不足`).join('\n'):'なし'}`}
function makeOrderCopyText(buyerId=null){const rows=buyerId?orderCandidatesForBuyer(buyerId):orderCandidates();const title=buyerId?(findUser(buyerId)?.name||'担当者'):'全体';return makeOrderCopyTextForRows(title,rows)}
function orderCopyGroups(){if(db.role==='buyer'){const u=findUser(db.userId);return[{id:db.userId,title:u?u.name:db.user,rows:orderCandidatesForBuyer(db.userId)}]}const groups=buyerUsers().map(u=>({id:u.id,title:u.name,rows:orderCandidatesForBuyer(u.id)})).filter(g=>g.rows.length);const unassigned=orderCandidates().filter(x=>!assignedBuyerIds(x.it.id).length);if(unassigned.length)groups.push({id:'unassigned',title:'仕入れ担当者未設定',rows:unassigned});return groups}
function orderCandidatePage(msg=''){setScreen('orderCandidatePage',[msg]);if(!canBuyerView()){alert('管理者・仕入れ担当者のみ表示できます');home();return}const allRows=orderCandidates(),rows=db.role==='buyer'?orderCandidatesForBuyer(db.userId):allRows,groups=orderCopyGroups();pageShell('発注候補','管理者・仕入れ担当者のみ表示',`${msg?`<div class="ok">${msg}</div>`:''}<div class="notice">下限kgを下回っている有効品目だけ表示します。コピー文は仕入れ担当者別に分けています。</div>${groups.length?groups.map(g=>{const id='orderCopyText_'+g.id;return`<div class="card"><label class="label">${esc(g.title)}さん向けコピー文</label><textarea id="${id}" class="textarea">${esc(makeOrderCopyTextForRows(g.title,g.rows))}</textarea><div class="row" style="margin-top:10px"><button class="btn blue" onclick="copyTextFrom('${id}')">${esc(g.title)}分をコピー</button><button class="btn btn2" onclick="shareTextFrom('${id}')">LINE共有を開く</button></div></div>`}).join(''):'<div class="card notice">コピー対象の発注候補はありません。</div>'}${rows.length?rows.map(x=>itemCard(x.it,x.r,x.total,true,x.shortage)).join(''):'<div class="card notice">現在、発注候補はありません。</div>'}`)}
function marketMemoPage(){setScreen('marketMemoPage');if(!canViewMemo()){alert('表示できません');return home()}const items=allSortedItems().filter(it=>it.active!==false);pageShell('市場動向・産地状況メモ','仕入れ担当者が品目ごとに市場動向や産地状況を共有するメモ欄です。',`<div class="notice">品目ごとに市場動向・産地状況・注意点を残せます。在庫入力画面とは別で管理します。</div>${items.map(it=>{const memo=(db.purchaseMemos&&db.purchaseMemos[it.id])||'';const mine=isMyBuyerItem(it.id);return`<section class="card"><div class="itemHead"><div><h2 style="margin:0 0 4px">${esc(it.name)}</h2><div class="small">仕入れ担当者：${buyerText(it)}${mine?'<br>あなたの担当品目です':''}</div></div><span class="badge ${memo?'normal':'unset'}">${memo?'入力済み':'未入力'}</span></div><div class="memo"><label class="label">市場動向・産地状況メモ（品目別）</label><textarea id="marketMemo_${it.id}" class="textarea" placeholder="例：産地切替予定、相場高騰、入荷不安、品質状況など" ${canEditMemo()?'':'disabled'}>${esc(memo)}</textarea>${canEditMemo()?`<button class="btn btn2" style="margin-top:8px;width:100%" onclick="saveMarketMemo('${it.id}')">メモを保存</button>`:'<div class="small" style="margin-top:8px">閲覧のみ</div>'}</div></section>`}).join('')||'<div class="card notice">有効な品目がありません。</div>'}`)}
function saveMarketMemo(itemId){if(!canEditMemo()){alert('編集できません');return}db.purchaseMemos[itemId]=document.getElementById('marketMemo_'+itemId).value;save();alert('保存しました');marketMemoPage()}
function memoHtml(it){if(!canViewMemo())return'';const memo=db.purchaseMemos[it.id]||'';if(canEditMemo())return`<div class="memo"><label class="label">仕入れメモ</label><textarea id="memo_${it.id}" class="textarea" style="min-height:90px">${esc(memo)}</textarea><button class="btn btn2" style="margin-top:8px" onclick="saveMemo('${it.id}')">メモを保存</button></div>`;return`<div class="memo"><span class="small">仕入れメモ（閲覧のみ）</span><br>${memo?esc(memo).replace(/\n/g,'<br>'):'<span class="small">未入力</span>'}</div>`}
function saveMemo(itemId){if(!canEditMemo()){alert('編集できません');return}db.purchaseMemos[itemId]=document.getElementById('memo_'+itemId).value;save();alert('保存しました')}function pinButton(it,back){if(!canPin())return'';return`<button class="pin ${isPinned(it.id)?'on':''}" onclick="togglePin('${it.id}','${back}')">${isPinned(it.id)?'★ ピン済':'☆ ピン'}</button>`}function togglePin(itemId,back){const uid=db.userId||db.user||'';db.pins[uid]=db.pins[uid]||[];if(isPinned(itemId))db.pins[uid]=db.pins[uid].filter(x=>x!==itemId);else db.pins[uid].push(itemId);save();if(back==='orders')orderCandidatePage();else stocks()}
function itemCard(it,r,total,order=false,shortage=0){const s=db.settings[it.id],st=r?judge(total,s):'unset';return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${it.name}</h2><div class="small">適正在庫 ${s.min}kg〜${s.max}kg / 初期入れ数 ${it.pack}kg${r?`<br>最終更新 ${dt(r.createdAt)} / ${esc(r.user)}`:''}</div></div><div style="text-align:right">${pinButton(it,order?'orders':'stocks')}<br><br><span class="badge ${order?'shortage':st}">${order?fmt(shortage)+'kg不足':r?label(st):'未入力'}</span></div></div><div class="grid" style="margin-top:10px"><div class="box"><span class="small">現在庫</span><b>${fmt(total)}kg</b></div><div class="box"><span class="small">${order?'推奨発注量':'在庫目安'}</span><b>${order?fmt(shortage)+'kg':st==='shortage'?fmt(s.min-total)+'kg不足':st==='excess'?fmt(total-s.max)+'kg過多':'-'}</b></div></div>${r&&r.lines?`<div class="small" style="margin-top:8px">内訳：${r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、')}</div>`:''}${order?buyerHtml(it):''}${order?'':`<div class="mini" style="grid-template-columns:1fr 1fr"><button class="btn green" onclick="moveForm('${it.id}','入庫')" ${canEdit()?'':'disabled'}>入庫（増）</button><button class="btn orange" onclick="moveForm('${it.id}','出庫')" ${canEdit()?'':'disabled'}>出庫（減）</button></div>`}</div>`}
function stocks(){setScreen('stocks');const latest=latestMap();pageShell('在庫修正','入庫＝在庫を増やす / 出庫＝在庫を減らす。修正履歴に理由を残せます。',`${!canEdit()?'<div class="warn">閲覧のみです。在庫修正は管理者・青果社員だけできます。</div>':''}${sortedItems().map(it=>{const r=latest[it.id];return itemCard(it,r,r?Number(r.total):0,false,0)}).join('')||'<div class="card notice">有効な品目がありません。</div>'}`)}
function moveForm(itemId,type){setScreen('moveForm',[itemId,type]);if(!canEdit()){alert('この権限では在庫修正できません');return}const it=db.items.find(x=>x.id===itemId),current=latestTotal(itemId);pageShell(`${type}入力`,`${it.name} / 現在庫 ${fmt(current)}kg`,`<div class="card"><div class="notice">入庫は在庫を増やし、出庫は在庫を減らします。入れ数kg × ケース数で数量を入力します。</div><label class="label">品目</label><input class="input" value="${it.name}" disabled><br><br><div class="row"><div><label class="label">入れ数kg</label><input id="mvPack" class="input" inputmode="decimal" value="${it.pack}"></div><div><label class="label">ケース数</label><input id="mvCases" class="input" inputmode="decimal" value="1"></div></div><br><label class="label">理由・メモ</label><input id="mvMemo" class="input" placeholder="例：朝入荷、出荷分、廃棄分"><br><br><button id="moveSaveBtn" class="btn ${type==='入庫'?'green':'orange'}" style="width:100%" onclick="applyMove('${itemId}','${type}')" ${isMoveSaving?'disabled':''}>${isMoveSaving?'保存中...':type+'を登録する'}</button></div>`)}
function applyMove(itemId,type){if(isMoveSaving)return;try{isMoveSaving=true;const it=db.items.find(x=>x.id===itemId),pack=Number(document.getElementById('mvPack').value),cases=Number(document.getElementById('mvCases').value),memo=document.getElementById('mvMemo').value.trim();if(!(pack>0))throw new Error('入れ数kgは0より大きくしてください');if(!(cases>=0))throw new Error('ケース数は0以上にしてください');const before=latestTotal(itemId),qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId],st=judge(after,s),rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};if(duplicateExists(rec)&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isMoveSaving=false;return}db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();if((st==='shortage'||st==='excess')&&canWorkerReport())lineCopyPage(`${type}を登録しました。`);else{alert(`${type}を登録しました。`);stocks()}}catch(e){alert(e.message)}finally{isMoveSaving=false}}
function weeklyData(){setScreen('weeklyData');const recs=records90();if(!recs.length){pageShell('在庫表','在庫を表形式で確認できます','<div class="card notice">在庫表はまだありません。</div>');return}const weekStarts={};recs.forEach(r=>{const d=new Date(r.createdAt);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));const k=ymdKey(d);weekStarts[k]=true});const keys=Object.keys(weekStarts).sort().reverse();pageShell('在庫表','品目ごとに日々の在庫を横比較できます',keys.map((k,i)=>weeklyTableHtml(k,recs,i===0)).join(''))}
function weeklyTableHtml(k,recs,open=false){const s=new Date(k+'T00:00:00'),days=[...Array(7)].map((_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d});const dayKeys=days.map(d=>ymdKey(d));const map={};recs.forEach(r=>{const dk=ymdKey(new Date(r.createdAt));if(!dayKeys.includes(dk))return;const key=r.itemId+'_'+dk;if(!map[key]||new Date(r.createdAt)>new Date(map[key].createdAt))map[key]=r});const count=Object.keys(map).length;return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${ymd(s)}〜${ymd(days[6])}</h2><div class="small">表示セル ${count}件 / 未入力は「-」</div></div><button class="btn btn2" onclick="toggleWeek('${k}')">開閉</button></div><div id="week_${k}" class="weeklyWrap" style="display:${open?'block':'none'}"><table class="weeklyTable"><thead><tr><th>品目名</th>${days.map(d=>`<th class="${ymdKey(d)===todayKey()?'today':''}">${d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})}<br>${'日月火水木金土'[d.getDay()]}</th>`).join('')}</tr></thead><tbody>${allSortedItems().filter(it=>it.active!==false).map(it=>`<tr><td>${esc(it.name)}</td>${dayKeys.map(dk=>{const r=map[it.id+'_'+dk];return`<td class="${dk===todayKey()?'today':''}">${r?`${fmt(r.total)}kg<br><span class="badge ${r.status}">${label(r.status)}</span>`:'-'}</td>`}).join('')}</tr>`).join('')}</tbody></table></div></div>`}
function toggleWeek(k){const el=document.getElementById('week_'+k);el.style.display=el.style.display==='none'?'block':'none'}
function moveHistory(){setScreen('moveHistory');const rows=movements90().slice().reverse();pageShell('修正履歴','当日入力分の修正や、在庫の入庫・出庫・調整を確認できます',rows.length?`${rows.map(m=>`<div class="card"><div class="itemHead"><div><b>${m.itemName}</b> <span class="pill unset">${m.type}</span><div class="small">${dt(m.createdAt)} / ${esc(m.user)}</div></div><span class="badge ${m.diffKg<0?'shortage':m.diffKg>0?'normal':'unset'}">${m.diffKg>0?'+':''}${fmt(m.diffKg)}kg</span></div><div class="total"><span>${fmt(m.beforeTotal)}kg → ${fmt(m.afterTotal)}kg</span><span>${m.pack?`${m.pack}kg×${m.cases}ケース`:''}</span></div>${m.memo?`<div class="small">メモ：${esc(m.memo)}</div>`:''}</div>`).join('')}`:'<div class="card notice">修正履歴はありません。</div>')}
function notifications(){setScreen('notifications');const rows=notifications90().slice().reverse();pageShell('通知履歴','直近90日以内の不足・過多になった記録',rows.length?rows.map(n=>`<div class="card"><span class="badge ${n.status}">${label(n.status)}</span><h2>${n.itemName}</h2><div class="small">${dt(n.sentAt)} / ${n.sentResult}</div><pre>${esc(n.message)}</pre></div>`).join(''):'<div class="card notice">直近90日以内の通知履歴はありません。</div>')}
function settings(){setScreen('settings');if(!canSetSettings()){alert('設定できません');return}pageShell('適正在庫設定','下限kg〜上限kgの幅を設定できます',`${allSortedItems().map(it=>{const s=db.settings[it.id];return`<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg / ${it.active===false?'停止中':'有効'}<br>仕入れ担当者：${buyerText(it)}</div></div><div><label class="label">下限kg</label><input id="min_${it.id}" class="input" inputmode="decimal" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" inputmode="decimal" value="${s.max}"></div></div>`}).join('')}<button class="btn green bottom" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value),max=Number(document.getElementById('max_'+it.id).value);if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください。`);return}db.settings[it.id]={min,max}}save();alert('保存しました');settings()}
function buyerAssignFormHtml(itemId){const assigned=new Set(itemId?assignedBuyerIds(itemId):[]);return `<div class="memo"><label class="label">仕入れ担当者</label><div class="small">参照：${BUYER_SOURCE_NOTE}</div>${buyerUsers().map(u=>`<label class="switch"><input class="buyerCheck" type="checkbox" value="${u.id}" ${assigned.has(u.id)?'checked':''}> ${esc(u.name)}</label>`).join('')||'<span class="small">仕入れ担当者が登録されていません</span>'}</div>`}
function itemsPage(){setScreen('itemsPage');if(!canManageItems()){alert('品目設定は管理者・青果社員・仕入れ担当者のみです');return home()}pageShell('品目設定','品目追加・編集・停止ができます',`<button class="btn green" style="width:100%" onclick="itemFormPage('')">＋ 品目を追加</button>${allSortedItems().map(it=>{const s=db.settings[it.id];return`<div class="card"><div class="itemHead"><div><b>${it.sort}. ${esc(it.name)}</b><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}kg〜${s.max}kg</div></div><span class="badge ${it.active===false?'unset':'normal'}">${it.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="itemFormPage('${it.id}')">編集</button><button class="btn ${it.active===false?'green':'red'}" onclick="toggleItemActive('${it.id}')">${it.active===false?'有効化':'停止'}</button><button class="btn btn2" onclick="moveItemSort('${it.id}',-1)">上へ</button></div></div>`}).join('')}`)}
function itemFormPage(itemId){setScreen('itemFormPage',[itemId]);if(!canManageItems())return home();const it=itemId?db.items.find(x=>x.id===itemId):null;const s=it?db.settings[it.id]:null;pageShell(it?'品目編集':'品目追加','管理者・青果社員・仕入れ担当者が操作できます',`<div class="card"><label class="label">品目名</label><input id="itemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：きゅうり"><br><br><label class="label">初期入れ数kg</label><input id="itemPack" class="input" inputmode="decimal" value="${it?it.pack:''}" placeholder="例：5"><br><br><div class="notice">下限・上限を空欄にすると、初期入れ数から自動作成します。下限＝入れ数×5、上限＝入れ数×12です。</div><div class="row"><div><label class="label">適正在庫 下限kg</label><input id="itemMin" class="input" inputmode="decimal" value="${s?s.min:''}" placeholder="自動"></div><div><label class="label">適正在庫 上限kg</label><input id="itemMax" class="input" inputmode="decimal" value="${s?s.max:''}" placeholder="自動"></div></div><br><label class="switch"><input id="itemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label>${buyerAssignFormHtml(itemId)}<br><br><button class="btn green" style="width:100%" onclick="saveItem('${itemId||''}')">保存</button></div>`)}
function saveItem(itemId){if(!canManageItems())return;const name=document.getElementById('itemName').value.trim(),pack=Number(document.getElementById('itemPack').value),active=document.getElementById('itemActive').checked;let checked=[...document.querySelectorAll('.buyerCheck:checked')].map(x=>x.value);if(!name)return alert('品目名を入力してください');if(!(pack>0))return alert('初期入れ数kgは0より大きくしてください');let minVal=document.getElementById('itemMin').value.trim(),maxVal=document.getElementById('itemMax').value.trim();let min=minVal===''?Math.max(10,pack*5):Number(minVal),max=maxVal===''?Math.max(20,pack*12):Number(maxVal);min=yen(min);max=yen(max);if(!(min>=0)||!(max>=0)||min>max)return alert('適正在庫の下限・上限を確認してください');if(!itemId&&checked.length===0)checked=autoBuyerIdsForName(name);let id=itemId;if(itemId){const it=db.items.find(x=>x.id===itemId);if(!it)return alert('品目が見つかりません');it.name=name;it.pack=pack;it.active=active;db.settings[itemId]={min,max}}else{id=newId();const sort=(db.items.reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1);db.items.push({id,name,pack,sort,active});db.settings[id]={min,max};db.purchaseMemos[id]=''}db.buyerAssignments=db.buyerAssignments||{};for(const u of buyerUsers()){db.buyerAssignments[u.id]=db.buyerAssignments[u.id]||[];db.buyerAssignments[u.id]=db.buyerAssignments[u.id].filter(x=>x!==id);if(checked.includes(u.id))db.buyerAssignments[u.id].push(id)}save();alert('保存しました');itemsPage()}
function toggleItemActive(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId);if(!it)return;it.active=it.active===false;save();itemsPage()}function moveItemSort(itemId,dir){if(!canManageItems())return;const items=allSortedItems();const idx=items.findIndex(x=>x.id===itemId),j=idx+dir;if(idx<0||j<0||j>=items.length)return;const a=items[idx],b=items[j],tmp=a.sort;a.sort=b.sort;b.sort=tmp;save();itemsPage()}
function resetData(){alert('既存データ保護のため、データ初期化は停止しています。')}
async function copyTextFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t);alert('コピーしました')}catch(e){prompt('コピーしてください',t)}}function shareTextFrom(id){location.href=`https://line.me/R/share?text=${encodeURIComponent(document.getElementById(id).value)}`}
async function boot(){document.getElementById('app').innerHTML='<main class="wrap"><div class="card notice">Supabase最新データを読み込み中です...</div></main>';try{await loadCloud()}catch(e){console.error(e);cloudReady=false}login()}
boot();
</script></body></html>
