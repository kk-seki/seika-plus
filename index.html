<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>石岡青果センター 在庫管理</title><style>:root{--bg:#f8fafc;--ink:#0f172a;--muted:#64748b;--card:#fff;--line:#e2e8f0;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--orange:#f97316}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:980px;margin:auto;padding:18px}header{background:linear-gradient(135deg,#0f766e,#16a34a);color:white;padding:22px;border-radius:18px;margin-bottom:16px;box-shadow:0 8px 20px #0002}h1{margin:0;font-size:26px}header p{margin:8px 0 0;opacity:.9}.grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:760px){.grid{grid-template-columns:330px 1fr}}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 4px 12px #0000000d}label{font-size:13px;color:var(--muted);display:block;margin:10px 0 6px}input,select{width:100%;font-size:16px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff}button{border:0;border-radius:12px;padding:11px 13px;font-size:15px;font-weight:700;cursor:pointer}.primary{background:var(--green);color:white;width:100%;margin-top:12px}.blue{background:var(--blue);color:white}.red{background:var(--red);color:white}.gray{background:#e2e8f0;color:#0f172a}.orange{background:var(--orange);color:white}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}.stat b{font-size:22px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;background:#fff}.itemTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-size:18px;font-weight:800}.meta{font-size:13px;color:var(--muted);margin-top:4px}.qty{font-size:30px;font-weight:900;text-align:right}.low{color:var(--red)}.ok{color:var(--green)}.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:10px}.history{max-height:240px;overflow:auto}.log{font-size:13px;border-bottom:1px solid var(--line);padding:8px 0;color:#334155}.empty{text-align:center;color:var(--muted);padding:24px}.search{margin-bottom:12px}.pill{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:3px 8px;font-size:12px;margin-left:6px}</style></head><body><div class="wrap"><header><h1>石岡青果センター 在庫管理</h1><p>入荷・出荷・在庫数をスマホで簡単管理</p></header><div class="stats"><div class="stat"><b id="totalItems">0</b><span>品目数</span></div><div class="stat"><b id="totalQty">0</b><span>総在庫</span></div><div class="stat"><b id="lowCount">0</b><span>少ない品目</span></div></div><div class="grid"><section class="card"><h2>登録・操作</h2><label>担当者</label><select id="user"><option>平田</option><option>現場社員</option><option>事務所</option><option>管理者</option></select><label>品名</label><input id="name" placeholder="例：キャベツ、トマト"><div class="row"><div><label>数量</label><input id="qty" type="number" min="0" value="1"></div><div><label>単位</label><input id="unit" placeholder="箱" value="箱"></div></div><label>メモ</label><input id="memo" placeholder="例：A品、冷蔵庫、納品先など"><button class="primary" onclick="addItem()">品目を追加</button><div class="row" style="margin-top:10px"><button class="gray" onclick="exportData()">データ保存</button><button class="red" onclick="resetAll()">全削除</button></div><p style="font-size:12px;color:#64748b;margin-bottom:0">※データはこのスマホのブラウザに保存されます。</p></section><section class="card"><h2>在庫一覧</h2><input class="search" id="search" placeholder="品名で検索" oninput="render()"><div id="list"></div></section></div><section class="card" style="margin-top:14px"><h2>履歴</h2><div id="history" class="history"></div></section></div><script>const KEY="ishioka_inventory_app_v2";let data=JSON.parse(localStorage.getItem(KEY)||'{"items":[],"logs":[]}');function save(){localStorage.setItem(KEY,JSON.stringify(data))}function now(){return new Date().toLocaleString("ja-JP")}function log(t){data.logs.unshift(now()+"　"+document.getElementById("user").value+"　"+t);data.logs=data.logs.slice(0,80)}function addItem(){const n=name.value.trim(),q=Number(qty.value||0),u=unit.value.trim()||"個",m=memo.value.trim();if(!n){alert("品名を入れてください");return}data.items.push({id:Date.now(),name:n,qty:q,unit:u,memo:m});log("追加："+n+" "+q+u);name.value="";qty.value=1;memo.value="";save();render()}function change(id,d){const it=data.items.find(x=>x.id===id);if(!it)return;it.qty=Math.max(0,Number(it.qty)+d);log((d>0?"入荷：":"出荷：")+it.name+" "+Math.abs(d)+it.unit+" → 残 "+it.qty+it.unit);save();render()}function setQty(id){const it=data.items.find(x=>x.id===id);const v=prompt("新しい数量を入力",it.qty);if(v===null)return;it.qty=Math.max(0,Number(v||0));log("数量変更："+it.name+" → "+it.qty+it.unit);save();render()}function delItem(id){const it=data.items.find(x=>x.id===id);if(!confirm(it.name+"を削除しますか？"))return;data.items=data.items.filter(x=>x.id!==id);log("削除："+it.name);save();render()}function render(){const s=(search.value||"").toLowerCase();const items=data.items.filter(x=>x.name.toLowerCase().includes(s));totalItems.textContent=data.items.length;totalQty.textContent=data.items.reduce((a,b)=>a+Number(b.qty||0),0);lowCount.textContent=data.items.filter(x=>Number(x.qty)<=3).length;list.innerHTML=items.length?items.map(it=>'<div class="item"><div class="itemTop"><div><div class="name">'+esc(it.name)+(it.qty<=3?'<span class="pill">少ない</span>':'')+'</div><div class="meta">'+esc(it.memo||"メモなし")+'</div></div><div class="qty '+(it.qty<=3?'low':'ok')+'">'+it.qty+'<span style="font-size:14px">'+esc(it.unit)+'</span></div></div><div class="actions"><button class="blue" onclick="change('+it.id+',1)">＋1</button><button class="orange" onclick="change('+it.id+',-1)">−1</button><button class="gray" onclick="setQty('+it.id+')">変更</button><button class="red" onclick="delItem('+it.id+')">削除</button></div></div>').join(""):'<div class="empty">在庫がありません</div>';history.innerHTML=data.logs.length?data.logs.map(x=>'<div class="log">'+esc(x)+'</div>').join(""):'<div class="empty">履歴はまだありません</div>'}function resetAll(){if(confirm("全データを削除しますか？")){data={items:[],logs:[]};save();render()}}function exportData(){const txt=JSON.stringify(data,null,2);navigator.clipboard.writeText(txt).then(()=>alert("データをコピーしました"))}function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}render();</script></body></html>
