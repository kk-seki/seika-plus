はい。以下をそのまま全部コピーして、GitHubの index.html に貼り替えてください。<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>石岡青果センター 在庫管理デモ</title>
  <style>
    :root{--bg:#f8fafc;--ink:#0f172a;--line:#e2e8f0;--muted:#64748b;--main:#16a34a;--red:#dc2626;--orange:#ea580c;--blue:#2563eb;--purple:#7c3aed}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,select,textarea{font:inherit}
    .wrap{max-width:820px;margin:0 auto;padding:16px 16px 92px}
    .head{position:sticky;top:0;z-index:5;background:rgba(248,250,252,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
    .headin{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .title{font-size:20px;font-weight:900}.sub,.small{font-size:12px;color:var(--muted);line-height:1.45}
    .card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 1px 2px #00000008}
    .btn{border:0;border-radius:14px;padding:13px 16px;font-weight:800;background:#0f172a;color:white;cursor:pointer;text-align:center}
    .btn2{background:#e2e8f0;color:#0f172a}.btn3{background:var(--main)}.btnBlue{background:var(--blue)}.btnOrange{background:var(--orange)}.btnPurple{background:var(--purple)}.btnRed{background:#fee2e2;color:#991b1b}.btnDanger{background:#dc2626;color:white}
    .btn:disabled{opacity:.45;cursor:not-allowed}.menu{display:grid;gap:12px}.input{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px;background:white}.textarea{width:100%;min-height:150px;border:1px solid #cbd5e1;border-radius:12px;padding:12px;background:white;line-height:1.5}
    .label{font-size:12px;font-weight:800;color:var(--muted);display:block;margin-bottom:4px}.row{display:flex;gap:8px;align-items:end}.row>*{flex:1}.notice{background:#eff6ff;color:#1e3a8a;border-radius:12px;padding:12px;margin:12px 0}.ok{background:#dcfce7;color:#166534;border-radius:12px;padding:12px;margin:12px 0}.err{background:#fee2e2;color:#991b1b;border-radius:12px;padding:12px;margin:12px 0}.warn{background:#ffedd5;color:#9a3412;border-radius:12px;padding:12px;margin:12px 0}
    .itemHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.badge{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;white-space:nowrap}.shortage{background:#fee2e2;color:#991b1b}.excess{background:#ffedd5;color:#9a3412}.normal{background:#dcfce7;color:#166534}.unset{background:#f1f5f9;color:#475569}.roleBadge{background:#ede9fe;color:#5b21b6}
    .line{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;border-top:1px solid #f1f5f9;padding:10px 0}.line:first-child{border-top:0}.kg{font-weight:900;white-space:nowrap;padding-bottom:12px}.total{border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-weight:900;gap:10px}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(788px,calc(100% - 32px));box-shadow:0 8px 24px #0002}.hide{display:none!important}pre{white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:12px;overflow:auto}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.tabs button{white-space:nowrap}.dangerText{color:#dc2626;font-weight:800}.stockGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stockGrid .box{background:#f8fafc;border-radius:12px;padding:10px}.box b{display:block;font-size:18px;margin-top:2px}.miniBtns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.historyRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}.pill{display:inline-block;border-radius:999px;background:#f1f5f9;color:#475569;padding:3px 8px;font-size:12px;font-weight:800;margin:2px 2px 2px 0}
    @media(max-width:560px){.line{grid-template-columns:1fr 1fr}.kg{grid-column:1/-1;padding-bottom:0}.row{flex-direction:column;align-items:stretch}.headin{align-items:flex-start}.title{font-size:18px}.miniBtns{grid-template-columns:1fr}.stockGrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="app"></div>
<script>
const ITEMS=[{"id":"item1","name":"レタス","pack":8,"sort":1},{"id":"item2","name":"サニー","pack":4,"sort":2},{"id":"item3","name":"リーフ","pack":4,"sort":3},{"id":"item4","name":"ロメイン","pack":5,"sort":4},{"id":"item5","name":"水菜","pack":5,"sort":5},{"id":"item6","name":"長葱","pack":10,"sort":6},{"id":"item7","name":"小葱","pack":10,"sort":7},{"id":"item8","name":"大葉","pack":3,"sort":8},{"id":"item9","name":"青梗菜","pack":2,"sort":9},{"id":"item10","name":"小松菜","pack":7,"sort":10},{"id":"item11","name":"ほうれん草","pack":6,"sort":11},{"id":"item12","name":"ゴーヤ","pack":3,"sort":12},{"id":"item13","name":"茄子","pack":5,"sort":13},{"id":"item14","name":"長茄子","pack":4,"sort":14},{"id":"item15","name":"トマト","pack":4,"sort":15},{"id":"item16","name":"ピーマン","pack":4,"sort":16},{"id":"item17","name":"白菜","pack":15,"sort":17},{"id":"item18","name":"ミニトマト","pack":3,"sort":18},{"id":"item19","name":"紫キャベツ","pack":10,"sort":19}];
const STORE='ishioka_inventory_demo_v3_roles';
const ROLE_LABEL={admin:'管理者',worker:'使用者（石岡青果社員）',buyer:'仕入れ担当者',viewer:'その他（閲覧のみ）'};
function newId(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(16).slice(2)}
function init(){const saved=localStorage.getItem(STORE);if(saved){try{const d=JSON.parse(saved);d.movements=d.movements||[];d.notifications=d.notifications||[];d.records=d.records||[];d.items=d.items||ITEMS;return d}catch(e){}}
  const settings=Object.fromEntries(ITEMS.map(it=>[it.id,{min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)}]));
  return {user:null,role:null,settings,records:[],movements:[],notifications:[],items:ITEMS};
}
let db=init();let formState=[];
function save(){localStorage.setItem(STORE,JSON.stringify(db))}
function yen(n){return Math.round(Number(n||0)*100)/100}
function fmt(n){return yen(n).toLocaleString('ja-JP')}
function nowIso(){return new Date().toISOString()}
function dt(iso){return new Date(iso).toLocaleString('ja-JP')}
function judge(total,s){if(!s)return'unset';if(total<s.min)return'shortage';if(total>s.max)return'excess';return'normal'}
function label(st){return st==='shortage'?'不足':st==='excess'?'過剰':st==='normal'?'適正':'未設定'}
function canEdit(){return db.role==='admin'||db.role==='worker'}
function canAdmin(){return db.role==='admin'}
function latestMap(){const latest={};db.records.forEach(r=>latest[r.itemId]=r);return latest}
function latestRecord(itemId){return latestMap()[itemId]||null}
function latestTotal(itemId){const r=latestRecord(itemId);return r?Number(r.total||0):0}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function pageShell(title,sub,body){document.getElementById('app').innerHTML=`<div class="head"><div class="headin"><div><div class="title">${title}</div><div class="sub">${sub||''}</div></div><div>${db.user?`<button class="btn btn2" onclick="home()">ホーム</button>`:''}</div></div></div><main class="wrap">${body}</main>`}
function login(){pageShell('石岡青果センター 在庫管理デモ','画面確認用の公開デモ',`<div class="card"><div class="notice">これはデモアプリです。入力データはこのブラウザ内に保存されます。LINEへの実送信は行わず、コピー・LINE共有用文章を作成します。</div><label class="label">名前</label><input id="user" class="input" value="平田" placeholder="例：平田"><br><br><label class="label">権限</label><select id="role" class="input"><option value="admin">管理者</option><option value="worker" selected>使用者（石岡青果社員）</option><option value="buyer">仕入れ担当者</option><option value="viewer">その他（閲覧のみ）</option></select><br><br><button class="btn btn3" style="width:100%" onclick="doLogin()">ログイン</button></div><div class="card small"><b>権限の違い</b><br>管理者：全操作、設定変更、履歴削除、初期化<br>使用者：在庫入力、入庫、出庫、調整、履歴確認<br>仕入れ担当者：在庫確認、通知確認、LINE文コピー<br>その他：在庫確認のみ</div>`)}
function doLogin(){db.user=document.getElementById('user').value.trim()||'未設定';db.role=document.getElementById('role').value;save();home()}
function home(){if(!db.user)return login();const lowCount=db.items.filter(it=>judge(latestTotal(it.id),db.settings[it.id])==='shortage').length;const totalKg=db.items.reduce((a,it)=>a+latestTotal(it.id),0);pageShell('在庫管理デモ',`${esc(db.user)}さん / ${ROLE_LABEL[db.role]}`,`<div class="notice">全品目一覧でまとめて入力できます。複数の入れ数がある品目は「＋ 入れ数を追加」を押してください。</div><div class="card stockGrid"><div class="box"><span class="small">不足品目</span><b>${lowCount}品</b></div><div class="box"><span class="small">総在庫kg</span><b>${fmt(totalKg)}kg</b></div></div><div class="menu"><button class="btn btn3" onclick="inventory()" ${canEdit()?'':'disabled'}>在庫入力（19品目一括）</button><button class="btn btnBlue" onclick="stocks()">在庫一覧・入庫出庫</button><button class="btn btn2" onclick="moveHistory()">修正履歴</button><button class="btn btn2" onclick="notifications()">通知履歴・LINE文</button><button class="btn btn2" onclick="settings()" ${canAdmin()?'':'disabled'}>適正在庫設定（管理者）</button><button class="btn btn2" onclick="itemsPage()">品目設定</button><button class="btn btn2" onclick="resetDemo()" ${canAdmin()?'':'disabled'}>デモデータ初期化（管理者）</button><button class="btn btnRed" onclick="db.user=null;db.role=null;save();login()">ログアウト</button></div>${!canEdit()?'<div class="warn">この権限では在庫の変更はできません。</div>':''}`)}
function inventory(){if(!canEdit()){alert('この権限では在庫入力できません');return}formState=db.items.map(it=>({itemId:it.id,lines:[{pack:String(it.pack),cases:''}]}));renderInventory()}
function renderInventory(msg='',err=''){const cards=formState.map((r,idx)=>{const it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id];const total=yen(r.lines.reduce((a,l)=>l.pack!==''&&l.cases!==''?a+Number(l.pack)*Number(l.cases):a,0));const st=total?judge(total,s):'unset';return`<section class="card"><div class="itemHead"><div><h2 style="margin:0 0 4px">${it.name}</h2><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}〜${s.max}kg</div></div><span class="badge ${total?st:'unset'}">${total?label(st):'未入力'}</span></div>${r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" placeholder="例 ${it.pack}" onchange="formState[${idx}].lines[${j}].pack=this.value;renderInventory()"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄可" onchange="formState[${idx}].lines[${j}].cases=this.value;renderInventory()"></div><div class="kg">小計 ${l.pack!==''&&l.cases!==''?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px;margin-left:6px" onclick="formState[${idx}].lines.splice(${j},1);renderInventory()">削除</button>`:''}</div></div>`).join('')}<button class="btn btn2" onclick="formState[${idx}].lines.push({pack:'',cases:''});renderInventory()">＋ 入れ数を追加</button><div class="total"><span>合計</span><span>${total?fmt(total)+'kg':'- kg'}</span></div></section>`}).join('');pageShell('在庫入力','19品目をまとめて入力',`${msg?`<div class="ok">${msg}</div>`:''}${err?`<div class="err">${err}</div>`:''}<div class="notice">ケース数が空欄の行は登録しません。0は在庫ゼロとして登録します。登録後、不足・過剰があれば通知履歴に残ります。</div>${cards}<button class="btn btn3 bottom" onclick="submitInventory()">まとめて登録</button>`)}
function submitInventory(){try{const results=[];for(const r of formState){const it=db.items.find(x=>x.id===r.itemId);const lines=[];for(const l of r.lines){const hp=l.pack!=='';const hc=l.cases!=='';if(!hp&&hc)throw new Error(`${it.name}: ケース数だけ入力されています。入れ数も入力してください。`);if(hp&&hc){const p=Number(l.pack),c=Number(l.cases);if(!(p>0))throw new Error(`${it.name}: 入れ数は0より大きくしてください。`);if(!(c>=0))throw new Error(`${it.name}: ケース数は0以上にしてください。`);lines.push({pack:p,cases:c,subtotal:yen(p*c)})}}if(lines.length){const before=latestTotal(it.id);const total=yen(lines.reduce((a,l)=>a+l.subtotal,0));const s=db.settings[it.id];const st=judge(total,s);const rec={id:newId(),kind:'一括入力',itemId:it.id,itemName:it.name,total,setting:{...s},status:st,lines,user:db.user,role:db.role,createdAt:nowIso()};results.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId:it.id,itemName:it.name,type:'一括入力',beforeTotal:before,afterTotal:total,diffKg:yen(total-before),pack:null,cases:null,memo:'19品目一括入力',user:db.user,role:db.role,createdAt:rec.createdAt})}}
db.records.push(...results);const alerts=results.filter(r=>r.status==='shortage'||r.status==='excess').map(r=>makeNotification(r));db.notifications.push(...alerts);save();renderInventory(`登録しました。入力品目：${results.length}件、通知対象：${alerts.length}件`,'');if(alerts.length&&confirm('不足・過剰があります。LINE用文章を開きますか？'))notifications()}catch(e){renderInventory('',e.message)}}
function makeNotification(r){return{id:newId(),recordId:r.id,itemId:r.itemId,itemName:r.itemName,status:r.status,total:r.total,message:lineMessage(r),sentResult:'未送信（コピー・LINE共有用）',sentAt:nowIso(),user:db.user}}
function lineMessage(r){const diff=r.status==='shortage'?r.setting.min-r.total:r.total-r.setting.max;return`${r.status==='shortage'?'【在庫不足アラート】':'【在庫過剰アラート】'}\n品目：${r.itemName}\n現在庫：${fmt(r.total)}kg\n適正在庫：${r.setting.min}〜${r.setting.max}kg\n${r.status==='shortage'?'不足目安':'超過目安'}：${fmt(diff)}kg\n内訳：${r.lines&&r.lines.length?r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、'):'入庫・出庫・調整後の在庫'}\n入力者：${r.user}さん\n確認をお願いします。`}
function stocks(){const latest=latestMap();const body=db.items.map(it=>{const r=latest[it.id];const total=r?Number(r.total):0;const s=db.settings[it.id];const st=r?judge(total,s):'unset';return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${it.name}</h2><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}〜${s.max}kg${r?`<br>最終更新 ${dt(r.createdAt)} / ${esc(r.user)}さん`:''}</div></div><span class="badge ${st}">${r?label(st):'未入力'}</span></div><div class="stockGrid"><div class="box"><span class="small">現在庫</span><b>${fmt(total)}kg</b></div><div class="box"><span class="small">不足・過剰目安</span><b>${st==='shortage'?fmt(s.min-total)+'kg不足':st==='excess'?fmt(total-s.max)+'kg過剰':'-'}</b></div></div>${r&&r.lines?`<div class="small" style="margin-top:8px">内訳：${r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、')}</div>`:''}<div class="miniBtns"><button class="btn btn3" onclick="moveForm('${it.id}','入庫')" ${canEdit()?'':'disabled'}>入庫</button><button class="btn btnOrange" onclick="moveForm('${it.id}','出庫')" ${canEdit()?'':'disabled'}>出庫</button><button class="btn btn2" onclick="moveForm('${it.id}','調整')" ${canEdit()?'':'disabled'}>調整</button></div></div>`}).join('');pageShell('在庫一覧・入庫出庫','最新在庫と修正操作',`${!canEdit()?'<div class="warn">閲覧のみです。在庫修正は管理者・使用者だけできます。</div>':''}${body}`)}
function moveForm(itemId,type){if(!canEdit()){alert('この権限では在庫修正できません');return}const it=db.items.find(x=>x.id===itemId);const total=latestTotal(itemId);pageShell(`${type}入力`,`${it.name} / 現在庫 ${fmt(total)}kg`,`<div class="card"><div class="notice">${type==='調整'?'調整は「現在庫をこの数量に置き換える」処理です。':'入れ数kg × ケース数で在庫を増減します。'}</div><label class="label">品目</label><input class="input" value="${it.name}" disabled><br><br><div class="row"><div><label class="label">入れ数kg</label><input id="mvPack" class="input" inputmode="decimal" value="${it.pack}"></div><div><label class="label">ケース数</label><input id="mvCases" class="input" inputmode="decimal" value="1"></div></div><br><label class="label">理由・メモ</label><input id="mvMemo" class="input" placeholder="例：朝入荷、出荷分、棚卸調整"><br><br><button class="btn ${type==='入庫'?'btn3':type==='出庫'?'btnOrange':'btn2'}" style="width:100%" onclick="applyMove('${itemId}','${type}')">${type}を登録する</button></div>`)}
function applyMove(itemId,type){const it=db.items.find(x=>x.id===itemId);const pack=Number(document.getElementById('mvPack').value);const cases=Number(document.getElementById('mvCases').value);const memo=document.getElementById('mvMemo').value.trim();if(!(pack>0)){alert('入れ数kgは0より大きくしてください');return}if(!(cases>=0)){alert('ケース数は0以上にしてください');return}const before=latestTotal(itemId);const qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId];const st=judge(after,s);const rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();alert(`${type}を登録しました。修正履歴に残しました。`);if((st==='shortage'||st==='excess')&&confirm('不足・過剰があります。LINE用文章を開きますか？'))notifications();else stocks()}
function moveHistory(){const rows=db.movements.slice().reverse();pageShell('修正履歴','誰が・いつ・何を直したか確認',rows.length?`${canAdmin()?'<button class="btn btnDanger" style="width:100%" onclick="clearMovements()">修正履歴を削除（管理者）</button>':''}${rows.map(m=>`<div class="card"><div class="historyRow"><div><b>${m.itemName}</b> <span class="pill">${m.type}</span><div class="small">${dt(m.createdAt)} / ${esc(m.user)}さん / ${ROLE_LABEL[m.role]||m.role}</div></div><span class="badge ${m.diffKg<0?'shortage':m.diffKg>0?'normal':'unset'}">${m.diffKg>0?'+':''}${fmt(m.diffKg)}kg</span></div><div class="total"><span>${fmt(m.beforeTotal)}kg → ${fmt(m.afterTotal)}kg</span><span>${m.pack?`${m.pack}kg×${m.cases}ケース`:''}</span></div>${m.memo?`<div class="small">メモ：${esc(m.memo)}</div>`:''}</div>`).join('')}`:'<div class="card notice">修正履歴はまだありません。</div>')}
function clearMovements(){if(!canAdmin()){alert('管理者のみです');return}if(confirm('修正履歴を削除しますか？')){db.movements=[];save();moveHistory()}}
function notifications(){const latestLow=db.items.map(it=>latestRecord(it.id)).filter(r=>r&&(r.status==='shortage'||r.status==='excess'));const summary=latestLow.length?latestLow.map(r=>lineMessage(r)).join('\n\n---\n\n'):'現在、不足・過剰品はありません。';const history=db.notifications.slice().reverse();pageShell('通知履歴・LINE文','不足・過剰時の連絡用',`<div class="card"><h2 style="margin-top:0">最新のLINE用まとめ文</h2><textarea id="lineText" class="textarea">${esc(summary)}</textarea><div class="row" style="margin-top:10px"><button class="btn btn2" onclick="copyLineText()">コピー</button><button class="btn btnBlue" onclick="shareLineText()">LINE共有を開く</button></div><div class="small" style="margin-top:8px">※GitHub PagesだけではLINEへの完全自動送信はできません。ここでは送信用文章を作ります。</div></div>${history.length?history.map(n=>`<div class="card"><span class="badge ${n.status}">${label(n.status)}</span><h2>${n.itemName}</h2><div class="small">${dt(n.sentAt)} / ${n.sentResult}</div><pre>${esc(n.message)}</pre></div>`).join(''):'<div class="card notice">通知履歴はまだありません。</div>'}`)}
async function copyLineText(){const t=document.getElementById('lineText').value;try{await navigator.clipboard.writeText(t);alert('コピーしました。LINEに貼り付けて送れます。')}catch(e){prompt('コピーしてください',t)}}
function shareLineText(){const t=encodeURIComponent(document.getElementById('lineText').value);location.href=`https://line.me/R/share?text=${t}`}
function settings(){if(!canAdmin()){alert('管理者のみです');return}pageShell('適正在庫設定','最低kg・上限kgを保存できます',`<div class="notice">ここで変更した値は、このブラウザ内だけに保存されます。</div>${db.items.map(it=>{const s=db.settings[it.id];return`<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg</div></div><div><label class="label">最低kg</label><input id="min_${it.id}" class="input" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" value="${s.max}"></div></div>`}).join('')}<button class="btn btn3 bottom" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value),max=Number(document.getElementById('max_'+it.id).value);if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください`);return}db.settings[it.id]={min,max}}save();settings();alert('保存しました')}
function itemsPage(){pageShell('品目設定','初期入れ数一覧',db.items.map(it=>`<div class="card itemHead"><div><b>${it.sort}. ${it.name}</b><div class="small">使用中</div></div><b>${it.pack}kg</b></div>`).join(''))}
function resetDemo(){if(!canAdmin()){alert('管理者のみです');return}if(confirm('このブラウザ内のデモデータを初期化しますか？')){localStorage.removeItem(STORE);db=init();login()}}
login();
</script>
</body>
</html>
