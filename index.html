<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>石岡青果センター 在庫管理</title><style>

#fee2e2;color:#991b1b}.excess{background:#ffedd5;color:#9a3412}.normal{background:#dcfce7;color:#166534}.unset{background:#f1f5f9;color:#475569}.line{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;border-top:1px solid #f1f5f9;padding:10px 0}.line:first-child{border-top:0}.kg{font-weight:900;white-space:nowrap;padding-bottom:12px}.total{border-top:1px dashed #cbd5e1;margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;font-weight:900;gap:10px}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;width:min(788px,calc(100% - 32px));box-shadow:0 8px 24px #0002}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.box{background:#f8fafc;border-radius:12px;padding:10px}.box b{display:block;font-size:18px;margin-top:2px}.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.pin{border:1px solid #cbd5e1;background:white;color:#475569;cursor:pointer}.pin.on{background:#fef3c7;color:#92400e;border-color:#f59e0b}.memo{background:#f8fafc;border-radius:12px;padding:10px;margin-top:10px}pre{white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:12px;overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #f1f5f9;padding:8px;text-align:left;font-size:13px}.table th{color:#64748b;font-size:12px}.menuBtn{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:14px;padding:12px 14px;font-weight:900}.topBtns{display:flex;gap:8px;align-items:center}.switch{display:flex;gap:8px;align-items:center}.switch input{width:auto}@media(max-width:560px){.row{flex-direction:column;align-items:stretch}.line{grid-template-columns:1fr 1fr}.kg{grid-column:1/-1;padding-bottom:0}.grid,.mini{grid-template-columns:1fr}.table{display:block;overflow:auto}.title{font-size:18px}.headin{align-items:flex-start}.topBtns{flex-direction:column;align-items:stretch}}
</style></head><body><div id="app"></div><script>
const SUPABASE_URL='https://hsuofxvcxgmsplwdigpr.supabase.co';
const SUPABASE_KEY='sb_publishable_1nv4y9m3z8pKTyQliJ-Cfg_FLY8ph3_';
const ITEMS=[['item1','レタス',8],['item2','サニー',4],['item3','リーフ',4],['item4','ロメイン',5],['item5','水菜',5],['item6','長葱',10],['item7','小葱',10],['item8','大葉',3],['item9','青梗菜',2],['item10','小松菜',7],['item11','ほうれん草',6],['item12','ゴーヤ',3],['item13','茄子',5],['item14','長茄子',4],['item15','トマト',4],['item16','ピーマン',4],['item17','白菜',15],['item18','ミニトマト',3],['item19','紫キャベツ',10]].map((x,i)=>({id:x[0],name:x[1],pack:x[2],sort:i+1,active:true}));
const DEFAULT_USERS=[['hirata','平田','admin','管理者','seki1111'],['hitomi','人見','worker','青果社員','seki1111'],['yokosuka_ryo','横須賀(良)','worker','青果社員','seki1111'],['kurosawa','黒澤','worker','青果社員','seki1111'],['yokosuka_ru','横須賀(瑠)','worker','青果社員','seki1111'],['seki_hiroshi','関(宏)','buyer','仕入れ担当者','seki1111'],['araki','荒木','buyer','仕入れ担当者','seki1111'],['saito_dai','斎藤(大)','buyer','仕入れ担当者','seki1111'],['yoshida','吉田','buyer','仕入れ担当者','seki1111'],['sakamoto','坂本','buyer','仕入れ担当者','seki1111'],['viewer','その他','viewer','その他（閲覧のみ）','0000']].map(x=>({id:x[0],name:x[1],role:x[2],group:x[3],password:x[4],active:true}));
const BUYER_SOURCE_NOTE='07_営業仕入れ担当者カード.xlsx / 品目別_仕入れ検索用 / 2026.5月版';
const BUYER_NAME_TO_ID={'斎藤（大）':'saito_dai','吉田':'yoshida','坂本':'sakamoto','荒木':'araki','関（宏）':'seki_hiroshi'};
const ITEM_BUYER_MASTER={
'長葱':'saito_dai','南瓜':'saito_dai','レンコン':'saito_dai','蓮根':'saito_dai','れんこん':'saito_dai','ニラ':'saito_dai','青梗菜':'saito_dai','茄子':'saito_dai','ピーマン':'saito_dai','キャベツ':'saito_dai','紫キャベツ':'saito_dai','胡瓜':'saito_dai','きゅうり':'saito_dai','トマト':'saito_dai','ミニトマト':'saito_dai',
'レタス':'yoshida','グリーンカール':'yoshida','リーフ':'yoshida','サニーレタス':'yoshida','サニー':'yoshida','ロメインレタス':'yoshida','ロメイン':'yoshida','白菜':'yoshida',
'水菜':'sakamoto','ほうれん草':'sakamoto','小松菜':'sakamoto','小葱':'sakamoto','大葉':'sakamoto',
'人参（国産）':'araki','国産人参':'araki','人参':'araki',
'さつまいも':'seki_hiroshi','さつま芋':'seki_hiroshi','玉葱':'seki_hiroshi','玉ねぎ':'seki_hiroshi','紫玉葱':'seki_hiroshi'
};
const DEFAULT_BUYER_ASSIGNMENTS={seki_hiroshi:[],araki:[],saito_dai:['item6','item9','item13','item15','item16','item18','item19'],yoshida:['item1','item2','item3','item4','item17'],sakamoto:['item5','item7','item8','item10','item11']};
const STORE='ishioka_inventory_production_v2';
const LEGACY_STATE_ID='ishioka_inventory_'+'de'+'mo_v6_linecopy_weekly';
const STATE_ID=STORE;
const ROLE={admin:'管理者',worker:'青果社員',buyer:'仕入れ担当者',viewer:'その他（閲覧のみ）'};
const GROUP={admin:'管理者',worker:'青果社員',buyer:'仕入れ担当者',viewer:'その他（閲覧のみ）'};
let db=init();let formState=[];let cloudReady=false;let saveTimer=null;
function newId(){return window.crypto&&crypto.randomUUID?crypto.randomUUID():'id_'+Date.now()+'_'+Math.random().toString(16).slice(2)}
function defaultState(){const settings=Object.fromEntries(ITEMS.map(it=>[it.id,{min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)}]));return{user:null,userId:null,role:null,settings,records:[],movements:[],notifications:[],items:ITEMS,purchaseMemos:{},pins:{},users:DEFAULT_USERS,buyerAssignments:(typeof structuredClone==='function'?structuredClone(DEFAULT_BUYER_ASSIGNMENTS):JSON.parse(JSON.stringify(DEFAULT_BUYER_ASSIGNMENTS)))}}
function normalize(d){const base=defaultState();d=d||{};d={...base,...d};d.records=d.records||[];d.movements=d.movements||[];d.notifications=d.notifications||[];d.items=d.items&&d.items.length?d.items:ITEMS;d.items=d.items.map((it,i)=>({...it,pack:Number(it.pack||0),sort:Number(it.sort||i+1),active:it.active!==false}));d.settings=d.settings||base.settings;d.purchaseMemos=d.purchaseMemos||{};d.pins=d.pins||{};d.users=(d.users&&d.users.length?d.users:DEFAULT_USERS).map(u=>({...u,active:u.active!==false,group:u.group||GROUP[u.role]||'その他'}));d.buyerAssignments=d.buyerAssignments||{};for(const u of d.users){if(u.role==='buyer'&&!d.buyerAssignments[u.id])d.buyerAssignments[u.id]=[]}for(const du of DEFAULT_USERS){if(!d.users.find(u=>u.id===du.id))d.users.push(du)}for(const it of d.items){if(!d.settings[it.id])d.settings[it.id]={min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)};if(d.purchaseMemos[it.id]===undefined)d.purchaseMemos[it.id]=''}return d}
function init(){try{const saved=localStorage.getItem(STORE)||localStorage.getItem(LEGACY_STATE_ID);if(saved)return normalize(JSON.parse(saved))}catch(e){}return defaultState()}
function activeUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.active!==false)}
function findUser(id){return (db.users||DEFAULT_USERS).find(u=>u.id===id)}
function buyerUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.role==='buyer'&&u.active!==false)}
function activeItems(){return (db.items||[]).filter(it=>it.active!==false)}
function allSortedItems(){return (db.items||[]).slice().sort((a,b)=>(a.sort||0)-(b.sort||0))}
function assignedBuyerIds(itemId){const ba=db.buyerAssignments||{};return Object.keys(ba).filter(uid=>(ba[uid]||[]).includes(itemId))}
function buyerNamesForItem(itemId){return assignedBuyerIds(itemId).map(uid=>findUser(uid)).filter(Boolean).map(u=>u.name)}
function autoBuyerIdsForName(name){const key=String(name||'').trim();const uid=ITEM_BUYER_MASTER[key];return uid?[uid]:[]}
function buyerHtml(it){const names=buyerNamesForItem(it.id);return `<div class="memo"><span class="small">仕入れ担当（2026.5月版）</span><br>${names.length?names.map(esc).join('、'):'未設定'}<div class="small">参照：${BUYER_SOURCE_NOTE}</div></div>`}
function isMyBuyerItem(itemId){return db.role==='buyer'&&((db.buyerAssignments||{})[db.userId]||[]).includes(itemId)}
function cloudPayload(){return{settings:db.settings,records:db.records,movements:db.movements,notifications:db.notifications,items:db.items,purchaseMemos:db.purchaseMemos,pins:db.pins,users:db.users,buyerAssignments:db.buyerAssignments}}
async function loadCloud(){const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${encodeURIComponent(STATE_ID)}&select=data`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});if(!res.ok)throw new Error(await res.text());let rows=await res.json();if(!(rows&&rows[0]&&rows[0].data)){const oldRes=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${encodeURIComponent(LEGACY_STATE_ID)}&select=data`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});if(oldRes.ok)rows=await oldRes.json()}if(rows&&rows[0]&&rows[0].data){const u=db.user,uid=db.userId,r=db.role;db=normalize({...db,...rows[0].data,user:u,userId:uid,role:r});localStorage.setItem(STORE,JSON.stringify(db));setTimeout(()=>saveCloudNow().catch(console.error),500)}cloudReady=true}
async function saveCloudNow(){if(!cloudReady)return;const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state`,{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id:STATE_ID,data:cloudPayload(),updated_at:new Date().toISOString()})});if(!res.ok)throw new Error(await res.text())}
function save(){localStorage.setItem(STORE,JSON.stringify(db));clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveCloudNow().catch(e=>{console.error(e);alert('保存に失敗しました。通信状態またはSupabase設定を確認してください。')}),300)}
function yen(n){return Math.round(Number(n||0)*100)/100}function fmt(n){return yen(n).toLocaleString('ja-JP')}function nowIso(){return new Date().toISOString()}function dt(iso){return new Date(iso).toLocaleString('ja-JP')}function ymd(d){return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function judge(total,s){if(!s)return'unset';if(total<s.min)return'shortage';if(total>s.max)return'excess';return'normal'}
function label(st){return st==='shortage'?'不足':st==='excess'?'過多':st==='normal'?'適正':'未設定'}
function canEdit(){return db.role==='admin'||db.role==='worker'}function canAdmin(){return db.role==='admin'}function canBuyerView(){return db.role==='admin'||db.role==='buyer'}function canWorkerReport(){return db.role==='admin'||db.role==='worker'}function canSetSettings(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canManageItems(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canPin(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canViewMemo(){return db.role==='admin'||db.role==='buyer'||db.role==='worker'}function canEditMemo(){return db.role==='admin'||db.role==='buyer'}
function latestMap(){const latest={};db.records.forEach(r=>latest[r.itemId]=r);return latest}function latestRecord(itemId){return latestMap()[itemId]||null}function latestTotal(itemId){const r=latestRecord(itemId);return r?Number(r.total||0):0}
function isPinned(itemId){const uid=db.userId||db.user||'';return(db.pins[uid]||[]).includes(itemId)}
function sortedItems(){const uid=db.userId||db.user||'';const pinSet=new Set(db.pins[uid]||[]);return activeItems().slice().sort((a,b)=>{const aa=isMyBuyerItem(a.id)?0:1,bb=isMyBuyerItem(b.id)?0:1;if(aa!==bb)return aa-bb;const ap=pinSet.has(a.id)?0:1,bp=pinSet.has(b.id)?0:1;if(ap!==bp)return ap-bp;return(a.sort||0)-(b.sort||0)})}
function pageShell(title,sub,body){document.getElementById('app').innerHTML=`<div class="head"><div class="headin"><div><div class="title">${title}</div><div class="sub">${sub||''}</div></div><div class="topBtns">${db.user?`<button class="btn btn2" onclick="home()">ホーム</button><button class="menuBtn" onclick="accountMenu()">メニュー</button>`:''}</div></div></div><main class="wrap">${body}</main>`}
function login(){const grouped={};activeUsers().forEach(u=>{grouped[u.group]=grouped[u.group]||[];grouped[u.group].push(u)});const options=Object.keys(grouped).map(g=>`<optgroup label="${g}">${grouped[g].map(u=>`<option value="${u.id}">${u.name} / ${ROLE[u.role]}</option>`).join('')}</optgroup>`).join('');pageShell('石岡青果センター 在庫管理',cloudReady?'Supabase保存':'ブラウザ保存',`<div class="card"><div class="notice">入力データは共有保存され、別端末でも確認できます。</div><label class="label">名前を選択</label><select id="loginUser" class="input">${options}</select><br><br><label class="label">パスワード</label><input id="loginPass" class="input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()"><br><br><button class="btn green" style="width:100%" onclick="doLogin()">ログイン</button></div>`)}
function doLogin(){const uid=document.getElementById('loginUser').value,pass=document.getElementById('loginPass').value,u=findUser(uid);if(!u||u.active===false||pass!==u.password){alert('パスワードが違います');return}db.user=u.name;db.userId=u.id;db.role=u.role;save();home()}
function home(){if(!db.user)return login();const shortageCount=activeItems().filter(it=>judge(latestTotal(it.id),db.settings[it.id])==='shortage').length,excessCount=activeItems().filter(it=>judge(latestTotal(it.id),db.settings[it.id])==='excess').length,totalKg=activeItems().reduce((a,it)=>a+latestTotal(it.id),0);pageShell('在庫管理',`${esc(db.user)} / ${ROLE[db.role]} / ${cloudReady?'Supabase保存':'ブラウザ保存'}`,`<div class="notice">適正在庫は「下限kg〜上限kg」で設定できます。下限未満は不足、上限超過は過多として表示します。</div><div class="card grid">${canBuyerView()?`<div class="box"><span class="small">発注候補</span><b>${shortageCount}品</b></div>`:''}${canWorkerReport()?`<div class="box"><span class="small">過多品目</span><b>${excessCount}品</b></div>`:''}<div class="box"><span class="small">総在庫kg</span><b>${fmt(totalKg)}kg</b></div><div class="box"><span class="small">有効品目</span><b>${activeItems().length}品</b></div></div><div class="menu"><button class="btn green" onclick="inventory()" ${canEdit()?'':'disabled'}>在庫入力</button><button class="btn blue" onclick="stocks()">在庫一覧・入庫出庫</button>${canWorkerReport()?`<button class="btn blue" onclick="lineCopyPage()">在庫報告コピー</button>`:''}${canBuyerView()?`<button class="btn orange" onclick="orderCandidatePage()">発注候補・発注候補コピー</button>`:''}<button class="btn btn2" onclick="weeklyData()">週間データ</button><button class="btn btn2" onclick="moveHistory()">修正履歴</button><button class="btn btn2" onclick="notifications()">通知履歴</button><button class="btn btn2" onclick="settings()" ${canSetSettings()?'':'disabled'}>適正在庫設定</button><button class="btn btn2" onclick="itemsPage()" ${canManageItems()?'':'disabled'}>品目設定</button></div>${!canEdit()?'<div class="warn">この権限では在庫の変更はできません。</div>':''}`)}
function accountMenu(){pageShell('メニュー',`${esc(db.user)} / ${ROLE[db.role]}`,`<div class="menu"><button class="btn btn2" onclick="changePasswordPage()">パスワード変更</button>${canAdmin()?`<button class="btn btn2" onclick="userAdminPage()">ユーザー登録・管理</button><button class="btn btn2" onclick="resetData()">データ初期化（管理者）</button>`:''}<button class="btn red" onclick="logout()">ログアウト</button></div>`)}
function logout(){db.user=null;db.userId=null;db.role=null;save();login()}
function changePasswordPage(){pageShell('パスワード変更','ログイン中のユーザーのパスワードを変更します',`<div class="card"><label class="label">現在のパスワード</label><input id="oldPass" class="input" type="password"><br><br><label class="label">新しいパスワード</label><input id="newPass" class="input" type="password" placeholder="4文字以上"><br><br><label class="label">新しいパスワード（確認）</label><input id="newPass2" class="input" type="password"><br><br><button class="btn green" style="width:100%" onclick="changePassword()">変更する</button></div>`)}
function changePassword(){const u=findUser(db.userId),old=document.getElementById('oldPass').value,np=document.getElementById('newPass').value,np2=document.getElementById('newPass2').value;if(!u)return alert('ユーザーが見つかりません');if(old!==u.password)return alert('現在のパスワードが違います');if(np.length<4)return alert('新しいパスワードは4文字以上にしてください');if(np!==np2)return alert('確認用パスワードが一致しません');u.password=np;save();alert('パスワードを変更しました');accountMenu()}
function userAdminPage(){if(!canAdmin())return home();const rows=(db.users||[]).map(u=>`<div class="card"><div class="itemHead"><div><b>${esc(u.name)}</b><div class="small">${ROLE[u.role]} / ID: ${esc(u.id)} / ${u.active===false?'停止中':'有効'}</div></div><span class="badge ${u.active===false?'unset':'normal'}">${u.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="editUserPage('${u.id}')">編集</button><button class="btn ${u.active===false?'green':'red'}" onclick="toggleUserActive('${u.id}')" ${u.id===db.userId?'disabled':''}>${u.active===false?'有効化':'停止'}</button><button class="btn btn2" onclick="resetUserPassword('${u.id}')">初期PWに戻す</button></div></div>`).join('');pageShell('ユーザー登録・管理','管理者のみ表示されます',`<button class="btn green" style="width:100%" onclick="newUserPage()">＋ 新規ユーザー登録</button>${rows}`)}
function newUserPage(){if(!canAdmin())return home();pageShell('新規ユーザー登録','管理者のみ',userFormHtml(null))}
function editUserPage(uid){if(!canAdmin())return home();const u=findUser(uid);if(!u)return alert('ユーザーが見つかりません');pageShell('ユーザー編集','管理者のみ',userFormHtml(u))}
function userFormHtml(u){return`<div class="card"><label class="label">名前</label><input id="uName" class="input" value="${esc(u?u.name:'')}"><br><br><label class="label">権限</label><select id="uRole" class="input" onchange="document.getElementById('uGroup').value=GROUP[this.value]||''"><option value="worker" ${u&&u.role==='worker'?'selected':''}>青果社員</option><option value="buyer" ${u&&u.role==='buyer'?'selected':''}>仕入れ担当者</option><option value="viewer" ${u&&u.role==='viewer'?'selected':''}>その他（閲覧のみ）</option><option value="admin" ${u&&u.role==='admin'?'selected':''}>管理者</option></select><br><br><label class="label">グループ表示名</label><input id="uGroup" class="input" value="${esc(u?u.group:'青果社員')}"><br><br><label class="label">ログインID</label><input id="uId" class="input" value="${esc(u?u.id:'')}" ${u?'disabled':''} placeholder="英数字推奨"><br><br><label class="label">パスワード</label><input id="uPass" class="input" type="text" value="${esc(u?u.password:'seki1111')}"><br><br><label class="switch"><input id="uActive" type="checkbox" ${!u||u.active!==false?'checked':''}> 有効</label><br><br><button class="btn green" style="width:100%" onclick="saveUser('${u?u.id:''}')">保存</button></div>`}
function saveUser(editId){if(!canAdmin())return;const name=document.getElementById('uName').value.trim(),role=document.getElementById('uRole').value,group=document.getElementById('uGroup').value.trim()||GROUP[role],uid=(editId||document.getElementById('uId').value.trim()),pass=document.getElementById('uPass').value,active=document.getElementById('uActive').checked;if(!name)return alert('名前を入力してください');if(!uid)return alert('ログインIDを入力してください');if(!/^[A-Za-z0-9_-]+$/.test(uid))return alert('ログインIDは半角英数字・_・-で入力してください');if(pass.length<4)return alert('パスワードは4文字以上にしてください');if(!editId&&findUser(uid))return alert('このログインIDは既に使われています');if(editId){const u=findUser(editId);u.name=name;u.role=role;u.group=group;u.password=pass;u.active=active;if(editId===db.userId){db.user=name;db.role=role}}else{db.users.push({id:uid,name,role,group,password:pass,active})}save();alert('保存しました');userAdminPage()}
function toggleUserActive(uid){if(!canAdmin()||uid===db.userId)return;const u=findUser(uid);if(!u)return;u.active=u.active===false;save();userAdminPage()}
function resetUserPassword(uid){if(!canAdmin())return;const u=findUser(uid);if(!u)return;if(confirm(`${u.name}のパスワードを初期値に戻しますか？`)){u.password=u.role==='viewer'?'0000':'seki1111';save();alert('戻しました');userAdminPage()}}
function inventory(){if(!canEdit()){alert('この権限では在庫入力できません');return}formState=activeItems().map(it=>({itemId:it.id,lines:[{pack:String(it.pack),cases:''}]}));renderInventory()}
function renderInventory(msg='',err=''){const cards=formState.map((r,idx)=>{const it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id],total=yen(r.lines.reduce((a,l)=>l.pack!==''&&l.cases!==''?a+Number(l.pack)*Number(l.cases):a,0)),st=total?judge(total,s):'unset';return`<section class="card"><div class="itemHead"><div><h2 style="margin:0 0 4px">${it.name}</h2><div class="small">適正在庫 ${s.min}kg〜${s.max}kg / 初期入れ数 ${it.pack}kg</div></div><span class="badge ${total?st:'unset'}">${total?label(st):'未入力'}</span></div>${r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" onchange="formState[${idx}].lines[${j}].pack=this.value;renderInventory()"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄可" onchange="formState[${idx}].lines[${j}].cases=this.value;renderInventory()"></div><div class="kg">小計 ${l.pack!==''&&l.cases!==''?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${idx}].lines.splice(${j},1);renderInventory()">削除</button>`:''}</div></div>`).join('')}<button class="btn btn2" onclick="formState[${idx}].lines.push({pack:'',cases:''});renderInventory()">＋ 入れ数を追加</button><div class="total"><span>合計</span><span>${total?fmt(total)+'kg':'- kg'}</span></div></section>`}).join('');pageShell('在庫入力','有効品目をまとめて入力',`${msg?`<div class="ok">${msg}</div>`:''}${err?`<div class="err">${err}</div>`:''}${cards||'<div class="card notice">有効な品目がありません。品目設定から追加または有効化してください。</div>'}<button class="btn green bottom" onclick="submitInventory()" ${cards?'':'disabled'}>まとめて登録</button>`)}
function submitInventory(){try{const results=[];for(const r of formState){const it=db.items.find(x=>x.id===r.itemId),lines=[];for(const l of r.lines){if(l.pack===''&&l.cases!=='')throw new Error(`${it.name}: 入れ数も入力してください。`);if(l.pack!==''&&l.cases!==''){const p=Number(l.pack),c=Number(l.cases);if(!(p>0))throw new Error(`${it.name}: 入れ数は0より大きくしてください。`);if(!(c>=0))throw new Error(`${it.name}: ケース数は0以上にしてください。`);lines.push({pack:p,cases:c,subtotal:yen(p*c)})}}if(lines.length){const before=latestTotal(it.id),total=yen(lines.reduce((a,l)=>a+l.subtotal,0)),s=db.settings[it.id],st=judge(total,s),rec={id:newId(),kind:'一括入力',itemId:it.id,itemName:it.name,total,setting:{...s},status:st,lines,user:db.user,role:db.role,createdAt:nowIso()};results.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId:it.id,itemName:it.name,type:'一括入力',beforeTotal:before,afterTotal:total,diffKg:yen(total-before),pack:null,cases:null,memo:'一括入力',user:db.user,role:db.role,createdAt:rec.createdAt})}}db.records.push(...results);const alerts=results.filter(r=>r.status==='shortage'||r.status==='excess').map(r=>makeNotification(r));db.notifications.push(...alerts);save();if(alerts.length&&canWorkerReport())lineCopyPage(`登録しました。入力品目：${results.length}件。`);else if(alerts.length&&canBuyerView())orderCandidatePage(`登録しました。入力品目：${results.length}件。`);else renderInventory(`登録しました。入力品目：${results.length}件。`)}catch(e){renderInventory('',e.message)}}
function makeNotification(r){return{id:newId(),recordId:r.id,itemId:r.itemId,itemName:r.itemName,status:r.status,total:r.total,message:lineMessage(r),sentResult:'コピー用に作成',sentAt:nowIso(),user:db.user}}
function lineMessage(r){const diff=r.status==='shortage'?r.setting.min-r.total:r.total-r.setting.max;return`${r.status==='shortage'?'【在庫不足】':'【在庫過多】'} ${r.itemName} ${fmt(r.total)}kg（適正 ${r.setting.min}kg〜${r.setting.max}kg / ${r.status==='shortage'?'不足':'超過'} ${fmt(diff)}kg）`}
function makeLineCopyText(){const latest=latestMap(),excess=[],shortage=[];activeItems().forEach(it=>{const r=latest[it.id];if(!r)return;const st=judge(Number(r.total||0),db.settings[it.id]);if(st==='excess')excess.push(`${it.name} ${fmt(r.total)}kg`);if(st==='shortage')shortage.push(`${it.name} ${fmt(r.total)}kg`)});return`過多品目\n${excess.length?excess.join('\n'):'なし'}\n不足品目\n${shortage.length?shortage.join('\n'):'なし'}`}
function lineCopyPage(msg=''){if(!canWorkerReport()){alert('管理者・青果社員のみ表示できます');home();return}pageShell('在庫報告コピー','管理者・青果社員のみ利用できます',`${msg?`<div class="ok">${msg}</div>`:''}<div class="card"><textarea id="lineCopyText" class="textarea">${esc(makeLineCopyText())}</textarea><div class="row" style="margin-top:10px"><button class="btn blue" onclick="copyTextFrom('lineCopyText')">コピー</button><button class="btn btn2" onclick="shareTextFrom('lineCopyText')">LINE共有を開く</button></div></div>`)}
function orderCandidates(){const latest=latestMap();return sortedItems().map(it=>{const r=latest[it.id],total=r?Number(r.total||0):0,s=db.settings[it.id],shortage=yen(Math.max(0,s.min-total));return{it,r,total,s,shortage}}).filter(x=>x.shortage>0)}
function makeOrderCopyText(){const rows=orderCandidates();return`【発注候補】\n${rows.length?rows.map(x=>`${x.it.name}：${fmt(x.shortage)}kg不足`).join('\n'):'なし'}`}
function orderCandidatePage(msg=''){if(!canBuyerView()){alert('管理者・仕入れ担当者のみ表示できます');home();return}const rows=orderCandidates();pageShell('発注候補・発注候補コピー','管理者・仕入れ担当者のみ表示',`${msg?`<div class="ok">${msg}</div>`:''}<div class="notice">下限kgを下回っている有効品目だけ表示します。推奨発注量＝下限kg−現在庫です。</div><div class="card"><label class="label">発注候補コピー文</label><textarea id="orderCopyText" class="textarea">${esc(makeOrderCopyText())}</textarea><div class="row" style="margin-top:10px"><button class="btn blue" onclick="copyTextFrom('orderCopyText')">発注候補をコピー</button><button class="btn btn2" onclick="shareTextFrom('orderCopyText')">LINE共有を開く</button></div></div>${rows.length?rows.map(x=>itemCard(x.it,x.r,x.total,true,x.shortage)).join(''):'<div class="card notice">現在、発注候補はありません。</div>'}`)}
function memoHtml(it){if(!canViewMemo())return'';const memo=db.purchaseMemos[it.id]||'';if(canEditMemo())return`<div class="memo"><label class="label">仕入れメモ</label><textarea id="memo_${it.id}" class="textarea" style="min-height:90px">${esc(memo)}</textarea><button class="btn btn2" style="margin-top:8px" onclick="saveMemo('${it.id}')">メモ保存</button></div>`;return`<div class="memo"><span class="small">仕入れメモ（閲覧のみ）</span><br>${memo?esc(memo).replace(/\n/g,'<br>'):'<span class="small">未入力</span>'}</div>`}
function saveMemo(itemId){if(!canEditMemo()){alert('編集できません');return}db.purchaseMemos[itemId]=document.getElementById('memo_'+itemId).value;save();alert('保存しました')}
function pinButton(it,back){if(!canPin())return'';return`<button class="pin ${isPinned(it.id)?'on':''}" onclick="togglePin('${it.id}','${back}')">${isPinned(it.id)?'★ ピン済':'☆ ピン'}</button>`}
function togglePin(itemId,back){const uid=db.userId||db.user||'';db.pins[uid]=db.pins[uid]||[];if(isPinned(itemId))db.pins[uid]=db.pins[uid].filter(x=>x!==itemId);else db.pins[uid].push(itemId);save();if(back==='orders')orderCandidatePage();else stocks()}
function itemCard(it,r,total,order=false,shortage=0){const s=db.settings[it.id],st=r?judge(total,s):'unset';return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${it.name}</h2><div class="small">適正在庫 ${s.min}kg〜${s.max}kg / 初期入れ数 ${it.pack}kg${r?`<br>最終更新 ${dt(r.createdAt)} / ${esc(r.user)}`:''}</div></div><div style="text-align:right">${pinButton(it,order?'orders':'stocks')}<br><br><span class="badge ${order?'shortage':st}">${order?fmt(shortage)+'kg不足':r?label(st):'未入力'}</span></div></div><div class="grid" style="margin-top:10px"><div class="box"><span class="small">現在庫</span><b>${fmt(total)}kg</b></div><div class="box"><span class="small">${order?'推奨発注量':'在庫目安'}</span><b>${order?fmt(shortage)+'kg':st==='shortage'?fmt(s.min-total)+'kg不足':st==='excess'?fmt(total-s.max)+'kg過多':'-'}</b></div></div>${r&&r.lines?`<div class="small" style="margin-top:8px">内訳：${r.lines.map(l=>`${l.pack}kg×${l.cases}ケース`).join('、')}</div>`:''}${buyerHtml(it)}${memoHtml(it)}${order?'':`<div class="mini"><button class="btn green" onclick="moveForm('${it.id}','入庫')" ${canEdit()?'':'disabled'}>入庫</button><button class="btn orange" onclick="moveForm('${it.id}','出庫')" ${canEdit()?'':'disabled'}>出庫</button><button class="btn btn2" onclick="moveForm('${it.id}','調整')" ${canEdit()?'':'disabled'}>調整</button></div>`}</div>`}
function stocks(){const latest=latestMap();pageShell('在庫一覧・入庫出庫','有効品目だけ表示されます。ピン留め品目は上に表示されます。',`${!canEdit()?'<div class="warn">閲覧のみです。在庫修正は管理者・青果社員だけできます。</div>':''}${sortedItems().map(it=>{const r=latest[it.id];return itemCard(it,r,r?Number(r.total):0,false,0)}).join('')||'<div class="card notice">有効な品目がありません。</div>'}`)}
function moveForm(itemId,type){if(!canEdit()){alert('この権限では在庫修正できません');return}const it=db.items.find(x=>x.id===itemId),current=latestTotal(itemId);pageShell(`${type}入力`,`${it.name} / 現在庫 ${fmt(current)}kg`,`<div class="card"><div class="notice">${type==='調整'?'現在庫をこの数量に置き換えます。':'入れ数kg × ケース数で在庫を増減します。'}</div><label class="label">品目</label><input class="input" value="${it.name}" disabled><br><br><div class="row"><div><label class="label">入れ数kg</label><input id="mvPack" class="input" inputmode="decimal" value="${it.pack}"></div><div><label class="label">ケース数</label><input id="mvCases" class="input" inputmode="decimal" value="1"></div></div><br><label class="label">理由・メモ</label><input id="mvMemo" class="input" placeholder="例：朝入荷、出荷分、棚卸調整"><br><br><button class="btn ${type==='入庫'?'green':type==='出庫'?'orange':'btn2'}" style="width:100%" onclick="applyMove('${itemId}','${type}')">${type}を登録する</button></div>`)}
function applyMove(itemId,type){const it=db.items.find(x=>x.id===itemId),pack=Number(document.getElementById('mvPack').value),cases=Number(document.getElementById('mvCases').value),memo=document.getElementById('mvMemo').value.trim();if(!(pack>0)){alert('入れ数kgは0より大きくしてください');return}if(!(cases>=0)){alert('ケース数は0以上にしてください');return}const before=latestTotal(itemId),qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId],st=judge(after,s),rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();if((st==='shortage'||st==='excess')&&canWorkerReport())lineCopyPage(`${type}を登録しました。`);else{alert(`${type}を登録しました。`);stocks()}}
function weeklyData(){const groups={};db.records.forEach(r=>{const d=new Date(r.createdAt);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));const k=d.toISOString().slice(0,10);groups[k]=groups[k]||[];groups[k].push(r)});const keys=Object.keys(groups).sort().reverse();pageShell('週間データ','入力した在庫を1週間区切りで確認',keys.length?keys.map(k=>{const s=new Date(k+'T00:00:00'),e=new Date(s);e.setDate(e.getDate()+6);const rows=groups[k].slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return`<div class="card"><div class="itemHead"><div><h2 style="margin:0">${ymd(s)}〜${ymd(e)}</h2><div class="small">登録 ${rows.length}件</div></div><button class="btn btn2" onclick="toggleWeek('${k}')">開閉</button></div><div id="week_${k}" style="display:none;margin-top:12px"><table class="table"><thead><tr><th>日時</th><th>区分</th><th>品目</th><th>在庫</th><th>判定</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${dt(r.createdAt)}</td><td>${r.kind}</td><td>${r.itemName}</td><td>${fmt(r.total)}kg</td><td><span class="badge ${r.status}">${label(r.status)}</span></td></tr>`).join('')}</tbody></table></div></div>`}).join(''):'<div class="card notice">週間データはまだありません。</div>')}
function toggleWeek(k){const el=document.getElementById('week_'+k);el.style.display=el.style.display==='none'?'block':'none'}
function moveHistory(){const rows=db.movements.slice().reverse();pageShell('修正履歴','誰が・いつ・何を直したか確認',rows.length?`${canAdmin()?'<button class="btn danger" style="width:100%" onclick="clearMovements()">修正履歴を削除（管理者）</button>':''}${rows.map(m=>`<div class="card"><div class="itemHead"><div><b>${m.itemName}</b> <span class="pill unset">${m.type}</span><div class="small">${dt(m.createdAt)} / ${esc(m.user)}</div></div><span class="badge ${m.diffKg<0?'shortage':m.diffKg>0?'normal':'unset'}">${m.diffKg>0?'+':''}${fmt(m.diffKg)}kg</span></div><div class="total"><span>${fmt(m.beforeTotal)}kg → ${fmt(m.afterTotal)}kg</span><span>${m.pack?`${m.pack}kg×${m.cases}ケース`:''}</span></div>${m.memo?`<div class="small">メモ：${esc(m.memo)}</div>`:''}</div>`).join('')}`:'<div class="card notice">修正履歴はまだありません。</div>')}
function clearMovements(){if(!canAdmin())return;if(confirm('修正履歴を削除しますか？')){db.movements=[];save();moveHistory()}}
function notifications(){const rows=db.notifications.slice().reverse();pageShell('通知履歴','不足・過多になった記録',rows.length?rows.map(n=>`<div class="card"><span class="badge ${n.status}">${label(n.status)}</span><h2>${n.itemName}</h2><div class="small">${dt(n.sentAt)} / ${n.sentResult}</div><pre>${esc(n.message)}</pre></div>`).join(''):'<div class="card notice">通知履歴はまだありません。</div>')}
function settings(){if(!canSetSettings()){alert('設定できません');return}pageShell('適正在庫設定','下限kg〜上限kgの幅を設定できます',`${allSortedItems().map(it=>{const s=db.settings[it.id];return`<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg / ${it.active===false?'停止中':'有効'}</div></div><div><label class="label">下限kg</label><input id="min_${it.id}" class="input" inputmode="decimal" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" inputmode="decimal" value="${s.max}"></div></div>`}).join('')}<button class="btn green bottom" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value),max=Number(document.getElementById('max_'+it.id).value);if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください。`);return}db.settings[it.id]={min,max}}save();alert('保存しました');settings()}
function buyerAssignFormHtml(itemId){const it=itemId?db.items.find(x=>x.id===itemId):null;const assigned=new Set(itemId?assignedBuyerIds(itemId):[]);return `<div class="memo"><label class="label">仕入れ担当者</label><div class="small">参照：${BUYER_SOURCE_NOTE}</div>${buyerUsers().map(u=>`<label class="switch"><input class="buyerCheck" type="checkbox" value="${u.id}" ${assigned.has(u.id)?'checked':''}> ${esc(u.name)}</label>`).join('')||'<span class="small">仕入れ担当者が登録されていません</span>'}</div>`}
function itemsPage(){if(!canManageItems()){alert('品目設定は管理者・青果社員・仕入れ担当者のみです');return home()}pageShell('品目設定','品目追加・編集・停止ができます',`<button class="btn green" style="width:100%" onclick="itemFormPage('')">＋ 品目を追加</button>${allSortedItems().map(it=>{const s=db.settings[it.id];return`<div class="card"><div class="itemHead"><div><b>${it.sort}. ${esc(it.name)}</b><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}kg〜${s.max}kg</div></div><span class="badge ${it.active===false?'unset':'normal'}">${it.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="itemFormPage('${it.id}')">編集</button><button class="btn ${it.active===false?'green':'red'}" onclick="toggleItemActive('${it.id}')">${it.active===false?'有効化':'停止'}</button><button class="btn btn2" onclick="moveItemSort('${it.id}',-1)">上へ</button></div></div>`}).join('')}`)}
function itemFormPage(itemId){if(!canManageItems())return home();const it=itemId?db.items.find(x=>x.id===itemId):null;const s=it?db.settings[it.id]:null;pageShell(it?'品目編集':'品目追加','管理者・青果社員・仕入れ担当者が操作できます',`<div class="card"><label class="label">品目名</label><input id="itemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：きゅうり"><br><br><label class="label">初期入れ数kg</label><input id="itemPack" class="input" inputmode="decimal" value="${it?it.pack:''}" placeholder="例：5"><br><br><div class="notice">下限・上限を空欄にすると、初期入れ数から自動作成します。下限＝入れ数×5、上限＝入れ数×12です。</div><div class="row"><div><label class="label">適正在庫 下限kg</label><input id="itemMin" class="input" inputmode="decimal" value="${s?s.min:''}" placeholder="自動"></div><div><label class="label">適正在庫 上限kg</label><input id="itemMax" class="input" inputmode="decimal" value="${s?s.max:''}" placeholder="自動"></div></div><br><label class="switch"><input id="itemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label>${buyerAssignFormHtml(itemId)}<br><br><button class="btn green" style="width:100%" onclick="saveItem('${itemId||''}')">保存</button></div>`)}
function saveItem(itemId){if(!canManageItems())return;const name=document.getElementById('itemName').value.trim(),pack=Number(document.getElementById('itemPack').value),active=document.getElementById('itemActive').checked;let checked=[...document.querySelectorAll('.buyerCheck:checked')].map(x=>x.value);if(!name)return alert('品目名を入力してください');if(!(pack>0))return alert('初期入れ数kgは0より大きくしてください');let minVal=document.getElementById('itemMin').value.trim(),maxVal=document.getElementById('itemMax').value.trim();let min=minVal===''?Math.max(10,pack*5):Number(minVal),max=maxVal===''?Math.max(20,pack*12):Number(maxVal);min=yen(min);max=yen(max);if(!(min>=0)||!(max>=0)||min>max)return alert('適正在庫の下限・上限を確認してください');if(!itemId&&checked.length===0)checked=autoBuyerIdsForName(name);let id=itemId;if(itemId){const it=db.items.find(x=>x.id===itemId);if(!it)return alert('品目が見つかりません');it.name=name;it.pack=pack;it.active=active;db.settings[itemId]={min,max}}else{id=newId();const sort=(db.items.reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1);db.items.push({id,name,pack,sort,active});db.settings[id]={min,max};db.purchaseMemos[id]=''}db.buyerAssignments=db.buyerAssignments||{};for(const u of buyerUsers()){db.buyerAssignments[u.id]=db.buyerAssignments[u.id]||[];db.buyerAssignments[u.id]=db.buyerAssignments[u.id].filter(x=>x!==id);if(checked.includes(u.id))db.buyerAssignments[u.id].push(id)}save();alert('保存しました');itemsPage()}
function toggleItemActive(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId);if(!it)return;it.active=it.active===false;save();itemsPage()}
function moveItemSort(itemId,dir){if(!canManageItems())return;const items=allSortedItems();const idx=items.findIndex(x=>x.id===itemId),j=idx+dir;if(idx<0||j<0||j>=items.length)return;const a=items[idx],b=items[j],tmp=a.sort;a.sort=b.sort;b.sort=tmp;save();itemsPage()}
function resetData(){if(!canAdmin()){alert('管理者のみです');return}if(confirm('共有データを初期化しますか？')){const keepUser=db.user,keepUserId=db.userId,keepRole=db.role,keepUsers=db.users;db=defaultState();db.users=keepUsers;db.user=keepUser;db.userId=keepUserId;db.role=keepRole;save();home()}}
async function copyTextFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t);alert('コピーしました')}catch(e){prompt('コピーしてください',t)}}
function shareTextFrom(id){location.href=`https://line.me/R/share?text=${encodeURIComponent(document.getElementById(id).value)}`}
async function boot(){document.getElementById('app').innerHTML='<main class="wrap"><div class="card notice">読み込み中です...</div></main>';try{await loadCloud()}catch(e){console.error(e);cloudReady=false}login()}
boot();
</script></body></html>
