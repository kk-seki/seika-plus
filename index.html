function defaultState(){const settings=Object.fromEntries(ITEMS.map(it=>[it.id,{min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)}]));return{user:null,userId:null,role:null,settings,records:[],movements:[],notifications:[],items:ITEMS,purchaseMemos:{},pins:{},users:DEFAULT_USERS,buyerAssignments:(typeof structuredClone==='function'?structuredClone(DEFAULT_BUYER_ASSIGNMENTS):JSON.parse(JSON.stringify(DEFAULT_BUYER_ASSIGNMENTS))),monthlyArchives:{},optimalStockChangeLogs:[],historyCleanups:[],duplicateDeleteLogs:[]}}
function normalize(d){const base=defaultState();d=d||{};d={...base,...d};d.records=(d.records||[]).sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));d.movements=d.movements||[];d.notifications=d.notifications||[];d.items=d.items&&d.items.length?d.items:ITEMS;d.items=d.items.map((it,i)=>({...it,pack:Number(it.pack||0),sort:Number(it.sort||i+1),active:it.active!==false}));d.settings=d.settings||base.settings;d.purchaseMemos=d.purchaseMemos||{};d.pins=d.pins||{};d.users=(d.users&&d.users.length?d.users:DEFAULT_USERS).map(u=>({...u,active:u.active!==false,group:u.group||GROUP[u.role]||'その他'}));d.buyerAssignments=d.buyerAssignments||{};d.monthlyArchives=d.monthlyArchives||{};d.optimalStockChangeLogs=d.optimalStockChangeLogs||[];d.historyCleanups=d.historyCleanups||[];d.duplicateDeleteLogs=d.duplicateDeleteLogs||[];for(const k of Object.keys(d.monthlyArchives)){d.monthlyArchives[k]={...d.monthlyArchives[k],targetMonth:d.monthlyArchives[k].targetMonth||k}}for(const u of d.users){if(u.role==='buyer'&&!d.buyerAssignments[u.id])d.buyerAssignments[u.id]=[]}for(const du of DEFAULT_USERS){if(!d.users.find(u=>u.id===du.id))d.users.push(du)}for(const it of d.items){if(!d.settings[it.id])d.settings[it.id]={min:Math.max(10,it.pack*5),max:Math.max(20,it.pack*12)};if(d.purchaseMemos[it.id]===undefined)d.purchaseMemos[it.id]=''}return d}
function init(){try{const saved=localStorage.getItem(STORE)||localStorage.getItem(LEGACY_STATE_ID);if(saved)return normalize(JSON.parse(saved))}catch(e){}return defaultState()}
function activeUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.active!==false)}function findUser(id){return (db.users||DEFAULT_USERS).find(u=>u.id===id)}function buyerUsers(){return (db.users||DEFAULT_USERS).filter(u=>u.role==='buyer'&&u.active!==false)}function activeItems(){return (db.items||[]).filter(it=>it.active!==false)}function allSortedItems(){return (db.items||[]).slice().sort((a,b)=>(a.sort||0)-(b.sort||0))}
function assignedBuyerIds(itemId){const ba=db.buyerAssignments||{};return Object.keys(ba).filter(uid=>(ba[uid]||[]).includes(itemId))}function buyerNamesForItem(itemId){return assignedBuyerIds(itemId).map(uid=>findUser(uid)).filter(Boolean).map(u=>u.name)}function autoBuyerIdsForName(name){const uid=ITEM_BUYER_MASTER[String(name||'').trim()];return uid?[uid]:[]}
function buyerText(it){const names=buyerNamesForItem(it.id);return names.length?names.map(esc).join('、'):'未設定'}function buyerHtml(it){const names=buyerNamesForItem(it.id);return `<div class="memo"><span class="small">仕入れ担当者：${names.length?names.map(esc).join('、'):'未設定'}</span></div>`}function memoText(it){const memo=(db.purchaseMemos&&db.purchaseMemos[it.id])||'';return memo?esc(memo).replace(/\n/g,' / '):'未入力'}
function isMyBuyerItem(itemId){return db.role==='buyer'&&((db.buyerAssignments||{})[db.userId]||[]).includes(itemId)}
function cloudPayload(){return{settings:db.settings,records:db.records,movements:db.movements,notifications:db.notifications,items:db.items,purchaseMemos:db.purchaseMemos,pins:db.pins,users:db.users,buyerAssignments:db.buyerAssignments,monthlyArchives:db.monthlyArchives,optimalStockChangeLogs:db.optimalStockChangeLogs,historyCleanups:db.historyCleanups,duplicateDeleteLogs:db.duplicateDeleteLogs}}

async function loadCloud(){let rows=await fetchState(STATE_ID);if(!(rows&&rows[0]&&rows[0].data)){rows=await fetchState(LEGACY_STATE_ID).catch(()=>[])}if(rows&&rows[0]&&rows[0].data){const u=db.user,uid=db.userId,r=db.role;db=normalize({...rows[0].data,user:u,userId:uid,role:r});localStorage.setItem(STORE,JSON.stringify(db));markSync()}cloudReady=true}

function yen(n){return Math.round(Number(n||0)*100)/100}function fmt(n){return yen(n).toLocaleString('ja-JP')}function nowIso(){return new Date().toISOString()}function dt(iso){return new Date(iso).toLocaleString('ja-JP')}function ymd(d){return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}function ymdKey(d){return new Date(d).toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'})}

function judge(total,s){if(!s)return'unset';if(total<s.min)return'shortage';if(total>s.max)return'excess';return'normal'}function label(st){return st==='shortage'?'不足':st==='excess'?'過多':st==='normal'?'適正':'未設定'}
function canEdit(){return db.role==='admin'||db.role==='worker'}function canAdmin(){return db.role==='admin'}function canBuyerView(){return db.role==='admin'||db.role==='buyer'}function canWorkerReport(){return db.role==='admin'||db.role==='worker'}function canSetSettings(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canManageItems(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canPin(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}function canViewMemo(){return db.role==='admin'||db.role==='buyer'||db.role==='worker'}function canEditMemo(){return db.role==='admin'||db.role==='buyer'}
function latestMap(records=db.records){const latest={};records.slice().sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0)).forEach(r=>latest[r.itemId]=r);return latest}function latestRecord(itemId){return latestMap()[itemId]||null}function latestTotal(itemId){const r=latestRecord(itemId);return r?Number(r.total||0):0}
function todayKey(){return ymdKey(new Date())}function isToday(iso){return ymdKey(new Date(iso))===todayKey()}function withinDays(iso,days=RETENTION_DAYS){return new Date(iso).getTime()>=Date.now()-days*DAY_MS}function records90(){return db.records.filter(r=>r.createdAt&&withinDays(r.createdAt))}function movements90(){return db.movements.filter(r=>r.createdAt&&withinDays(r.createdAt))}function notifications90(){return db.notifications.filter(r=>r.sentAt&&withinDays(r.sentAt))}

pageShell('在庫管理',`${esc(db.user)} / ${ROLE[db.role]} / ${cloudReady?'Supabase保存':'ブラウザ保存'}`,`<div class="notice">他の人が入力した内容を確認する場合は、画面上部の「再読込」を押してください。</div>${canWorkerReport()?missingAlertHtml():''}<div class="card grid"><div class="box"><span class="small">自分の発注候補</span><b>${myRows.length}品</b></div><div class="box"><span class="small">担当品目</span><b>${myItems.length}品</b></div><div class="box"><span class="small">メモ入力済み</span><b>${memoCount}/${myItems.length}品</b></div><div class="box"><span class="small">最終入力</span><b>${lastInputText}</b></div></div><div class="card"><b>仕入れ担当者向け</b><div class="small">自分の担当品目・発注候補・市場動向メモをすぐ確認できます。</div></div><div class="menu"><button class="btn orange" onclick="orderCandidatePage()">自分の発注候補</button><button class="btn btn2" onclick="marketMemoPage()">市場動向・産地状況メモ</button><button class="btn btn2" onclick="stocks()">在庫確認</button><button class="btn btn2" onclick="weeklyData()">在庫表</button><button class="btn btn2" onclick="settings()">適正在庫設定</button><button class="btn btn2" onclick="itemsPage()">品目設定</button><button class="btn btn2" onclick="notifications()">通知履歴</button></div><div class="warn">仕入れ担当者は在庫入力・在庫修正はできません。</div>`,{noBack:true});return}

function changePassword(){const u=findUser(db.userId),old=document.getElementById('oldPass').value,np=document.getElementById('newPass').value,np2=document.getElementById('newPass2').value;if(!u)return alert('ユーザーが見つかりません');if(old!==u.password)return alert('現在のパスワードが違います');if(np.length<4)return alert('新しいパスワードは4文字以上にしてください');if(np!==np2)return alert('確認用パスワードが一致しません');u.password=np;save();alert('パスワードを変更しました');accountMenu()}

function saveUser(editId){if(!canAdmin())return;const name=document.getElementById('uName').value.trim(),role=document.getElementById('uRole').value,group=document.getElementById('uGroup').value.trim()||GROUP[role],uid=(editId||document.getElementById('uId').value.trim()),pass=document.getElementById('uPass').value,active=document.getElementById('uActive').checked;if(!name)return alert('名前を入力してください');if(!uid)return alert('ログインIDを入力してください');if(!/^[A-Za-z0-9_-]+$/.test(uid))return alert('ログインIDは半角英数字・_・-で入力してください');if(pass.length<4)return alert('パスワードは4文字以上にしてください');if(!editId&&findUser(uid))return alert('このログインIDは既に使われています');if(editId){const u=findUser(editId);u.name=name;u.role=role;u.group=group;u.password=pass;u.active=active;if(editId===db.userId){db.user=name;db.role=role}}else{db.users.push({id:uid,name,role,group,password:pass,active})}save();alert('保存しました');userAdminPage()}
function toggleUserActive(uid){if(!canAdmin()||uid===db.userId)return;const u=findUser(uid);if(!u)return;u.active=u.active===false;save();userAdminPage()}function resetUserPassword(uid){if(!canAdmin())return;const u=findUser(uid);if(!u)return;if(confirm(`${u.name}のパスワードを初期値に戻しますか？`)){u.password=u.role==='viewer'?'0000':'seki1111';save();alert('戻しました');userAdminPage()}}
function inventory(msg=''){
setScreen('inventory',[msg]);
if(!canEdit()){alert('この権限では在庫入力できません');return}
const today=todayLatestMap();
formState=allSortedItems().filter(it=>it.active!==false).map(it=>{const r=today[it.id];return{itemId:it.id,fromToday:!!r,lines:r&&r.lines&&r.lines.length?r.lines.map(l=>({pack:String(l.pack??it.pack),cases:String(l.cases??'')})):[{pack:String(it.pack),cases:''}]}});
renderInventory(msg)
}
function renderInventory(msg='',err=''){
lastMessage=msg||err||'';
const counts={all:formState.length,missing:formState.filter(r=>!inventoryStateHasInput(r)).length,entered:formState.filter(r=>inventoryStateHasInput(r)||r.fromToday).length};
const visible=formState.filter(r=>inventoryFilter==='missing'?!inventoryStateHasInput(r):inventoryFilter==='entered'?(inventoryStateHasInput(r)||r.fromToday):true);
const filterHtml=`<div class="card"><div class="small">表示切替</div><div class="filterBtns"><button class="filterBtn all ${inventoryFilter==='all'?'on':''}" onclick="setInventoryFilter('all')">すべて<br>${counts.all}品</button><button class="filterBtn missing ${inventoryFilter==='missing'?'on':''}" onclick="setInventoryFilter('missing')">未入力だけ<br>${counts.missing}品</button><button class="filterBtn entered ${inventoryFilter==='entered'?'on':''}" onclick="setInventoryFilter('entered')">入力済みだけ<br>${counts.entered}品</button></div><div class="small">ケース数に「0」を入力すると、在庫なし（0kg）として保存されます。空欄は未入力扱いです。品目の上下ボタンで並び替えできます。まとめて登録すると、その並び順が全員共通で保存されます。</div></div>`;
const cards=visible.map((r)=>{const realIdx=formState.indexOf(r),it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id],hasInput=inventoryStateHasInput(r),total=yen(r.lines.reduce((a,l)=>inventoryLineHasInput(l)?a+Number(l.pack)*Number(l.cases):a,0)),st=hasInput?judge(total,s):'unset';return`<section class="card ${r.fromToday||hasInput?'entered':''}"><div class="itemHead"><div><h2 style="margin:0 0 4px">${realIdx+1}. ${it.name}</h2><div class="small">適正在庫 ${s.min}kg〜${s.max}kg / 初期入れ数 ${it.pack}kg<br>仕入れ担当者：${buyerText(it)}${previousInputHtml(it.id)}${r.fromToday?'<br>本日入力済み（Supabaseデータ反映）':''}</div><div class="small" style="margin-top:8px"><button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},-1)" ${realIdx===0?'disabled':''}>上へ</button> <button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},1)" ${realIdx===formState.length-1?'disabled':''}>下へ</button></div></div><span class="badge ${hasInput?st:'unset'}">${hasInput&&total===0?'在庫なし':r.fromToday?'本日入力済み':hasInput?label(st):'未入力'}</span></div>${r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" onchange="formState[${realIdx}].lines[${j}].pack=this.value;renderInventory(lastMessage)"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄=未入力 / 0=在庫なし" onchange="formState[${realIdx}].lines[${j}].cases=this.value;renderInventory(lastMessage)"></div><div class="kg">小計 ${inventoryLineHasInput(l)?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${realIdx}].lines.splice(${j},1);renderInventory(lastMessage)">削除</button>`:''}</div></div>`).join('')}<button class="btn btn2" onclick="formState[${realIdx}].lines.push({pack:'',cases:''});renderInventory(lastMessage)">＋ 入れ数を追加</button><div class="total"><span>合計</span><span>${hasInput?fmt(total)+'kg':'- kg'}</span></div></section>`}).join('');
pageShell('在庫入力','当日入力済みデータは他端末にも表示されます。翌日は未入力表示に戻ります。',`${okHtml(msg)}${err?`<div class="err">${esc(err)}</div>`:''}${filterHtml}${cards||`<div class="card notice">「${inventoryFilterLabel(inventoryFilter)}」に該当する品目はありません。</div>`}<button id="saveInventoryBtn" class="btn green bottom" onclick="submitInventory()" ${formState.length&&!isInventorySaving?'':'disabled'}>${isInventorySaving?'保存中...':'まとめて登録'}</button>`)
}
function moveInventoryItem(idx,dir){const j=idx+dir;if(idx<0||j<0||j>=formState.length)return;const tmp=formState[idx];formState[idx]=formState[j];formState[j]=tmp;renderInventory(lastMessage||'')}
function saveInventorySortOrderFromFormState(){const seen=new Set();let n=1;for(const r of formState){const it=db.items.find(x=>x.id===r.itemId);if(it&&!seen.has(it.id)){it.sort=n++;seen.add(it.id)}}for(const it of allSortedItems()){if(!seen.has(it.id)){it.sort=n++;seen.add(it.id)}}}
async function submitInventory(){
if(isInventorySaving)return;
const btn=document.getElementById('saveInventoryBtn');if(btn){btn.disabled=true;btn.textContent='保存中...'}
try{isInventorySaving=true;renderInventory(lastMessage||'');const results=[];
for(const r of formState){const it=db.items.find(x=>x.id===r.itemId),lines=[];for(const l of r.lines){if(l.pack===''&&l.cases!=='')throw new Error(`${it.name}: 入れ数も入力してください。`);if(l.pack!==''&&l.cases!==''){const p=Number(l.pack),c=Number(l.cases);if(!(p>0))throw new Error(`${it.name}: 入れ数は0より大きくしてください。`);if(!(c>=0))throw new Error(`${it.name}: ケース数は0以上にしてください。`);lines.push({pack:p,cases:c,subtotal:yen(p*c)})}}if(lines.length){const todayPrev=todayLatestMap()[it.id]||null,before=todayPrev?Number(todayPrev.total||0):null,total=yen(lines.reduce((a,l)=>a+l.subtotal,0)),s=db.settings[it.id],st=judge(total,s),rec={id:newId(),kind:todayPrev?'当日分修正':'一括入力',itemId:it.id,itemName:it.name,total,setting:{...s},status:st,lines,user:db.user,role:db.role,createdAt:nowIso()};results.push({rec,before,todayPrev})}}
if(!results.length)throw new Error('入力された品目がありません。');
if(results.some(x=>duplicateExists(x.rec))&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isInventorySaving=false;renderInventory(lastMessage||'');return}
for(const x of results){const rec=x.rec;db.records.push(rec);if(x.todayPrev&&Number(x.before)!==Number(rec.total)){db.movements.push({id:newId(),recordId:rec.id,itemId:rec.itemId,itemName:rec.itemName,type:'当日分修正',beforeTotal:x.before,afterTotal:rec.total,diffKg:yen(rec.total-x.before),pack:null,cases:null,memo:'当日入力分の修正',user:db.user,role:db.role,createdAt:rec.createdAt})}}
const alerts=results.map(x=>x.rec).filter(r=>r.status==='shortage'||r.status==='excess').map(r=>makeNotification(r));db.notifications.push(...alerts);saveInventorySortOrderFromFormState();save();const msg=`保存しました。入力品目：${results.length}件 / 品目順も保存 / 確認時刻：${currentTimeLabel()}`;isInventorySaving=false;if(alerts.length&&canWorkerReport())lineCopyPage(msg);else if(alerts.length&&canBuyerView())orderCandidatePage(msg);else inventory(msg)}catch(e){isInventorySaving=false;renderInventory('',e.message)}
}
function makeNotification(r){return{id:newId(),recordId:r.id,itemId:r.itemId,itemName:r.itemName,status:r.status,total:r.total,message:lineMessage(r),sentResult:'コピー用に作成',sentAt:nowIso(),user:db.user}}function lineMessage(r){const diff=r.status==='shortage'?r.setting.min-r.total:r.total-r.setting.max;return`${r.status==='shortage'?'【在庫不足】':'【在庫過多】'} ${r.itemName} ${fmt(r.total)}kg（適正 ${r.setting.min}kg〜${r.setting.max}kg / ${r.status==='shortage'?'不足':'超過'} ${fmt(diff)}kg）`}
function makeLineCopyText(){const latest=latestMap(),excess=[],shortage=[];activeItems().forEach(it=>{const r=latest[it.id];if(!r)return;const st=judge(Number(r.total||0),db.settings[it.id]);if(st==='excess')excess.push(`・${it.name}：${fmt(r.total)}kg`);if(st==='shortage')shortage.push(`・${it.name}：${fmt(r.total)}kg`)});return`【在庫報告】\n\n■ 過多品目\n${excess.length?excess.join('\n'):'なし'}\n\n■ 不足品目\n${shortage.length?shortage.join('\n'):'なし'}`}
function lineCopyPage(msg=''){setScreen('lineCopyPage',[msg]);if(!canWorkerReport()){alert('管理者・青果社員のみ表示できます');home();return}pageShell('在庫報告コピー','管理者・青果社員のみ利用できます',`${msg?`<div class="ok">${msg}</div>`:''}<div class="card"><textarea id="lineCopyText" class="textarea">${esc(makeLineCopyText())}</textarea><div class="row" style="margin-top:10px"><button class="btn blue" onclick="copyTextFrom('lineCopyText')">コピー</button><button class="btn btn2" onclick="shareLineFrom('lineCopyText')">LINEで共有</button><button class="btn btn2" onclick="shareLineWorksFrom('lineCopyText')">LINE WORKSで共有</button></div></div>`)}
function orderCandidates(){const latest=latestMap();return sortedItems().map(it=>{const r=latest[it.id],total=r?Number(r.total||0):0,s=db.settings[it.id],shortage=yen(Math.max(0,s.min-total));return{it,r,total,s,shortage}}).filter(x=>x.shortage>0)}
function orderCandidatesForBuyer(uid){return orderCandidates().filter(x=>assignedBuyerIds(x.it.id).includes(uid))}
function makeOrderCopyTextForRows(title,rows){
const lines=[`【発注候補：${title}】`,`確認時刻：${currentTimeLabel()}`];
if(!rows.length){lines.push('なし');return lines.join('\n')}
rows.forEach(x=>{lines.push(`・${x.it.name}：${fmt(x.shortage)}kg不足（現在 ${fmt(x.total)}kg / 下限 ${fmt(x.s.min)}kg）`);const memo=db.purchaseMemos&&db.purchaseMemos[x.it.id];if(memo)lines.push(`　メモ：${String(memo).replace(/\n/g,' / ')}`)});
return lines.join('\n')

function moveForm(itemId,type){setScreen('moveForm',[itemId,type]);if(!canEdit()){alert('この権限では在庫修正できません');return}const it=db.items.find(x=>x.id===itemId),current=latestTotal(itemId);pageShell(`${type}入力`,`${it.name} / 現在庫 ${fmt(current)}kg`,`<div class="card"><div class="notice">入庫は在庫を増やし、出庫は在庫を減らします。入れ数kg × ケース数で数量を入力します。</div><label class="label">品目</label><input class="input" value="${it.name}" disabled><br><br><div class="row"><div><label class="label">入れ数kg</label><input id="mvPack" class="input" inputmode="decimal" value="${it.pack}"></div><div><label class="label">ケース数</label><input id="mvCases" class="input" inputmode="decimal" value="1"></div></div><br><label class="label">理由・メモ</label><input id="mvMemo" class="input" placeholder="例：朝入荷、出荷分、廃棄分"><br><br><button id="moveSaveBtn" class="btn ${type==='入庫'?'green':'orange'}" style="width:100%" onclick="applyMove('${itemId}','${type}')" ${isMoveSaving?'disabled':''}>${isMoveSaving?'保存中...':type+'を登録する'}</button></div>`)}
function applyMove(itemId,type){if(isMoveSaving)return;const btn=document.getElementById('moveSaveBtn');if(btn){btn.disabled=true;btn.textContent='保存中...'}try{isMoveSaving=true;const it=db.items.find(x=>x.id===itemId),pack=Number(document.getElementById('mvPack').value),cases=Number(document.getElementById('mvCases').value),memo=document.getElementById('mvMemo').value.trim();if(!(pack>0))throw new Error('入れ数kgは0より大きくしてください');if(!(cases>=0))throw new Error('ケース数は0以上にしてください');const before=latestTotal(itemId),qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId],st=judge(after,s),rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};if(duplicateExists(rec)&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isMoveSaving=false;moveForm(itemId,type);return}db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();const msg=`${type}を保存しました。確認時刻：${currentTimeLabel()}`;isMoveSaving=false;if((st==='shortage'||st==='excess')&&canWorkerReport())lineCopyPage(msg);else stocks()}catch(e){isMoveSaving=false;alert(e.message);moveForm(itemId,type)}}

function deleteOldHistory(){if(!canAdmin())return;const ms=oldMovementRows(),ns=oldNotificationRows();if(!ms.length&&!ns.length)return alert('削除対象はありません');if(!confirm('90日を超えた修正履歴データを削除します。\n対象は入庫・出庫・調整などの修正履歴と通知履歴です。\nこの操作は元に戻せません。\n本当に削除しますか？'))return;const mIds=new Set(ms.map(x=>x.id)),nIds=new Set(ns.map(x=>x.id));db.movements=db.movements.filter(x=>!mIds.has(x.id));db.notifications=db.notifications.filter(x=>!nIds.has(x.id));db.historyCleanups=db.historyCleanups||[];db.historyCleanups.push({id:newId(),type:'old_movements_notifications_90days',deletedMovements:ms.length,deletedNotifications:ns.length,deletedBy:db.user,deletedAt:nowIso()});save();oldHistoryCleanupPage(`90日超の修正履歴を削除しました。movements：${ms.length}件 / notifications：${ns.length}件`)}

function latestOptimalStockChange(itemId){return(db.optimalStockChangeLogs||[]).filter(r=>r.itemId===itemId).sort((a,b)=>new Date(b.changedAt||0)-new Date(a.changedAt||0))[0]||null}
function optimalStockLastText(itemId){const r=latestOptimalStockChange(itemId);return r?`前回更新：${dt(r.changedAt)} / ${esc(r.changedBy||'不明')}`:'前回更新：記録なし'}
function settings(){setScreen('settings');if(!canSetSettings()){alert('設定できません');return}const itemsForSettings=allSortedItems().sort((a,b)=>{if(db.role==='buyer'){const aa=isMyBuyerItem(a.id)?0:1,bb=isMyBuyerItem(b.id)?0:1;if(aa!==bb)return aa-bb}return(a.sort||0)-(b.sort||0)});pageShell('適正在庫設定','下限kg〜上限kgの幅を設定できます。仕入れ担当者は自分の担当品目が上に表示されます。',`${itemsForSettings.map(it=>{const s=db.settings[it.id];return`<div class="card row"><div><b>${it.name}</b><div class="small">初期入れ数 ${it.pack}kg / ${it.active===false?'停止中':'有効'}<br>仕入れ担当者：${buyerText(it)}${isMyBuyerItem(it.id)?'<br>あなたの担当品目です':''}<br>${optimalStockLastText(it.id)}</div></div><div><label class="label">下限kg</label><input id="min_${it.id}" class="input" inputmode="decimal" value="${s.min}"></div><div><label class="label">上限kg</label><input id="max_${it.id}" class="input" inputmode="decimal" value="${s.max}"></div></div>`}).join('')}<button class="btn green bottom" onclick="saveSettings()">設定を保存</button>`)}
function saveSettings(){for(const it of db.items){const min=Number(document.getElementById('min_'+it.id).value),max=Number(document.getElementById('max_'+it.id).value);if(!(min>=0)||!(max>=0)||min>max){alert(`${it.name}の設定を確認してください。`);return}const before={...(db.settings[it.id]||{})};const after={min,max};db.settings[it.id]=after;addOptimalStockChangeLog(it,before,after,'適正在庫設定画面から変更')}save();alert('保存しました');settings()}
function buyerAssignFormHtml(itemId){const assigned=new Set(itemId?assignedBuyerIds(itemId):[]);return `<div class="memo"><label class="label">仕入れ担当者</label><div class="small">参照：${BUYER_SOURCE_NOTE}</div>${buyerUsers().map(u=>`<label class="switch"><input class="buyerCheck" type="checkbox" value="${u.id}" ${assigned.has(u.id)?'checked':''}> ${esc(u.name)}</label>`).join('')||'<span class="small">仕入れ担当者が登録されていません</span>'}</div>`}
function itemsPage(){setScreen('itemsPage');if(!canManageItems()){alert('品目設定は管理者・青果社員・仕入れ担当者のみです');return home()}pageShell('品目設定','品目追加・編集・停止ができます',`<button class="btn green" style="width:100%" onclick="itemFormPage('')">＋ 品目を追加</button>${allSortedItems().map(it=>{const s=db.settings[it.id];return`<div class="card"><div class="itemHead"><div><b>${it.sort}. ${esc(it.name)}</b><div class="small">初期入れ数 ${it.pack}kg / 適正 ${s.min}kg〜${s.max}kg</div></div><span class="badge ${it.active===false?'unset':'normal'}">${it.active===false?'停止中':'有効'}</span></div><div class="mini"><button class="btn btn2" onclick="itemFormPage('${it.id}')">編集</button><button class="btn ${it.active===false?'green':'red'}" onclick="toggleItemActive('${it.id}')">${it.active===false?'有効化':'停止'}</button><button class="btn btn2" onclick="moveItemSort('${it.id}',-1)">上へ</button></div></div>`}).join('')}`)}
function itemFormPage(itemId){setScreen('itemFormPage',[itemId]);if(!canManageItems())return home();const it=itemId?db.items.find(x=>x.id===itemId):null;const s=it?db.settings[it.id]:null;pageShell(it?'品目編集':'品目追加','管理者・青果社員・仕入れ担当者が操作できます',`<div class="card"><label class="label">品目名</label><input id="itemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：きゅうり"><br><br><label class="label">初期入れ数kg</label><input id="itemPack" class="input" inputmode="decimal" value="${it?it.pack:''}" placeholder="例：5"><br><br><div class="notice">下限・上限を空欄にすると、初期入れ数から自動作成します。下限＝入れ数×5、上限＝入れ数×12です。</div><div class="row"><div><label class="label">適正在庫 下限kg</label><input id="itemMin" class="input" inputmode="decimal" value="${s?s.min:''}" placeholder="自動"></div><div><label class="label">適正在庫 上限kg</label><input id="itemMax" class="input" inputmode="decimal" value="${s?s.max:''}" placeholder="自動"></div></div><br><label class="switch"><input id="itemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label>${buyerAssignFormHtml(itemId)}<br><br><button class="btn green" style="width:100%" onclick="saveItem('${itemId||''}')">保存</button></div>`)}
function saveItem(itemId){if(!canManageItems())return;const name=document.getElementById('itemName').value.trim(),pack=Number(document.getElementById('itemPack').value),active=document.getElementById('itemActive').checked;let checked=[...document.querySelectorAll('.buyerCheck:checked')].map(x=>x.value);if(!name)return alert('品目名を入力してください');if(!(pack>0))return alert('初期入れ数kgは0より大きくしてください');let minVal=document.getElementById('itemMin').value.trim(),maxVal=document.getElementById('itemMax').value.trim();let min=minVal===''?Math.max(10,pack*5):Number(minVal),max=maxVal===''?Math.max(20,pack*12):Number(maxVal);min=yen(min);max=yen(max);if(!(min>=0)||!(max>=0)||min>max)return alert('適正在庫の下限・上限を確認してください');if(!itemId&&checked.length===0)checked=autoBuyerIdsForName(name);let id=itemId;if(itemId){const it=db.items.find(x=>x.id===itemId);if(!it)return alert('品目が見つかりません');const oldSetting={...(db.settings[itemId]||{})};it.name=name;it.pack=pack;it.active=active;db.settings[itemId]={min,max};addOptimalStockChangeLog({id:itemId,name},oldSetting,db.settings[itemId],'品目編集画面から変更')}else{id=newId();const sort=(db.items.reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1);db.items.push({id,name,pack,sort,active});db.settings[id]={min,max};db.purchaseMemos[id]=''}db.buyerAssignments=db.buyerAssignments||{};for(const u of buyerUsers()){db.buyerAssignments[u.id]=db.buyerAssignments[u.id]||[];db.buyerAssignments[u.id]=db.buyerAssignments[u.id].filter(x=>x!==id);if(checked.includes(u.id))db.buyerAssignments[u.id].push(id)}save();alert('保存しました');itemsPage()}
function toggleItemActive(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId);if(!it)return;it.active=it.active===false;save();itemsPage()}function moveItemSort(itemId,dir){if(!canManageItems())return;const items=allSortedItems();const idx=items.findIndex(x=>x.id===itemId),j=idx+dir;if(idx<0||j<0||j>=items.length)return;const a=items[idx],b=items[j],tmp=a.sort;a.sort=b.sort;b.sort=tmp;save();itemsPage()}
function resetData(){alert('既存データ保護のため、データ初期化は停止しています。')}

function monthStartKey(d){const x=new Date(d);return new Date(x.getFullYear(),x.getMonth(),1).toLocaleDateString('sv-SE')}
function addMonthsToKey(key,months){const d=new Date(key+'T00:00:00');d.setMonth(d.getMonth()+months);return monthStartKey(d)}
function previousMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-1)}
function deletableLatestMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-4)}
function monthLabel(key){const [y,m]=key.split('-');return `${y}年${Number(m)}月分`}
function recordMonthKey(r){return monthStartKey(new Date(r.createdAt))}
function isMonthlyExcelRecord(r){return r&&(r.kind==='一括入力'||r.kind==='当日分修正')}
function recordsForMonth(key){return (db.records||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key&&isMonthlyExcelRecord(r))}
function movementsForMonth(key){return (db.movements||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key)}
function notificationsForMonth(key){return (db.notifications||[]).filter(r=>r.sentAt&&recordMonthKey({createdAt:r.sentAt})===key)}
function monthlyKeysWithRecords(){return [...new Set((db.records||[]).filter(r=>r.createdAt&&isMonthlyExcelRecord(r)).map(recordMonthKey))].sort().reverse()}
function monthlyArchive(key){db.monthlyArchives=db.monthlyArchives||{};db.monthlyArchives[key]=db.monthlyArchives[key]||{targetMonth:key,status:'pending'};return db.monthlyArchives[key]}
function monthlyExportTasks(){const prev=previousMonthKey();return monthlyKeysWithRecords().filter(k=>k<=prev).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>!x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyDeleteTasks(){const limit=deletableLatestMonthKey();return monthlyKeysWithRecords().filter(k=>k<=limit).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyHomeNoticeHtml(){const tasks=monthlyExportTasks();if(!tasks.length)return'';const t=tasks[0];return`<div class="card warn flash"><b>月次在庫Excel作成</b><div class="small">${monthLabel(t.key)}の在庫Excelを作成できます。管理画面からExcel作成を実行してください。</div><button class="btn orange" style="width:100%;margin-top:10px" onclick="monthlyArchivePage()">月次Excel・履歴管理を開く</button></div>`}
function escapeCsv(v){const s=String(v??'');return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function downloadTextFile(filename,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500)}
function buildMonthlyExcelHtml(key,rows){
 const itemsBase=allSortedItems().slice();
 const itemMap=Object.fromEntries(itemsBase.map(it=>[it.id,it]));
 rows.forEach(r=>{if(r.itemId&&!itemMap[r.itemId]){const it={id:r.itemId,name:r.itemName||r.itemId,pack:'',sort:9999,active:true};itemsBase.push(it);itemMap[it.id]=it}});
 const items=itemsBase.filter(it=>it.active!==false||rows.some(r=>r.itemId===it.id)).sort((a,b)=>(a.sort||9999)-(b.sort||9999));
 const [yy,mm]=key.split('-').map(Number),monthStart=new Date(yy,mm-1,1),monthEnd=new Date(yy,mm,0);
 const jpDate=d=>d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
 const md=d=>d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
 const hm=d=>d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
 const wname=d=>'日月火水木金土'[d.getDay()];
 const weekStart=d=>{const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x};
 const latest={};
 rows.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).forEach(r=>{const d=new Date(r.createdAt),dk=ymdKey(d);latest[r.itemId+'_'+dk]=r});
 const weeks=[];for(let s=weekStart(monthStart);s<=monthEnd;s.setDate(s.getDate()+7)){const x=new Date(s);weeks.push(x)}
 const styles=`<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827}h1{font-size:22px}table{border-collapse:collapse;margin:0 0 22px 0}th,td{border:1px solid #bfbfbf;padding:7px 9px;vertical-align:middle;white-space:nowrap}th{background:#d9eaf7;font-weight:bold}.summary th{background:#e2f0d9}.weekTitle{background:#1f4e79;color:white;font-size:18px;font-weight:bold;text-align:left}.item{background:#f8fafc;font-weight:bold}.normal{background:#d9ead3}.shortage{background:#f4cccc}.excess{background:#fce4d6}.unset{background:#f2f2f2;color:#666}.small{font-size:11px;color:#555}.note{color:#555}</style>`;
 const summary=`<h1>在庫履歴 ${monthLabel(key)} 週区切り横長表</h1><table class="summary"><tr><th>項目</th><th>内容</th></tr><tr><td>対象月</td><td>${monthLabel(key)}</td></tr><tr><td>作成日時</td><td>${dt(nowIso())}</td></tr><tr><td>履歴件数</td><td>${rows.length}</td></tr><tr><td>形式</td><td>週区切り・横長形式（品目を縦、日付を横）</td></tr><tr><td>注意</td><td>このファイルを保存後、アプリ内で「Excel保存確認」にチェックしてください。</td></tr></table>`;
 const weekly=weeks.map((ws,wi)=>{const days=[...Array(7)].map((_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d});const dayKeys=days.map(d=>ymdKey(d));const shown=days.filter(d=>d>=monthStart&&d<=monthEnd);const title=`第${wi+1}週　${jpDate(shown[0]||days[0])}〜${jpDate(shown[shown.length-1]||days[6])}`;return `<table><tr><td class="weekTitle" colspan="8">${title}</td></tr><tr><th>品目</th>${days.map(d=>`<th>${md(d)}<br>${wname(d)}</th>`).join('')}</tr>${items.map(it=>`<tr><td class="item">${esc(it.name)}</td>${dayKeys.map((dk,i)=>{const d=days[i];if(d<monthStart||d>monthEnd)return `<td class="unset">対象外</td>`;const r=latest[it.id+'_'+dk];if(!r)return `<td class="unset">-</td>`;const st=r.status||judge(Number(r.total||0),db.settings[it.id]);return `<td class="${st}"><b>${fmt(r.total)}kg</b><br>${label(st)}<br><span class="small">${hm(new Date(r.createdAt))} ${esc(r.user||'')}</span></td>`}).join('')}</tr>`).join('')}</table>`}).join('');
 const detail=[];rows.forEach(r=>{(r.lines&&r.lines.length?r.lines:[{}]).forEach(l=>detail.push({日付:jpDate(new Date(r.createdAt)),時刻:hm(new Date(r.createdAt)),品目:r.itemName||'',区分:r.kind||'',合計kg:r.total??'',判定:label(r.status),入れ数kg:l.pack??'',ケース数:l.cases??'',小計kg:l.subtotal??'',入力者:r.user||''}))});
 const cols=['日付','時刻','品目','区分','合計kg','判定','入れ数kg','ケース数','小計kg','入力者'];
 const detailTable=`<h2>詳細履歴一覧</h2><div class="note">このExcelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴は含めません。</div><table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>${detail.map(row=>`<tr>${cols.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</table>`;
 return `<html><head><meta charset="utf-8">${styles}</head><body>${summary}${weekly}${detailTable}</body></html>`
}
function downloadMonthlyExcel(key){if(!canAdmin())return alert('管理者のみ実行できます');const rows=recordsForMonth(key);if(!rows.length)return alert('対象月の在庫入力データがありません');const filename=`在庫履歴_${key.slice(0,7)}.xls`;downloadTextFile(filename,buildMonthlyExcelHtml(key,rows),'application/vnd.ms-excel;charset=utf-8');const a=monthlyArchive(key);a.status=a.status==='deleted'?'deleted':'excel_created';a.excelFilename=filename;a.excelRowCount=rows.length;a.excelCreatedAt=nowIso();a.excelCreatedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}のExcelを作成しました。PCに保存できたら「Excel保存確認」にチェックしてください。`)}
function toggleMonthlySavedCheck(key,checked){const a=monthlyArchive(key);a.savedCheck=checked;save();monthlyArchivePage()}
function confirmMonthlyExcelSaved(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelCreatedAt)return alert('先にExcelを作成してください');if(!a.savedCheck)return alert('Excel保存確認にチェックしてください');a.status='excel_saved';a.excelSavedAt=nowIso();a.excelSavedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}をExcel保存確認済みとして記録しました。`)}
function monthlyArchivePage(msg=''){setScreen('monthlyArchivePage',[msg]);if(!canAdmin()){alert('管理者のみ表示できます');return home()}const exports=monthlyExportTasks(),deletes=monthlyDeleteTasks(),archives=db.monthlyArchives||{};const history=Object.keys(archives).sort().reverse().slice(0,24);pageShell('月次Excel・履歴管理','Excel保存確認後、3ヶ月経過した月だけ削除できます。',`${okHtml(msg)}<div class="notice">Excelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴はExcelに含めません。削除は「Excel作成済み」かつ「Excel保存確認済み」かつ「3ヶ月経過後」の records のみ可能です。入庫・出庫・調整などの修正履歴 movements と通知履歴 notifications は、この画面では削除せず、「90日超 修正履歴整理」画面で管理者確認後に削除します。</div>${exports.length?`<section class="card"><h2 style="margin-top:0">Excel保存が必要な月</h2>${exports.map(t=>monthlyExportCard(t)).join('')}</section>`:'<div class="card ok">Excel保存が必要な月はありません。</div>'}${deletes.length?`<section class="card"><h2 style="margin-top:0">履歴削除候補</h2>${deletes.map(t=>monthlyDeleteCard(t)).join('')}</section>`:'<div class="card notice">削除できる古い履歴はありません。</div>'}${history.length?`<section class="card"><h2 style="margin-top:0">月次処理履歴</h2><table class="table"><tr><th>対象月</th><th>状態</th><th>件数</th><th>日時</th></tr>${history.map(k=>{const a=archives[k];return`<tr><td>${monthLabel(k)}</td><td>${monthlyStatusLabel(a.status)}</td><td>${a.excelRowCount??recordsForMonth(k).length}</td><td>${a.deletedAt?dt(a.deletedAt):a.excelSavedAt?dt(a.excelSavedAt):a.excelCreatedAt?dt(a.excelCreatedAt):'-'}</td></tr>`}).join('')}</table></section>`:''}`)}
function monthlyStatusLabel(st){return st==='deleted'?'削除済み':st==='excel_saved'?'Excel保存確認済み':st==='excel_created'?'Excel作成済み':'未処理'}
function monthlyExportCard(t){const a=t.archive;return`<div class="box" style="margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">対象件数：${t.rowCount.toLocaleString()}件 ${a.excelCreatedAt?`/ Excel作成：${dt(a.excelCreatedAt)}`:''}</div></div><span class="badge ${a.excelSavedAt?'normal':a.excelCreatedAt?'excess':'unset'}">${monthlyStatusLabel(a.status)}</span></div><button class="btn blue" style="width:100%;margin-top:10px" onclick="downloadMonthlyExcel('${t.key}')">Excelを作成してダウンロード</button>${a.excelCreatedAt?`<label class="switch" style="margin-top:10px"><input type="checkbox" ${a.savedCheck?'checked':''} onchange="toggleMonthlySavedCheck('${t.key}',this.checked)"> ExcelファイルをPCに保存したことを確認しました</label><button class="btn green" style="width:100%;margin-top:10px" onclick="confirmMonthlyExcelSaved('${t.key}')" ${a.savedCheck?'':'disabled'}>Excel保存済みとして記録</button>`:''}</div>`}
function monthlyDeleteCard(t){const a=t.archive;return`<div class="box" style="background:#fff8f8;border:1px solid #fecaca;margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">現在残っている件数：${t.rowCount.toLocaleString()}件<br>Excel保存確認日：${a.excelSavedAt?dt(a.excelSavedAt):'-'}</div></div><span class="badge shortage">削除候補</span></div><button class="btn danger" style="width:100%;margin-top:10px" onclick="monthlyDeleteConfirmPage('${t.key}')">履歴削除</button></div>`}
function monthlyDeleteConfirmPage(key){setScreen('monthlyDeleteConfirmPage',[key]);if(!canAdmin())return home();const a=monthlyArchive(key),rows=recordsForMonth(key);if(!a.excelSavedAt||key>deletableLatestMonthKey()||a.status==='deleted'){alert('この月は削除できません');return monthlyArchivePage()}pageShell('履歴削除の確認',`${monthLabel(key)} / ${rows.length}件`, `<div class="card err"><h2 style="margin-top:0">${monthLabel(key)}の在庫変更履歴を削除します。</h2><p>この操作は取り消せません。<br>対象月のExcelファイルが保存済みであることを確認してください。</p><p><b>本当に削除しますか？</b></p><div class="row"><button class="btn btn2" onclick="monthlyArchivePage()">キャンセル</button><button class="btn danger" onclick="deleteMonthlyHistory('${key}')">削除する</button></div></div>`)}
function deleteMonthlyHistory(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelSavedAt) return alert('Excel保存確認が済んでいないため削除できません');if(key>deletableLatestMonthKey()) return alert('この月はまだ削除できません。3ヶ月分の保持期間が終わってから削除できます。');if(a.status==='deleted') return alert('この月は既に削除済みです');const beforeRecords=db.records.length;db.records=db.records.filter(r=>!r.createdAt||recordMonthKey(r)!==key);a.status='deleted';a.deletedAt=nowIso();a.deletedBy=db.user;a.deletedCount=beforeRecords-db.records.length;a.deletedMovementsCount=0;a.deletedNotificationsCount=0;a.deleteNote='月次Excel保存後削除ではrecordsのみ削除。movements/notificationsは90日超整理画面で削除。';save();monthlyArchivePage(`${monthLabel(key)}の在庫入力データを削除しました。削除件数：${a.deletedCount}件`)}

async function copyTextFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t);alert('コピーしました')}catch(e){prompt('コピーしてください',t)}}function shareLineFrom(id){location.href=`https://line.me/R/share?text=${encodeURIComponent(document.getElementById(id).value)}`}async function shareLineWorksFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t)}catch(e){}if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{alert('本文をコピーしました。LINE WORKSを開いて貼り付けてください。')}}function shareTextFrom(id){shareLineFrom(id)}
async function boot(){document.getElementById('app').innerHTML='<main class="wrap"><div class="card notice">Supabase最新データを読み込み中です...</div></main>';try{await loadCloud()}catch(e){console.error(e);cloudReady=false}login()}
boot();

</script></body></html>
