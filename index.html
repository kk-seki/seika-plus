async function refreshData(){try{const u=db.user,uid=db.userId,r=db.role;await loadCloud();db.user=u;db.userId=uid;db.role=r;localStorage.setItem(STORE,JSON.stringify(db));alert('最新データを再読み込みしました。');renderCurrent()}catch(e){console.error(e);alert('データの再読み込みに失敗しました。通信状況を確認してください。')}}
function renderCurrent(){const fn=window[currentScreen];if(typeof fn==='function')fn(...currentArgs);else home()}
function yen(n){return Math.round(Number(n||0)*100)/100}function fmt(n){return yen(n).toLocaleString('ja-JP')}function nowIso(){return new Date().toISOString()}function dt(iso){return new Date(iso).toLocaleString('ja-JP')}function ymd(d){return d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}function ymdKey(d){return new Date(d).toLocaleDateString('sv-SE',{timeZone:'Asia/Tokyo'})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

 '水菜':'坂本','ほうれん草':'坂本','小松菜':'坂本','小葱':'坂本','大葉':'坂本','ズッキーニ':'坂本',

};
function qrEnsureMasters(){db.qrManagedItems=Array.isArray(db.qrManagedItems)?db.qrManagedItems:[];db.purchaseStaffByItem=db.purchaseStaffByItem||{};db.qrSuppliers=Array.isArray(db.qrSuppliers)?db.qrSuppliers:[]}
function qrCanUse(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'||db.role==='clerk'}
function qrCanEdit(){return db.role==='admin'||db.role==='worker'||db.role==='buyer'}
function qrApiHeaders(extra={}){return{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...extra}}
async function qrSelect(table,query='select=*'){const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`,{headers:qrApiHeaders({'Content-Type':'application/json'})});if(!res.ok)throw new Error(await res.text());return await res.json()}
async function qrInsert(table,row){const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:qrApiHeaders({Prefer:'return=representation'}),body:JSON.stringify(row)});if(!res.ok)throw new Error(await res.text());const rows=await res.json();return rows[0]}
async function qrPatch(table,filter,row){const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`,{method:'PATCH',headers:qrApiHeaders({Prefer:'return=representation'}),body:JSON.stringify(row)});if(!res.ok)throw new Error(await res.text());const rows=await res.json();return rows[0]}
async function qrInsertMovement(row){const allowed=['movement_type','lot_id','lot_no','qr_key','item_id','item_name','origin','supplier','qty','unit','destination','storage_location','user_id','user_name','memo','container_type','lot_manage_type','weight','before_quantity','after_quantity','before_weight','after_weight','weight_status','reason'];const clean={};for(const k of allowed){if(row[k]!==undefined)clean[k]=row[k]}clean.qty=clean.qty??0;clean.item_name=clean.item_name||row.item_name||'-';clean.movement_type=clean.movement_type||row.movement_type||'記録';return await qrInsert('qr_lot_movements',clean)}
function qrDateCompact(d=todayKey()){return String(d).replace(/-/g,'')}
function qrMakeKey(){return 'QR'+qrDateCompact()+'-'+Math.random().toString(36).slice(2,6).toUpperCase()+String(Date.now()).slice(-4)}
function qrLotNo(itemName,receivedDate){const head=String(itemName||'LOT').replace(/\s+/g,'').slice(0,8)||'LOT';return `${qrDateCompact(receivedDate)}-${head}-${String(Date.now()).slice(-5)}`}
function qrUserFields(){return{user_id:db.userId||'',user_name:db.user||''}}
function qrNormalizeName(v){return String(v||'').replace(/[（）]/g,m=>m==='（'?'(':')').replace(/\s+/g,'').trim()}
function qrPurchaseStaffMaster(){qrEnsureMasters();return {...QR_PURCHASE_STAFF_BY_ITEM_DEFAULT,...db.purchaseStaffByItem}}
function qrFindItemByName(name){const n=String(name||'').trim();return activeItems().find(x=>String(x.name||'').trim()===n)||null}
function qrBuyerNamesForName(name){const item=qrFindItemByName(name);if(item){const names=buyerNamesForItem(item.id);if(names.length)return names}const master=qrPurchaseStaffMaster(),n=qrNormalizeName(name);for(const [k,v] of Object.entries(master)){if(qrNormalizeName(k)===n)return [v]}const ids=autoBuyerIdsForName(name);return(ids||[]).map(uid=>findUser(uid)).filter(Boolean).map(u=>u.name)}
function qrManagedItemList(){qrEnsureMasters();return db.qrManagedItems}
function qrManagedItemMatches(rule,name){const n=qrNormalizeName(name);if(!n)return false;if(typeof rule==='string')return qrNormalizeName(rule)===n;const base=qrNormalizeName(rule.name||rule.item_name||'');const aliases=(rule.aliases||[]).map(qrNormalizeName);const mode=rule.match||rule.type||'exact';if(mode==='all'||rule.all===true)return true;if(mode==='contains')return base&&n.includes(base)||aliases.some(a=>a&&n.includes(a));if(mode==='startsWith'||mode==='prefix')return base&&n.startsWith(base)||aliases.some(a=>a&&n.startsWith(a));if(mode==='group')return (base&&n.includes(base))||aliases.some(a=>a&&n.includes(a));return (base&&base===n)||aliases.includes(n)}
function qrIsManagedItemName(name){const list=qrManagedItemList();if(!list.length)return true;return list.some(r=>qrManagedItemMatches(r,name))}
function qrManagedNotice(name){const list=qrManagedItemList();if(!list.length)return '<div class="notice"><b>QR管理対象品目は未設定です。</b><div class="small">ヒアリング後に db.qrManagedItems へ追加できます。現時点では確認しながら登録できます。</div></div>';return qrIsManagedItemName(name)?'<div class="ok">QR管理対象品目です。</div>':'<div class="warn"><b>QR管理対象外の可能性があります。</b><div class="small">登録時に確認メッセージを表示します。</div></div>'}
function qrAutoFillStaff(){const item=document.getElementById('qrItemName'),staff=document.getElementById('qrPurchaseStaff');if(!item||!staff)return;const last=staff.dataset.auto||'';if(staff.value.trim()&&staff.value.trim()!==last)return;const names=qrBuyerNamesForName(item.value);staff.value=names.join('、');staff.dataset.auto=staff.value;const note=document.getElementById('qrStaffNote');if(note)note.textContent=staff.value?'品目マスタから自動入力されています。必要なら手修正できます。':'担当者マスタに未登録です。必要なら手入力してください。';const mn=document.getElementById('qrManagedNotice');if(mn)mn.innerHTML=qrManagedNotice(item.value)}
function qrMarkStaffManual(){const staff=document.getElementById('qrPurchaseStaff');if(staff)staff.dataset.auto=''}
function qrContainerOptions(selected='ダンボール'){return QR_CONTAINER_TYPES.map(n=>`<option value="${esc(n)}" ${n===selected?'selected':''}>${esc(n)}</option>`).join('')}
function qrFixedLocationOptions(selected=''){return `<option value="">選択</option>`+QR_STORAGE_LOCATIONS.map(n=>`<option value="${esc(n)}" ${n===selected?'selected':''}>${esc(n)}</option>`).join('')}
function qrIsLargeContainer(t){return QR_LARGE_CONTAINERS.includes(String(t||''))}
function qrLotManageType(t){return qrIsLargeContainer(t)?'large_container':'normal'}
function qrItemOptions(){return activeItems().map(it=>`<option value="${esc(it.name)}"></option>`).join('')}
async function qrSupplierList(){qrEnsureMasters();let arr=[...db.qrSuppliers];try{const rows=await qrSelect('qr_lots','select=supplier&supplier=not.is.null&order=created_at.desc&limit=300');arr=arr.concat(rows.map(r=>r.supplier).filter(Boolean))}catch(e){}return [...new Set(arr.filter(Boolean))].slice(0,120)}
async function qrFillSupplierDatalist(){const dl=document.getElementById('qrSupplierList');if(!dl)return;const arr=await qrSupplierList();dl.innerHTML=arr.map(n=>`<option value="${esc(n)}"></option>`).join('')}
function qrSaveSupplierCandidate(name){qrEnsureMasters();name=String(name||'').trim();if(name&&!db.qrSuppliers.includes(name)){db.qrSuppliers.unshift(name);db.qrSuppliers=db.qrSuppliers.slice(0,200);save()}}
function qrNormalizeKgValue(v){v=String(v||'').trim();if(!v)return '';if(/[a-zA-Zａ-ｚＡ-Ｚ㎏ｋｇキロ]/.test(v))return v;const n=Number(v);return isNaN(n)?v:`${fmt(n)}kg`}
function qrNormalizePackWeightInput(){const el=document.getElementById('qrPackWeight');if(el)el.value=qrNormalizeKgValue(el.value)}
function qrPalletInputsHtml(){return `<div class="card" style="box-shadow:none;margin:12px 0 0;padding:12px"><b>パレット別貼り紙</b><div class="small">5.数量と「1パレット/ケース数」から、パレット枚数と各貼り紙数量を自動計算します。在庫は1ロットのままです。</div><div class="row" style="margin-top:8px"><div><label class="label">パレット枚数（自動）</label><input id="qrPalletCount" type="number" min="0" step="1" class="input" placeholder="自動計算" readonly></div><div><label class="label">1パレット/ケース数</label><input id="qrPalletEach" type="number" min="0" step="0.01" class="input" oninput="qrMakePalletRows()" placeholder="例：30"></div></div><div id="qrPalletRows" style="margin-top:10px"></div><div id="qrPalletWarn" class="small" style="margin-top:8px"></div></div>`}
function qrMakePalletRows(){const total=Number(document.getElementById('qrQty')?.value||0),each=Number(document.getElementById('qrPalletEach')?.value||0),box=document.getElementById('qrPalletRows'),countEl=document.getElementById('qrPalletCount'),unit=esc(document.getElementById('qrUnit')?.value||'ケース');if(!box)return;if(!(total>0&&each>0)){box.innerHTML='';if(countEl)countEl.value='';qrCheckPalletTotal();return}const count=Math.ceil(total/each);if(countEl)countEl.value=count;let rest=total,html=`<div class="notice" style="margin:8px 0"><b>自動計算：${fmt(count)}パレット</b><div class="small">${fmt(each)} ${unit}/パレットで割り振ります。最後のパレットだけ端数になります。</div></div>`;for(let i=1;i<=count;i++){const v=i<count?Math.min(each,Math.max(rest,0)):Math.max(rest,0);rest-=v;html+=`<div class="row" style="align-items:center;margin-top:6px"><label class="label" style="margin:0;flex:.8">パレット${i}</label><input class="input qrPalletQty" type="number" step="0.01" value="${v}" oninput="qrCheckPalletTotal()"><span class="small">${unit}</span></div>`}box.innerHTML=html;qrCheckPalletTotal()}
function qrPalletPrintMarker(opts){try{return opts?`\n[QR_PALLET_PRINT:${encodeURIComponent(JSON.stringify(opts))}]`:''}catch(e){return ''}}
function qrLotPalletPrintOpts(lot){const m=String(lot&&lot.memo||''),mat=m.match(/\[QR_PALLET_PRINT:([^\]]+)\]/);if(!mat)return null;try{const o=JSON.parse(decodeURIComponent(mat[1]));return o&&Array.isArray(o.palletQtys)?o:null}catch(e){return null}}
function qrVisibleMemo(m){return String(m||'').replace(/\n?\[QR_PALLET_PRINT:[^\]]+\]/g,'').trim()}
function qrRecalcCurrentWeight(lot,totalWeight){const initial=Number((lot.received_qty??lot.initial_quantity)||0),cur=Number((lot.current_qty??lot.current_quantity)||0),tw=Number(totalWeight||0);return tw>0&&initial>0?(tw/initial)*cur:null}
function qrAliasText(rule){return Array.isArray(rule.aliases)?rule.aliases.join('、'):''}
function qrManagedRuleLabel(rule){if(typeof rule==='string')return rule;const mode={exact:'完全一致',contains:'含む',startsWith:'前方一致',prefix:'前方一致',group:'グループ'}[rule.match||rule.type||'exact']||'完全一致';return `${rule.name||rule.item_name||'-'} / ${mode}${rule.aliases&&rule.aliases.length?' / 別名:'+qrAliasText(rule):''}`}
function qrPalletQuantities(){return [...document.querySelectorAll('.qrPalletQty')].map(x=>Number(x.value||0)).filter(x=>x>0)}
function qrCheckPalletTotal(){const warn=document.getElementById('qrPalletWarn');if(!warn)return;const total=Number(document.getElementById('qrQty')?.value||0),sum=qrPalletQuantities().reduce((a,b)=>a+b,0);if(!sum){warn.innerHTML='';return}warn.innerHTML=sum===total?`<span style="color:#166534;font-weight:900">貼り紙数量合計：${fmt(sum)}（一致）</span>`:`<span style="color:#9a3412;font-weight:900">パレット別数量の合計がロット全体数量と一致していません。合計 ${fmt(sum)} / ロット ${fmt(total)}。このまま印刷も可能です。</span>`}
function qrRenderContainerFields(){const type=document.getElementById('qrContainerType')?.value||'ダンボール',box=document.getElementById('qrContainerFields');if(!box)return;if(qrIsLargeContainer(type)){box.innerHTML=`<div class="notice"><b>大型容器ロット</b><div class="small">入荷基数＋総重量で管理します。重量が不明なら総重量は空欄で登録できます。</div></div><div class="row"><div><label class="label">5. 入荷基数</label><input id="qrQty" type="number" step="1" class="input" placeholder="例：32"></div><div><label class="label">単位</label><input id="qrUnit" class="input" value="基" readonly></div></div><div class="row"><div><label class="label">総重量 kg</label><input id="qrTotalWeight" type="number" step="0.01" class="input" placeholder="未確定なら空欄"></div><div><label class="label">重量ステータス</label><select id="qrWeightStatus" class="input"><option value="未確定">未確定</option><option value="確定">確定</option></select></div></div>`}else{box.innerHTML=`<div class="notice"><b>通常ロット</b><div class="small">数量＋量目で管理します。</div></div><div class="row"><div><label class="label">5. 数量</label><input id="qrQty" type="number" step="0.01" class="input" placeholder="例：200" oninput="qrMakePalletRows()"></div><div><label class="label">単位</label><input id="qrUnit" class="input" value="ケース" placeholder="ケース・箱など" oninput="qrMakePalletRows()"></div></div><label class="label">量目</label><input id="qrPackWeight" type="text" inputmode="decimal" class="input" placeholder="例：15（自動でkg）" onblur="qrNormalizePackWeightInput()">${qrPalletInputsHtml()}`}}
function qrStatusClass(st){return st==='削除済み'||st==='在庫なし'?'unset':st==='要確認'?'excess':'normal'}
function qrLotQtyText(l,current=true){const qty=Number((current?(l.current_qty??l.current_quantity):(l.received_qty??l.initial_quantity))||0),unit=l.unit||(qrIsLargeContainer(l.container_type)?'基':'ケース');return `${fmt(qty)} ${esc(unit)}`}
function qrLotWeightText(l,current=true){const v=current?(l.current_weight):(l.total_weight);return v!==null&&v!==undefined&&v!==''?`${fmt(v)}kg`:'未確定'}
function qrPerWeight(l){const total=Number(l.total_weight||0),initial=Number((l.received_qty??l.initial_quantity)||0);return total>0&&initial>0?total/initial:null}

pageShell('SEIKA＋',`${esc(db.user)} / ${ROLE[db.role]}`,`${simpleNotice}<div class="homeSummary"><div class="summaryBox"><div class="summaryLabel">本日入力済み</div><div class="summaryValue">${todayEntered}<span class="summarySub">/${activeItems().length}</span></div></div><div class="summaryBox"><div class="summaryLabel">発注候補</div><div class="summaryValue">${shortageCount}</div></div><div class="summaryBox"><div class="summaryLabel">過多品目</div><div class="summaryValue">${excessCount}</div></div><div class="summaryBox"><div class="summaryLabel">最終入力</div><div class="summaryValue">${lastInputHtml}</div></div></div><div class="homePrimary"><button class="btn homeBtnStock" onclick="inventory()">在庫入力</button><button class="btn homeBtnWaste" onclick="wasteEntryPage()">廃棄入力</button><button class="btn homeBtnCheck" onclick="stocks()">在庫確認・修正</button><button class="btn homeBtnTable" onclick="weeklyData()">在庫表</button><button class="btn homeBtnItems" onclick="itemsPage()">品目設定</button><button class="btn homeBtnSettings" onclick="settings()">適正在庫設定</button>${canWorkerReport()?`<button class="btn homeBtnReport" onclick="lineCopyPage()">在庫報告コピー</button>`:''}<button class="btn homeBtnQr" onclick="qrHome()">QR在庫管理</button><button class="btn homeBtnMesh" onclick="meshContainerPage()">網コンテナ在庫</button><button class="btn homeBtnMarket" onclick="marketMemoPage()">産地状況、市場動向メモ</button><button class="btn homeBtnWasteList" onclick="wasteListPage()">廃棄一覧</button><button class="btn homeBtnNotify" onclick="notifications()">通知履歴</button></div>`,{noBack:true})
}


function ensureWasteRecords(){db.wasteRecords=db.wasteRecords||[]}
function wasteTodayRecords(){ensureWasteRecords();return db.wasteRecords.filter(r=>r.date===todayKey())}
function wasteDateInputValue(){return todayKey()}
function wasteAmount(r){return yen(Number(r.qty||0)*Number(r.unitPrice||0))}
function money(n){return Math.round(Number(n||0)).toLocaleString('ja-JP')}
function wasteTotals(rows){return{kg:yen(rows.reduce((a,r)=>a+Number(r.qty||0),0)),amount:yen(rows.reduce((a,r)=>a+wasteAmount(r),0))}}
function wasteEntryPage(msg='',editId=''){
 setScreen('wasteEntryPage',[msg,editId]);ensureWasteRecords();
 if(!canWasteInput()){alert('廃棄入力は管理者・青果社員・事務員のみです');return wasteListPage()}
 const editRecord=editId?(db.wasteRecords||[]).find(r=>r.id===editId):null;
 if(editId&&!editRecord){alert('廃棄記録が見つかりません');return wasteListPage()}
 const wastePriorityItems=['キャベツ','人参','葉付大根','カット大根','じゃが芋','玉葱'];
 const normalWasteItems=allSortedItems().filter(it=>it.active!==false).map(it=>it.name).filter(name=>!wastePriorityItems.includes(name));
 const itemOptions=wastePriorityItems.concat(normalWasteItems).map(name=>`<option value="${esc(name)}"></option>`).join('');
 const isEdit=!!editRecord;
 pageShell(isEdit?'廃棄修正':'廃棄入力',isEdit?'入力済みの廃棄内容を修正します。修正できるのは廃棄入力権限がある人のみです。':'現場で出た廃棄を日ごとに記録します。単価は廃棄一覧で事務員または管理者が入力します。',`${okHtml(msg)}<datalist id="wasteItemOptions">${itemOptions}</datalist><div class="card"><div class="row"><div><label class="label">日付</label><input id="wasteDate" class="input" type="date" value="${esc((editRecord&&editRecord.date)||wasteDateInputValue())}"></div><div><label class="label">品名</label><input id="wasteName" class="input" list="wasteItemOptions" placeholder="例：レタス" value="${esc((editRecord&&editRecord.itemName)||'')}"></div></div><label class="label">数量(kg)</label><input id="wasteQty" class="input" inputmode="decimal" placeholder="例：12.5" value="${editRecord?esc(editRecord.qty):''}"><div class="row"><div><label class="label">産地</label><input id="wasteOrigin" class="input" placeholder="例：茨城" value="${esc((editRecord&&editRecord.origin)||'')}"></div><div><label class="label">仕入先</label><input id="wasteSupplier" class="input" placeholder="例：〇〇市場" value="${esc((editRecord&&editRecord.supplier)||'')}"></div></div><label class="label">備考</label><textarea id="wasteMemo" class="textarea" placeholder="廃棄理由・状態など">${esc((editRecord&&editRecord.memo)||'')}</textarea><div class="grid" style="margin-top:12px"><button class="btn green" onclick="${isEdit?`updateWasteRecord('${editRecord.id}')`:'saveWasteRecord()'}">${isEdit?'修正を保存':'廃棄を保存'}</button><button class="btn btn2" onclick="wasteListPage()">廃棄一覧へ戻る</button></div>${isEdit?`<div class="small" style="margin-top:10px">入力者：${esc(editRecord.user||'-')} / 初回入力：${editRecord.createdAt?dt(editRecord.createdAt):'-'}${editRecord.updatedAt?` / 最終更新：${dt(editRecord.updatedAt)}`:''}</div>`:''}</div>${!isEdit?`<div class="card"><b>本日の廃棄</b>${wasteMiniListHtml(wasteTodayRecords())}</div>`:''}`)
}
function parseDecimalInput(v){return Number(String(v||'').replace(/[０-９．，、]/g,ch=>ch==='，'||ch==='、'?'.':String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/,/g,''))}
function readWasteForm(){return{date:document.getElementById('wasteDate').value||todayKey(),itemName:document.getElementById('wasteName').value.trim(),qty:parseDecimalInput(document.getElementById('wasteQty').value),origin:document.getElementById('wasteOrigin').value.trim(),supplier:document.getElementById('wasteSupplier').value.trim(),memo:document.getElementById('wasteMemo').value.trim()}}
function saveWasteRecord(){if(!canWasteInput()){alert('保存できません');return}const r=readWasteForm();if(!r.itemName){alert('品名を入力してください');return}if(!(r.qty>0)){alert('数量(kg)を入力してください');return}ensureWasteRecords();db.wasteRecords.push({id:newId(),date:r.date,itemName:r.itemName,qty:yen(r.qty),unitPrice:0,amount:0,origin:r.origin,supplier:r.supplier,memo:r.memo,user:db.user,userId:db.userId,createdAt:nowIso(),updatedAt:nowIso()});save();wasteEntryPage('廃棄を保存しました')}
function updateWasteRecord(id){if(!canWasteEdit()){alert('修正できません');return}ensureWasteRecords();const target=db.wasteRecords.find(x=>x.id===id);if(!target)return alert('廃棄記録が見つかりません');const r=readWasteForm();if(!r.itemName){alert('品名を入力してください');return}if(!(r.qty>0)){alert('数量(kg)を入力してください');return}target.date=r.date;target.itemName=r.itemName;target.qty=yen(r.qty);target.origin=r.origin;target.supplier=r.supplier;target.memo=r.memo;target.amount=wasteAmount(target);target.updatedAt=nowIso();target.updatedBy=db.user;target.updatedById=db.userId;save();wasteListPage('廃棄記録を修正しました')}
function wasteMiniListHtml(rows){if(!rows.length)return '<div class="small" style="margin-top:8px">まだ記録がありません。</div>';const t=wasteTotals(rows);return `<div class="total"><span>本日合計</span><span>${fmt(t.kg)}kg / ${money(t.amount)}円</span></div><div class="weeklyWrap"><table class="table"><thead><tr><th>品名</th><th>数量</th><th>単価</th><th>金額</th><th>産地</th><th>仕入先</th></tr></thead><tbody>${rows.slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).map(r=>`<tr><td>${esc(r.itemName)}</td><td>${fmt(r.qty)}kg</td><td>${Number(r.unitPrice)>0?money(r.unitPrice)+'円/kg':'未入力'}</td><td>${Number(r.unitPrice)>0?money(wasteAmount(r))+'円':'-'}</td><td>${esc(r.origin||'-')}</td><td>${esc(r.supplier||'-')}</td></tr>`).join('')}</tbody></table></div>`}
function wasteRowsForPeriod(startDate,endDate){ensureWasteRecords();const s=startDate||todayKey(),e=endDate||s;const from=s<=e?s:e,to=s<=e?e:s;return db.wasteRecords.slice().filter(r=>String(r.date||'')>=from&&String(r.date||'')<=to).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))||new Date(b.createdAt||0)-new Date(a.createdAt||0))}
function wastePeriodLabel(startDate,endDate){const s=startDate||todayKey(),e=endDate||s;const from=s<=e?s:e,to=s<=e?e:s;return from===to?from:`${from}〜${to}`}
function wasteListPage(msg=''){
 setScreen('wasteListPage',[msg]);ensureWasteRecords();
 const m=monthInputValue(new Date()),range=monthRangeFromMonthValue(m),defS=range.start,defE=range.end;
 const periodRows=wasteRowsForPeriod(defS,defE),total=wasteTotals(periodRows);
 pageShell('廃棄一覧','基本は月を選択してExcel出力できます。必要な場合は開始日〜終了日の期間指定でもExcel出力できます。',`${okHtml(msg)}<div class="card"><b>月を選択してExcel出力</b><div class="small">1ヶ月分を1ファイルにして、1週間ごとにシート分けします。</div><div class="row" style="margin-top:12px"><div><label class="label">出力する月</label><input id="wasteExportMonth" class="input" type="month" value="${m}"></div><div>${canWasteExport()?'<button class="btn blue" onclick="downloadWasteMonthExcel()">月単位でExcel出力</button>':''}</div></div></div><div class="card"><b>期間を選択して表示・Excel出力</b><div class="small">月単位以外で必要な場合だけ、開始日〜終了日を指定します。</div><div class="row" style="margin-top:12px"><div><label class="label">開始日</label><input id="wasteStartDate" class="input" type="date" value="${defS}" oninput="filterWasteList()"></div><div><label class="label">終了日</label><input id="wasteEndDate" class="input" type="date" value="${defE}" oninput="filterWasteList()"></div></div><div class="grid" style="margin-top:12px"><div class="box"><span class="small">選択期間の合計kg</span><b id="wasteTotalKgBox">${fmt(total.kg)}kg</b></div><div class="box"><span class="small">選択期間の廃棄金額</span><b id="wasteTotalAmountBox">${money(total.amount)}円</b></div></div><div class="grid" style="margin-top:12px">${canWasteInput()?'<button class="btn green" onclick="wasteEntryPage()">廃棄を入力する</button>':''}${canWasteExport()?'<button class="btn blue" onclick="downloadWasteExcel()">選択期間をExcel出力</button>':''}</div></div><div id="wasteListBox">${wasteListHtml(periodRows)}</div>`)
}
function wastePriceCell(r){if(!canWastePriceInput())return Number(r.unitPrice)>0?money(r.unitPrice):'未入力';return `<div class="mini" style="grid-template-columns:1fr auto;gap:6px"><input id="wastePrice_${r.id}" class="input" inputmode="decimal" value="${Number(r.unitPrice)>0?esc(r.unitPrice):''}" placeholder="円/kg"><button class="btn btn2" onclick="saveWasteUnitPrice('${r.id}')">保存</button></div>`}
function wasteListHtml(rows){if(!rows.length)return '<div class="notice">選択期間の廃棄記録はありません。</div>';return `<div class="card"><div class="weeklyWrap"><table class="table wasteTable"><thead><tr><th>日付</th><th>品名</th><th>数量(kg)</th><th>単価(円/kg)</th><th>金額</th><th>産地</th><th>仕入先</th><th>備考</th><th>入力者</th><th></th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.date||'')}</td><td><b>${esc(r.itemName)}</b></td><td>${fmt(r.qty)}</td><td>${wastePriceCell(r)}</td><td>${Number(r.unitPrice)>0?money(wasteAmount(r))+'円':'-'}</td><td>${esc(r.origin||'-')}</td><td>${esc(r.supplier||'-')}</td><td>${esc(r.memo||'-')}</td><td>${esc(r.user||'-')}</td><td>${canWasteEdit()?`<div style="display:grid;gap:6px"><button class="btn btn2" onclick="wasteEntryPage('', '${r.id}')">修正</button><button class="btn red" onclick="deleteWasteRecord('${r.id}')">削除</button></div>`:''}</td></tr>`).join('')}</tbody></table></div></div>`}
function filterWasteList(){ensureWasteRecords();const s=(document.getElementById('wasteStartDate')&&document.getElementById('wasteStartDate').value)||todayKey();const e=(document.getElementById('wasteEndDate')&&document.getElementById('wasteEndDate').value)||s;const rows=wasteRowsForPeriod(s,e);const total=wasteTotals(rows);document.getElementById('wasteTotalKgBox').textContent=fmt(total.kg)+'kg';document.getElementById('wasteTotalAmountBox').textContent=money(total.amount)+'円';document.getElementById('wasteListBox').innerHTML=wasteListHtml(rows)}
function saveWasteUnitPrice(id){if(!canWastePriceInput()){alert('単価入力は事務員または管理者のみです');return}const r=(db.wasteRecords||[]).find(x=>x.id===id);if(!r)return alert('廃棄記録が見つかりません');const price=parseDecimalInput(document.getElementById('wastePrice_'+id).value);if(Number.isNaN(price)||price<0)return alert('単価は0以上で入力してください');r.unitPrice=yen(price);r.amount=wasteAmount(r);r.priceUser=db.user;r.priceUserId=db.userId;r.priceUpdatedAt=nowIso();r.updatedAt=nowIso();save();filterWasteList()}
function deleteWasteRecord(id){if(!canWasteEdit()){alert('削除できません');return}if(!confirm('この廃棄記録を削除しますか？'))return;ensureWasteRecords();deleteHistoryRows(HISTORY_TABLES.wasteRecords,[id]).catch(console.warn);db.wasteRecords=db.wasteRecords.filter(r=>r.id!==id);save();wasteListPage('廃棄記録を削除しました')}
function uniqText(values){return [...new Set(values.filter(Boolean).map(v=>String(v).trim()).filter(Boolean))].join('、')}
function wasteExcelGroupRows(rows,keyFn,labelFn){const m={};rows.forEach(r=>{const k=keyFn(r);if(!m[k])m[k]={key:k,label:labelFn(r),kg:0,amount:0,count:0,items:[],origins:[],suppliers:[],memos:[]};m[k].kg+=Number(r.qty||0);m[k].amount+=wasteAmount(r);m[k].count+=1;m[k].items.push(r.itemName||'');m[k].origins.push(r.origin||'');m[k].suppliers.push(r.supplier||'');m[k].memos.push(r.memo||'')});return Object.values(m)}
function buildWasteExcelHtml(startDate,endDate,rows){const t=wasteTotals(rows),created=dt(nowIso()),period=wastePeriodLabel(startDate,endDate);const styles=`<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827}h1{font-size:22px}.section{margin-top:22px;font-size:17px;font-weight:bold}table{border-collapse:collapse}th,td{border:1px solid #bfbfbf;padding:7px 9px;vertical-align:middle;white-space:nowrap}th{background:#d9eaf7;font-weight:bold}.summary th{background:#e2f0d9}.detail th{background:#d9eaf7}.daily th{background:#ddebf7}.item th{background:#fce4d6}.dayitem th{background:#e4dfec}.amount{background:#fff2cc;font-weight:bold}.num{text-align:right}</style>`;const summary=`<h1>廃棄一覧 ${esc(period)}</h1><table class="summary"><tr><th>項目</th><th>内容</th></tr><tr><td>対象期間</td><td>${esc(period)}</td></tr><tr><td>作成日時</td><td>${esc(created)}</td></tr><tr><td>合計kg</td><td class="num">${fmt(t.kg)}kg</td></tr><tr><td>廃棄金額</td><td class="num">${money(t.amount)}円</td></tr><tr><td>件数</td><td class="num">${rows.length}</td></tr></table>`;

const renderNormalCard=(r)=>{const realIdx=formState.indexOf(r),it=db.items.find(x=>x.id===r.itemId),s=db.settings[it.id],hasInput=inventoryStateHasInput(r),isDetail=isDetailItem(it),total=yen(r.lines.reduce((a,l)=>inventoryLineHasInput(l)?a+(l.detail?detailSubtotal(l):Number(l.pack)*Number(l.cases)):a,0)),st=hasInput?judge(total,s):'unset';const detailRows=()=>r.lines.map((l,j)=>`<div class="line"><div><label class="label">規格</label><input class="input" value="${esc(l.spec||'')}" placeholder="例：5k/L" onchange="formState[${realIdx}].lines[${j}].spec=this.value;renderInventory(lastMessage)"></div><div><label class="label">産地・備考</label><input class="input" value="${esc(l.origin||'')}" placeholder="例：福島 / 中山A" onchange="formState[${realIdx}].lines[${j}].origin=this.value;renderInventory(lastMessage)"></div><div><label class="label">数量</label><input class="input" inputmode="decimal" value="${esc(l.qty||'')}" placeholder="例：94 または 6/1" onchange="formState[${realIdx}].lines[${j}].qty=this.value;renderInventory(lastMessage)"></div><div class="kg">小計 ${inventoryLineHasInput(l)?fmt(detailSubtotal(l))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${realIdx}].lines.splice(${j},1);renderInventory(lastMessage)">削除</button>`:''}</div></div>`).join('');const normalRows=()=>r.lines.map((l,j)=>`<div class="line"><div><label class="label">入れ数kg</label><input class="input" inputmode="decimal" value="${esc(l.pack)}" onchange="formState[${realIdx}].lines[${j}].pack=this.value;renderInventory(lastMessage)"></div><div><label class="label">ケース数</label><input class="input" inputmode="decimal" value="${esc(l.cases)}" placeholder="空欄=未入力 / 0=在庫なし" onchange="formState[${realIdx}].lines[${j}].cases=this.value;renderInventory(lastMessage)"></div><div class="kg">小計 ${inventoryLineHasInput(l)?fmt(Number(l.pack)*Number(l.cases))+'kg':'-'} ${j>0?`<button class="btn btn2" style="padding:6px 8px" onclick="formState[${realIdx}].lines.splice(${j},1);renderInventory(lastMessage)">削除</button>`:''}</div></div>`).join('');return`<section class="card ${r.fromToday||hasInput?'entered':''}"><div class="itemHead"><div><h2 style="margin:0 0 4px">${realIdx+1}. ${it.name}</h2><div class="small">${roomLabel(coldRoomForNormalItem(it))} / ${isDetail?'規格別入力（規格・産地はこの画面で修正可）':'適正在庫 '+s.min+'kg〜'+s.max+'kg / 初期入れ数 '+it.pack+'kg'}<br>仕入れ担当者：${buyerText(it)}${previousInputHtml(it.id)}${r.fromToday?'<br>本日入力済み':''}</div><div class="small" style="margin-top:8px"><button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},-1)" ${realIdx===0?'disabled':''}>上へ</button> <button class="btn btn2" style="padding:6px 10px" onclick="moveInventoryItem(${realIdx},1)" ${realIdx===formState.length-1?'disabled':''}>下へ</button></div></div><span class="badge ${r.fromToday?'todayDoneBadge':hasInput?st:'unset'}">${r.fromToday?'入力済み':hasInput&&total===0?'在庫なし':hasInput?label(st):'未入力'}</span></div>${r.fromToday?'<div class="todayDoneBanner"><span class="mark">✓</span><span class="txt">本日入力済み<span class="subtxt">変更する場合だけ下に入力してください。</span></span></div>':''}${isDetail?`<div class="notice">この品目は規格別に数量を入力します。規格・産地は現場で変更できます。数量は「6/1」のようなスラッシュ入力も可能です。</div>${detailRows()}<button class="btn btn2" onclick="formState[${realIdx}].lines.push({detail:true,id:newId(),spec:'',origin:'',qty:''});renderInventory(lastMessage)">＋ 規格を追加</button>`:`${normalRows()}<button class="btn btn2" onclick="formState[${realIdx}].lines.push({pack:'',cases:''});renderInventory(lastMessage)">＋ 入れ数を追加</button>`}<div class="total"><span>合計</span><span>${hasInput?fmt(total)+'kg':'- kg'}</span></div></section>`};

function moveForm(itemId,type){setScreen('moveForm',[itemId,type]);if(!canEdit()){alert('この権限では在庫修正できません');return}const it=db.items.find(x=>x.id===itemId),current=latestTotal(itemId);pageShell(`${type}入力`,`${it.name} / 現在庫 ${fmt(current)}kg`,`<div class="card"><div class="notice">入庫は在庫を増やし、出庫は在庫を減らします。入れ数kg × ケース数で数量を入力します。</div><label class="label">品目</label><input class="input" value="${it.name}" disabled><br><br><div class="row"><div><label class="label">入れ数kg</label><input id="mvPack" class="input" inputmode="decimal" value="${it.pack}"></div><div><label class="label">ケース数</label><input id="mvCases" class="input" inputmode="decimal" value="1"></div></div><br><label class="label">理由・メモ</label><input id="mvMemo" class="input" placeholder="例：朝入荷、出荷分、廃棄分"><br><br><button id="moveSaveBtn" class="btn ${type==='入庫'?'green':'orange'}" style="width:100%" onclick="applyMove('${itemId}','${type}')" ${isMoveSaving?'disabled':''}>${isMoveSaving?'保存中...':type+'を登録する'}</button></div>`)}
function applyMove(itemId,type){if(isMoveSaving)return;const btn=document.getElementById('moveSaveBtn');if(btn){btn.disabled=true;btn.textContent='保存中...'}try{isMoveSaving=true;const it=db.items.find(x=>x.id===itemId),pack=Number(document.getElementById('mvPack').value),cases=Number(document.getElementById('mvCases').value),memo=document.getElementById('mvMemo').value.trim();if(!(pack>0))throw new Error('入れ数kgは0より大きくしてください');if(!(cases>=0))throw new Error('ケース数は0以上にしてください');const before=latestTotal(itemId),qty=yen(pack*cases);let after=before;if(type==='入庫')after=yen(before+qty);if(type==='出庫')after=yen(Math.max(0,before-qty));if(type==='調整')after=qty;const s=db.settings[itemId],st=judge(after,s),rec={id:newId(),kind:type,itemId,itemName:it.name,total:after,setting:{...s},status:st,lines:[{pack,cases,subtotal:qty}],user:db.user,role:db.role,createdAt:nowIso()};if(duplicateExists(rec)&&!confirm('同じ内容のデータがすでに登録されています。\nこのまま保存してもよろしいですか？')){isMoveSaving=false;moveForm(itemId,type);return}db.records.push(rec);db.movements.push({id:newId(),recordId:rec.id,itemId,itemName:it.name,type,beforeTotal:before,afterTotal:after,diffKg:yen(after-before),pack,cases,memo,user:db.user,role:db.role,createdAt:rec.createdAt});if(st==='shortage'||st==='excess')db.notifications.push(makeNotification(rec));save();const msg=`${type}を保存しました。確認時刻：${currentTimeLabel()}`;isMoveSaving=false;if((st==='shortage'||st==='excess')&&canWorkerReport())lineCopyPage(msg);else stocks()}catch(e){isMoveSaving=false;alert(e.message);moveForm(itemId,type)}}

function oldNotificationRows(){const cutoff=Date.now()-RETENTION_DAYS*DAY_MS;return(db.notifications||[]).filter(r=>r.sentAt&&new Date(r.sentAt).getTime()<cutoff)}
function oldWasteRows(){const cutoff=Date.now()-RETENTION_DAYS*DAY_MS;return(db.wasteRecords||[]).filter(r=>r.date&&new Date(String(r.date)+'T00:00:00').getTime()<cutoff&&r.excelExportedAt)}
function oldHistoryCleanupPage(msg=''){setScreen('oldHistoryCleanupPage',[msg]);if(!canAdmin()){alert('管理者のみ表示できます');return home()}const ms=oldMovementRows(),ns=oldNotificationRows(),ws=oldWasteRows(),dates=[...ms.map(x=>x.createdAt),...ns.map(x=>x.sentAt),...ws.map(x=>x.date)].filter(Boolean).sort();pageShell('90日超 履歴整理','movements / notifications の90日超と、Excel出力済みの90日超廃棄データを整理します。',`${okHtml(msg)}<div class="notice">在庫入力データ records は月次Excel保存確認済みの月だけ削除対象です。廃棄データは「90日経過」かつ「廃棄一覧Excel出力済み」のものだけ削除対象です。網コンテナ在庫は1か月分のみ自動保管し、1か月を超えた分は自動消去します。</div><div class="card grid"><div class="box"><span class="small">90日超 movements</span><b>${ms.length}件</b></div><div class="box"><span class="small">90日超 notifications</span><b>${ns.length}件</b></div><div class="box"><span class="small">90日超 廃棄データ<br>Excel出力済み</span><b>${ws.length}件</b></div></div><div class="card"><b>対象期間</b><div class="small">${dates.length?`${dt(dates[0])} 〜 ${dt(dates[dates.length-1])}`:'対象データなし'}</div></div>${ms.length||ns.length||ws.length?'<button class="btn danger" style="width:100%" onclick="deleteOldHistory()">90日超の対象履歴を削除</button>':'<div class="card ok">削除対象はありません。</div>'}`)}
function deleteOldHistory(){if(!canAdmin())return;const ms=oldMovementRows(),ns=oldNotificationRows(),ws=oldWasteRows();if(!ms.length&&!ns.length&&!ws.length)return alert('削除対象はありません');if(!confirm('90日を超えた対象履歴データを削除します。\n対象は入庫・出庫・調整などの修正履歴、通知履歴、Excel出力済みの廃棄データです。\nこの操作は元に戻せません。\n本当に削除しますか？'))return;const mIds=new Set(ms.map(x=>x.id)),nIds=new Set(ns.map(x=>x.id)),wIds=new Set(ws.map(x=>x.id));deleteHistoryRows(HISTORY_TABLES.movements,[...mIds]).catch(console.warn);deleteHistoryRows(HISTORY_TABLES.wasteRecords,[...wIds]).catch(console.warn);db.movements=db.movements.filter(x=>!mIds.has(x.id));db.notifications=db.notifications.filter(x=>!nIds.has(x.id));db.wasteRecords=(db.wasteRecords||[]).filter(x=>!wIds.has(x.id));db.historyCleanups=db.historyCleanups||[];db.historyCleanups.push({id:newId(),type:'old_histories_and_exported_waste_90days',deletedMovements:ms.length,deletedNotifications:ns.length,deletedWasteRecords:ws.length,deletedBy:db.user,deletedAt:nowIso()});save();oldHistoryCleanupPage(`90日超の対象履歴を削除しました。movements：${ms.length}件 / notifications：${ns.length}件 / 廃棄データ：${ws.length}件`)}

function itemFormPage(itemId){setScreen('itemFormPage',[itemId]);if(!canManageItems())return home();const it=itemId?db.items.find(x=>x.id===itemId&&x.deleted!==true):null;const s=it?db.settings[it.id]:null;pageShell(it?'通常在庫 品目編集':'通常在庫 品目追加','管理者・青果社員が操作できます。通常在庫は適正在庫設定・発注候補に使用します。',`<div class="card"><label class="label">品目名</label><input id="itemName" class="input" value="${esc(it?it.name:'')}" placeholder="例：きゅうり"><br><br><label class="label">初期入れ数kg</label><input id="itemPack" class="input" inputmode="decimal" value="${it?it.pack:''}" placeholder="例：5"><br><br><label class="label">保管冷蔵庫</label><select id="itemRoom" class="input">${coldRoomOptionsHtml(it?coldRoomForNormalItem(it):'room3')}</select><br><br><label class="switch"><input id="itemUseSpec" type="checkbox" ${it&&isDetailItem(it)?'checked':''} onchange="document.getElementById('itemSpecBox').style.display=this.checked?'block':'none'"> 規格入力を使用する</label><div id="itemSpecBox" class="memo" style="display:${it&&isDetailItem(it)?'block':'none'}"><label class="label">規格一覧</label><textarea id="itemSpecs" class="textarea" style="min-height:110px" placeholder="例：5k/L, 福島\n5k/M, 栃木\n※1行に1規格。カンマ後に産地・備考も入れられます。">${esc((it?detailTemplate(it.id):[]).map(d=>`${d.spec||''}${d.origin?', '+d.origin:''}`).join('\n'))}</textarea><div class="small">ONにすると、在庫入力画面で胡瓜と同じように「規格・産地・数量」で入力できます。</div></div><br><div class="notice">通常在庫は適正在庫対象です。適正在庫と関係ない品目は、品目設定の「その他」または「その他（片岡）」に追加してください。下限・上限を空欄にすると、初期入れ数から自動作成します。</div><div class="row"><div><label class="label">適正在庫 下限kg</label><input id="itemMin" class="input" inputmode="decimal" value="${s?s.min:''}" placeholder="自動"></div><div><label class="label">適正在庫 上限kg</label><input id="itemMax" class="input" inputmode="decimal" value="${s?s.max:''}" placeholder="自動"></div></div><br><label class="switch"><input id="itemActive" type="checkbox" ${!it||it.active!==false?'checked':''}> 有効</label>${buyerAssignFormHtml(itemId)}<br><br><button class="btn green" style="width:100%" onclick="saveItem('${itemId||''}')">保存</button></div>`)}
function saveItem(itemId){if(!canManageItems())return;const name=document.getElementById('itemName').value.trim(),pack=Number(document.getElementById('itemPack').value),room=document.getElementById('itemRoom').value,active=document.getElementById('itemActive').checked,useSpec=document.getElementById('itemUseSpec')?.checked===true,specLines=String(document.getElementById('itemSpecs')?.value||'').split(/\n+/).map(x=>x.trim()).filter(Boolean).map((line,i)=>{const parts=line.split(',');return{id:newId(),spec:String(parts.shift()||'').trim(),origin:parts.join(',').trim(),sort:i+1,active:true}});let checked=[...document.querySelectorAll('.buyerCheck:checked')].map(x=>x.value);if(!name)return alert('品目名を入力してください');if(!(pack>0))return alert('初期入れ数kgは0より大きくしてください');if(!validColdRoom(room))return alert('保管冷蔵庫を選択してください');let minVal=document.getElementById('itemMin').value.trim(),maxVal=document.getElementById('itemMax').value.trim();let min=minVal===''?Math.max(10,pack*5):Number(minVal),max=maxVal===''?Math.max(20,pack*12):Number(maxVal);min=yen(min);max=yen(max);if(!(min>=0)||!(max>=0)||min>max)return alert('適正在庫の下限・上限を確認してください');if(!itemId&&checked.length===0)checked=autoBuyerIdsForName(name);let id=itemId;if(itemId){const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return alert('品目が見つかりません');const oldSetting={...(db.settings[itemId]||{})};it.name=name;it.pack=pack;it.room=room;it.active=active;it.useSpec=useSpec;db.itemDetails=db.itemDetails||{};db.itemDetails[itemId]=useSpec?specLines:[];db.settings[itemId]={min,max};addOptimalStockChangeLog({id:itemId,name},oldSetting,db.settings[itemId],'品目編集画面から変更')}else{id=newId();const sort=(db.items.reduce((a,it)=>Math.max(a,Number(it.sort||0)),0)+1);db.items.push({id,name,pack,room,sort,active,deleted:false,useSpec});db.itemDetails=db.itemDetails||{};db.itemDetails[id]=useSpec?specLines:[];db.settings[id]={min,max};db.purchaseMemos[id]=''}db.buyerAssignments=db.buyerAssignments||{};for(const u of buyerUsers()){db.buyerAssignments[u.id]=db.buyerAssignments[u.id]||[];db.buyerAssignments[u.id]=db.buyerAssignments[u.id].filter(x=>x!==id);if(checked.includes(u.id))db.buyerAssignments[u.id].push(id)}save();itemsPage('保存しました')}
function toggleItemActive(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;it.active=it.active===false;save();itemsPage(it.active===false?'停止しました':'有効化しました')}
function deleteItem(itemId){if(!canManageItems())return;const it=db.items.find(x=>x.id===itemId&&x.deleted!==true);if(!it)return;if(!confirm(`${it.name}を削除します。\n入力画面・在庫表には表示されなくなります。\n過去の入力記録は残します。\n本当に削除しますか？`))return;it.deleted=true;it.active=false;db.buyerAssignments=db.buyerAssignments||{};for(const uid of Object.keys(db.buyerAssignments)){db.buyerAssignments[uid]=(db.buyerAssignments[uid]||[]).filter(x=>x!==itemId)}save();itemsPage('品目を削除しました')}

/* ===== 本物の .xlsx 出力（在庫表履歴・廃棄一覧 / 週ごとシート分け） ===== */
function ensureXlsxReady(){if(typeof XLSX==='undefined'){alert('Excel出力ライブラリの読み込みに失敗しました。通信環境を確認して再読み込みしてください。');return false}return true}
function monthInputValue(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function monthRangeFromMonthValue(v){const [y,m]=String(v||monthInputValue(new Date())).split('-').map(Number);const s=new Date(y,m-1,1),e=new Date(y,m,0);return{start:ymdKey(s),end:ymdKey(e),year:y,month:m}}
function dateFromKey(k){return new Date(String(k)+'T00:00:00')}
function sheetDateLabel(k){const d=dateFromKey(k);return `${String(d.getMonth()+1).padStart(2,'0')}月${String(d.getDate()).padStart(2,'0')}日`}
function safeSheetName(n){return String(n).replace(/[\\/?*\[\]:]/g,'').slice(0,31)}
function splitRangeByWeekKeys(startKey,endKey){const weeks=[];let cur=dateFromKey(startKey),end=dateFromKey(endKey),no=1;while(cur<=end){const ws=new Date(cur),we=new Date(cur),dow=we.getDay(),add=dow===0?0:7-dow;we.setDate(we.getDate()+add);if(we>end)we.setTime(end.getTime());const s=ymdKey(ws),e=ymdKey(we);weeks.push({weekNo:no,start:s,end:e,sheetName:safeSheetName(`第${no}週_${sheetDateLabel(s)}-${sheetDateLabel(e)}`)});cur=new Date(we);cur.setDate(cur.getDate()+1);no++}return weeks}
function aoaSheet(aoa,widths){const ws=XLSX.utils.aoa_to_sheet(aoa);if(ws['!ref']){const range=XLSX.utils.decode_range(ws['!ref']);ws['!autofilter']={ref:XLSX.utils.encode_range(range)};ws['!freeze']={xSplit:0,ySplit:1};for(let R=range.s.r;R<=range.e.r;R++){for(let C=range.s.c;C<=range.e.c;C++){const a=XLSX.utils.encode_cell({r:R,c:C}),cell=ws[a];if(!cell)continue;cell.s={font:{name:'Yu Gothic',sz:11,bold:R===0,color:{rgb:R===0?'102A43':'000000'}},alignment:{vertical:'center',horizontal:R===0?'center':'left',wrapText:true},border:{top:{style:'thin',color:{rgb:'BFBFBF'}},bottom:{style:'thin',color:{rgb:'BFBFBF'}},left:{style:'thin',color:{rgb:'BFBFBF'}},right:{style:'thin',color:{rgb:'BFBFBF'}}},fill:R===0?{patternType:'solid',fgColor:{rgb:'D9EAF7'}}:undefined}}}ws['!cols']=(widths||[]).map(w=>({wch:w}))}return ws}
function setCellFill(ws,row,col,rgb){const a=XLSX.utils.encode_cell({r:row,c:col});if(!ws[a])return;ws[a].s=ws[a].s||{};ws[a].s.fill={patternType:'solid',fgColor:{rgb}};ws[a].s.alignment={...(ws[a].s.alignment||{}),horizontal:'center',vertical:'center'}}
function downloadWorkbookXlsx(wb,filename){XLSX.writeFile(wb,filename,{bookType:'xlsx',cellStyles:true})}
function inventoryProperText(r){const s=r.setting||db.settings?.[r.itemId]||{};return s&&s.min!==undefined&&s.max!==undefined?`${fmt(s.min)}〜${fmt(s.max)}`:''}
function inventoryDiffValue(r){const s=r.setting||db.settings?.[r.itemId]||{},t=Number(r.total||0);if(s&&s.min!==undefined&&t<Number(s.min))return yen(t-Number(s.min));if(s&&s.max!==undefined&&t>Number(s.max))return yen(t-Number(s.max));return 0}
function inventoryLineText(r){return (r.lines||[]).map(l=>l.detail?`${l.spec||''}${l.origin?'/'+l.origin:''} ${fmt(Number(l.subtotal||detailSubtotal(l)))}kg`:`${fmt(l.pack)}kg×${fmt(l.cases)}ケース`).filter(Boolean).join(' / ')}
function downloadInventoryHistoryXlsx(monthKey,rows,filename){if(!ensureXlsxReady())return;const range=monthRangeFromMonthValue(String(monthKey).slice(0,7));const wb=XLSX.utils.book_new();const sorted=rows.slice().sort((a,b)=>new Date(a.createdAt||0)-new Date(b.createdAt||0));splitRangeByWeekKeys(range.start,range.end).forEach(w=>{const wr=sorted.filter(r=>{const k=ymdKey(new Date(r.createdAt));return k>=w.start&&k<=w.end});const aoa=[['日付','品名','現在庫kg','適正在庫kg','差分kg','状態','産地/規格・明細','入力者','最終更新','区分'],...wr.map(r=>[ymdKey(new Date(r.createdAt)),r.itemName||'',Number(r.total||0),inventoryProperText(r),inventoryDiffValue(r),label(r.status||judge(Number(r.total||0),r.setting||db.settings?.[r.itemId])),inventoryLineText(r),r.user||'',r.createdAt?dt(r.createdAt):'',r.kind||''])];const ws=aoaSheet(aoa,[12,18,12,14,12,10,32,14,20,14]);for(let i=1;i<aoa.length;i++){if(aoa[i][5]==='不足')setCellFill(ws,i,5,'F4CCCC');if(aoa[i][5]==='過多')setCellFill(ws,i,5,'FFF2CC');if(aoa[i][5]==='適正')setCellFill(ws,i,5,'E2F0D9')}XLSX.utils.book_append_sheet(wb,ws,w.sheetName)});downloadWorkbookXlsx(wb,filename)}
function downloadWasteXlsx(startDate,endDate,rows,filename){if(!ensureXlsxReady())return;const wb=XLSX.utils.book_new();const sorted=rows.slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''))||new Date(a.createdAt||0)-new Date(b.createdAt||0));splitRangeByWeekKeys(startDate,endDate).forEach(w=>{const wr=sorted.filter(r=>String(r.date||'')>=w.start&&String(r.date||'')<=w.end);const aoa=[['日付','品名','数量kg','単価','金額','産地','仕入先','備考','入力者','入力日時'],...wr.map(r=>[r.date||'',r.itemName||'',Number(r.qty||0),Number(r.unitPrice||0)||'',Number(r.unitPrice)>0?wasteAmount(r):'',r.origin||'',r.supplier||'',r.memo||'',r.user||'',r.createdAt?dt(r.createdAt):''])];const ws=aoaSheet(aoa,[12,18,12,12,12,12,18,28,14,20]);XLSX.utils.book_append_sheet(wb,ws,w.sheetName)});downloadWorkbookXlsx(wb,filename)}

function monthStartKey(d){const x=new Date(d);return new Date(x.getFullYear(),x.getMonth(),1).toLocaleDateString('sv-SE')}
function addMonthsToKey(key,months){const d=new Date(key+'T00:00:00');d.setMonth(d.getMonth()+months);return monthStartKey(d)}
function previousMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-1)}
function deletableLatestMonthKey(){return addMonthsToKey(monthStartKey(new Date()),-4)}
function monthLabel(key){const [y,m]=key.split('-');return `${y}年${Number(m)}月分`}
function recordMonthKey(r){return monthStartKey(new Date(r.createdAt))}
function isMonthlyExcelRecord(r){return r&&(r.kind==='一括入力'||r.kind==='当日分修正')}
function recordsForMonth(key){return (db.records||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key&&isMonthlyExcelRecord(r))}
function movementsForMonth(key){return (db.movements||[]).filter(r=>r.createdAt&&recordMonthKey(r)===key)}
function notificationsForMonth(key){return (db.notifications||[]).filter(r=>r.sentAt&&recordMonthKey({createdAt:r.sentAt})===key)}
function monthlyKeysWithRecords(){return [...new Set((db.records||[]).filter(r=>r.createdAt&&isMonthlyExcelRecord(r)).map(recordMonthKey))].sort().reverse()}
function monthlyArchive(key){db.monthlyArchives=db.monthlyArchives||{};db.monthlyArchives[key]=db.monthlyArchives[key]||{targetMonth:key,status:'pending'};return db.monthlyArchives[key]}
function monthlyExportTasks(){const prev=previousMonthKey();return monthlyKeysWithRecords().filter(k=>k<=prev).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>!x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyDeleteTasks(){const limit=deletableLatestMonthKey();return monthlyKeysWithRecords().filter(k=>k<=limit).map(k=>({key:k,rowCount:recordsForMonth(k).length,archive:monthlyArchive(k)})).filter(x=>x.archive.excelSavedAt&&x.archive.status!=='deleted')}
function monthlyHomeNoticeHtml(){const tasks=monthlyExportTasks();if(!tasks.length)return'';const t=tasks[0];return`<div class="card warn flash"><b>月次在庫Excel作成</b><div class="small">${monthLabel(t.key)}の在庫Excelを作成できます。管理画面からExcel作成を実行してください。</div><button class="btn orange" style="width:100%;margin-top:10px" onclick="monthlyArchivePage()">月次Excel・履歴管理を開く</button></div>`}
function escapeCsv(v){const s=String(v??'');return /[",\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function downloadTextFile(filename,content,mime){const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500)}
function buildMonthlyExcelHtml(key,rows){
 const itemsBase=allSortedItems().slice();
 const itemMap=Object.fromEntries(itemsBase.map(it=>[it.id,it]));
 rows.forEach(r=>{if(r.itemId&&!itemMap[r.itemId]){const it={id:r.itemId,name:r.itemName||r.itemId,pack:'',sort:9999,active:true};itemsBase.push(it);itemMap[it.id]=it}});
 const items=itemsBase.filter(it=>it.active!==false||rows.some(r=>r.itemId===it.id)).sort((a,b)=>(a.sort||9999)-(b.sort||9999));
 const [yy,mm]=key.split('-').map(Number),monthStart=new Date(yy,mm-1,1),monthEnd=new Date(yy,mm,0);
 const jpDate=d=>d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
 const md=d=>d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});
 const hm=d=>d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
 const wname=d=>'日月火水木金土'[d.getDay()];
 const weekStart=d=>{const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-((x.getDay()+6)%7));return x};
 const latest={};
 rows.slice().sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).forEach(r=>{const d=new Date(r.createdAt),dk=ymdKey(d);latest[r.itemId+'_'+dk]=r});
 const weeks=[];for(let s=weekStart(monthStart);s<=monthEnd;s.setDate(s.getDate()+7)){const x=new Date(s);weeks.push(x)}
 const styles=`<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827}h1{font-size:22px}table{border-collapse:collapse;margin:0 0 22px 0}th,td{border:1px solid #bfbfbf;padding:7px 9px;vertical-align:middle;white-space:nowrap}th{background:#d9eaf7;font-weight:bold}.summary th{background:#e2f0d9}.weekTitle{background:#1f4e79;color:white;font-size:18px;font-weight:bold;text-align:left}.item{background:#f8fafc;font-weight:bold}.normal{background:#d9ead3}.shortage{background:#f4cccc}.excess{background:#fce4d6}.unset{background:#f2f2f2;color:#666}.small{font-size:11px;color:#555}.note{color:#555}</style>`;
 const summary=`<h1>在庫履歴 ${monthLabel(key)} 週区切り横長表</h1><table class="summary"><tr><th>項目</th><th>内容</th></tr><tr><td>対象月</td><td>${monthLabel(key)}</td></tr><tr><td>作成日時</td><td>${dt(nowIso())}</td></tr><tr><td>履歴件数</td><td>${rows.length}</td></tr><tr><td>形式</td><td>週区切り・横長形式（品目を縦、日付を横）</td></tr><tr><td>注意</td><td>このファイルを保存後、アプリ内で「Excel保存確認」にチェックしてください。</td></tr></table>`;
 const weekly=weeks.map((ws,wi)=>{const days=[...Array(7)].map((_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d});const dayKeys=days.map(d=>ymdKey(d));const shown=days.filter(d=>d>=monthStart&&d<=monthEnd);const title=`第${wi+1}週　${jpDate(shown[0]||days[0])}〜${jpDate(shown[shown.length-1]||days[6])}`;return `<table><tr><td class="weekTitle" colspan="8">${title}</td></tr><tr><th>品目</th>${days.map(d=>`<th>${md(d)}<br>${wname(d)}</th>`).join('')}</tr>${items.map(it=>`<tr><td class="item">${esc(it.name)}</td>${dayKeys.map((dk,i)=>{const d=days[i];if(d<monthStart||d>monthEnd)return `<td class="unset">対象外</td>`;const r=latest[it.id+'_'+dk];if(!r)return `<td class="unset">-</td>`;const st=r.status||judge(Number(r.total||0),db.settings[it.id]);return `<td class="${st}"><b>${fmt(r.total)}kg</b><br>${label(st)}<br><span class="small">${hm(new Date(r.createdAt))} ${esc(r.user||'')}</span></td>`}).join('')}</tr>`).join('')}</table>`}).join('');
 const detail=[];rows.forEach(r=>{(r.lines&&r.lines.length?r.lines:[{}]).forEach(l=>detail.push({日付:jpDate(new Date(r.createdAt)),時刻:hm(new Date(r.createdAt)),品目:r.itemName||'',区分:r.kind||'',合計kg:r.total??'',判定:label(r.status),入れ数kg:l.pack??'',ケース数:l.cases??'',小計kg:l.subtotal??'',入力者:r.user||''}))});
 const cols=['日付','時刻','品目','区分','合計kg','判定','入れ数kg','ケース数','小計kg','入力者'];
 const detailTable=`<h2>詳細履歴一覧</h2><div class="note">このExcelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴は含めません。</div><table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>${detail.map(row=>`<tr>${cols.map(c=>`<td>${esc(row[c])}</td>`).join('')}</tr>`).join('')}</table>`;
 return `<html><head><meta charset="utf-8">${styles}</head><body>${summary}${weekly}${detailTable}</body></html>`
}
function downloadInventoryHistoryBySelectedMonth(){if(!canAdmin())return alert('管理者のみ実行できます');const v=(document.getElementById('inventoryHistoryMonth')&&document.getElementById('inventoryHistoryMonth').value)||monthInputValue(new Date());downloadMonthlyExcel(v+'-01')}
function downloadMonthlyExcel(key){if(!canAdmin())return alert('管理者のみ実行できます');key=String(key||'').slice(0,7)+'-01';const rows=recordsForMonth(key);if(!rows.length)return alert('対象月の在庫入力データがありません');const filename=`在庫表履歴_${key.slice(0,7)}.xlsx`;downloadInventoryHistoryXlsx(key,rows,filename);const a=monthlyArchive(key);a.status=a.status==='deleted'?'deleted':'excel_created';a.excelFilename=filename;a.excelRowCount=rows.length;a.excelCreatedAt=nowIso();a.excelCreatedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}のExcelを作成しました。PCに保存できたら「Excel保存確認」にチェックしてください。`)}
function toggleMonthlySavedCheck(key,checked){const a=monthlyArchive(key);a.savedCheck=checked;save();monthlyArchivePage()}
function confirmMonthlyExcelSaved(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelCreatedAt)return alert('先にExcelを作成してください');if(!a.savedCheck)return alert('Excel保存確認にチェックしてください');a.status='excel_saved';a.excelSavedAt=nowIso();a.excelSavedBy=db.user;save();monthlyArchivePage(`${monthLabel(key)}をExcel保存確認済みとして記録しました。`)}
function monthlyArchivePage(msg=''){setScreen('monthlyArchivePage',[msg]);if(!canAdmin()){alert('管理者のみ表示できます');return home()}const exports=monthlyExportTasks(),deletes=monthlyDeleteTasks(),archives=db.monthlyArchives||{};const history=Object.keys(archives).sort().reverse().slice(0,24);const defaultMonth=monthInputValue(new Date());pageShell('月次Excel・履歴管理','在庫表履歴は月を選択してExcel出力できます。1ヶ月分を1ファイルにして、1週間ごとにシート分けします。',`${okHtml(msg)}<div class="notice">Excelは「在庫入力」画面で登録したデータだけを出力します。入庫・出庫・調整などの在庫修正履歴はExcelに含めません。削除は「Excel作成済み」かつ「Excel保存確認済み」かつ「3ヶ月経過後」の records のみ可能です。入庫・出庫・調整などの修正履歴 movements と通知履歴 notifications は、この画面では削除せず、「90日超 修正履歴整理」画面で管理者確認後に削除します。</div><section class="card"><h2 style="margin-top:0">在庫表履歴 Excel出力</h2><div class="small">月を選択して、週ごとのシートに分けた本物の .xlsx を作成します。</div><div class="row" style="margin-top:12px"><div><label class="label">出力する月</label><input id="inventoryHistoryMonth" class="input" type="month" value="${defaultMonth}"></div><div><button class="btn blue" onclick="downloadInventoryHistoryBySelectedMonth()">選択月をExcel出力</button></div></div></section>${exports.length?`<section class="card"><h2 style="margin-top:0">Excel保存が必要な月</h2>${exports.map(t=>monthlyExportCard(t)).join('')}</section>`:'<div class="card ok">Excel保存が必要な月はありません。</div>'}${deletes.length?`<section class="card"><h2 style="margin-top:0">履歴削除候補</h2>${deletes.map(t=>monthlyDeleteCard(t)).join('')}</section>`:'<div class="card notice">削除できる古い履歴はありません。</div>'}${history.length?`<section class="card"><h2 style="margin-top:0">月次処理履歴</h2><table class="table"><tr><th>対象月</th><th>状態</th><th>件数</th><th>日時</th></tr>${history.map(k=>{const a=archives[k];return`<tr><td>${monthLabel(k)}</td><td>${monthlyStatusLabel(a.status)}</td><td>${a.excelRowCount??recordsForMonth(k).length}</td><td>${a.deletedAt?dt(a.deletedAt):a.excelSavedAt?dt(a.excelSavedAt):a.excelCreatedAt?dt(a.excelCreatedAt):'-'}</td></tr>`}).join('')}</table></section>`:''}`)}
function monthlyStatusLabel(st){return st==='deleted'?'削除済み':st==='excel_saved'?'Excel保存確認済み':st==='excel_created'?'Excel作成済み':'未処理'}
function monthlyExportCard(t){const a=t.archive;return`<div class="box" style="margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">対象件数：${t.rowCount.toLocaleString()}件 ${a.excelCreatedAt?`/ Excel作成：${dt(a.excelCreatedAt)}`:''}</div></div><span class="badge ${a.excelSavedAt?'normal':a.excelCreatedAt?'excess':'unset'}">${monthlyStatusLabel(a.status)}</span></div><button class="btn blue" style="width:100%;margin-top:10px" onclick="downloadMonthlyExcel('${t.key}')">Excelを作成してダウンロード</button>${a.excelCreatedAt?`<label class="switch" style="margin-top:10px"><input type="checkbox" ${a.savedCheck?'checked':''} onchange="toggleMonthlySavedCheck('${t.key}',this.checked)"> ExcelファイルをPCに保存したことを確認しました</label><button class="btn green" style="width:100%;margin-top:10px" onclick="confirmMonthlyExcelSaved('${t.key}')" ${a.savedCheck?'':'disabled'}>Excel保存済みとして記録</button>`:''}</div>`}
function monthlyDeleteCard(t){const a=t.archive;return`<div class="box" style="background:#fff8f8;border:1px solid #fecaca;margin:10px 0"><div class="itemHead"><div><b>${monthLabel(t.key)}</b><div class="small">現在残っている件数：${t.rowCount.toLocaleString()}件<br>Excel保存確認日：${a.excelSavedAt?dt(a.excelSavedAt):'-'}</div></div><span class="badge shortage">削除候補</span></div><button class="btn danger" style="width:100%;margin-top:10px" onclick="monthlyDeleteConfirmPage('${t.key}')">履歴削除</button></div>`}
function monthlyDeleteConfirmPage(key){setScreen('monthlyDeleteConfirmPage',[key]);if(!canAdmin())return home();const a=monthlyArchive(key),rows=recordsForMonth(key);if(!a.excelSavedAt||key>deletableLatestMonthKey()||a.status==='deleted'){alert('この月は削除できません');return monthlyArchivePage()}pageShell('履歴削除の確認',`${monthLabel(key)} / ${rows.length}件`, `<div class="card err"><h2 style="margin-top:0">${monthLabel(key)}の在庫変更履歴を削除します。</h2><p>この操作は取り消せません。<br>対象月のExcelファイルが保存済みであることを確認してください。</p><p><b>本当に削除しますか？</b></p><div class="row"><button class="btn btn2" onclick="monthlyArchivePage()">キャンセル</button><button class="btn danger" onclick="deleteMonthlyHistory('${key}')">削除する</button></div></div>`)}
function deleteMonthlyHistory(key){if(!canAdmin())return alert('管理者のみ実行できます');const a=monthlyArchive(key);if(!a.excelSavedAt) return alert('Excel保存確認が済んでいないため削除できません');if(key>deletableLatestMonthKey()) return alert('この月はまだ削除できません。3ヶ月分の保持期間が終わってから削除できます。');if(a.status==='deleted') return alert('この月は既に削除済みです');const deleteIds=db.records.filter(r=>r.createdAt&&recordMonthKey(r)===key).map(r=>r.id),beforeRecords=db.records.length;deleteHistoryRows(HISTORY_TABLES.records,deleteIds).catch(console.warn);db.records=db.records.filter(r=>!r.createdAt||recordMonthKey(r)!==key);a.status='deleted';a.deletedAt=nowIso();a.deletedBy=db.user;a.deletedCount=beforeRecords-db.records.length;a.deletedMovementsCount=0;a.deletedNotificationsCount=0;a.deleteNote='月次Excel保存後削除ではrecordsのみ削除。movements/notificationsは90日超整理画面で削除。';save();monthlyArchivePage(`${monthLabel(key)}の在庫入力データを削除しました。削除件数：${a.deletedCount}件`)}

async function copyTextFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t);alert('コピーしました')}catch(e){prompt('コピーしてください',t)}}function shareLineFrom(id){location.href=`https://line.me/R/share?text=${encodeURIComponent(document.getElementById(id).value)}`}async function shareLineWorksFrom(id){const t=document.getElementById(id).value;try{await navigator.clipboard.writeText(t)}catch(e){}if(navigator.share){navigator.share({text:t}).catch(()=>{})}else{alert('本文をコピーしました。LINE WORKSを開いて貼り付けてください。')}}function shareTextFrom(id){shareLineFrom(id)}

boot();
